<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SRG — Catering Command</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:#050507; --surface:#0c0c0f; --surface2:#131318;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
      --white:#ffffff; --dim:#888892; --mute:#3a3a45;
      --orange:#5bc8ff; --orange-dim:rgba(91,200,255,0.1); --orange-border:rgba(91,200,255,0.25);
      --green:#00e87a; --green-dim:rgba(0,232,122,0.1);
      --red:#ff3f3f; --red-dim:rgba(255,63,63,0.1);
      --yellow:#ffaa00; --yellow-dim:rgba(255,170,0,0.1);
      --blue:#4d8fff; --blue-dim:rgba(77,143,255,0.1);
      --purple:#9d7cff; --purple-dim:rgba(157,124,255,0.1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--white);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
    nav{display:flex;align-items:center;padding:0 28px;height:56px;background:rgba(5,5,7,.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
    .nav-brand{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--white);text-decoration:none;margin-right:32px;line-height:1.2}
    .nav-brand span{color:var(--orange)}
    .nav-links{display:flex}
    .nav-link{padding:0 14px;height:56px;display:flex;align-items:center;font-size:.78rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);text-decoration:none;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
    .nav-link:hover{color:var(--white)}.nav-link.active{color:var(--white);border-bottom-color:var(--orange)}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
    .sync-label{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--mute)}
    .page{padding:20px 28px;max-width:1600px;margin:0 auto}
    .status-bar{font-family:'IBM Plex Mono',monospace;font-size:.72rem;padding:9px 14px;border-radius:3px;margin-bottom:16px;display:none;align-items:center;gap:8px}
    .status-bar.ld{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(77,143,255,.2)}
    .status-bar.ok{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,232,122,.2)}
    .status-bar.er{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,63,63,.2)}
    .status-bar.wa{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(255,170,0,.2)}
    .progress-wrap{margin-bottom:16px;display:none}
    .progress-label{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--dim);margin-bottom:6px}
    .progress-track{height:2px;background:var(--surface2)}
    .progress-fill{height:100%;background:var(--orange);transition:width .3s}
    .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto}
    .tab{padding:12px 16px;font-size:.73rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--mute);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;font-family:'Barlow',sans-serif;transition:color .15s,border-color .15s}
    .tab:hover{color:var(--dim)}.tab.active{color:var(--white);border-bottom-color:var(--orange)}
    .badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:.6rem;padding:1px 5px;border-radius:2px;margin-left:5px;background:var(--surface2);color:var(--dim)}
    .badge.hot{background:var(--orange-dim);color:var(--orange)}.badge.live{background:var(--green-dim);color:var(--green)}
    .btn{font-family:'Barlow',sans-serif;font-weight:600;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;border-radius:2px;transition:all .15s;text-decoration:none}
    .btn-primary{background:var(--orange);color:var(--black);padding:8px 16px}
    .btn-primary:hover{background:#7fd6ff}.btn-primary:disabled{background:var(--mute);cursor:not-allowed}
    .btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--border2);padding:7px 12px}
    .btn-ghost:hover{color:var(--white);border-color:var(--dim)}
    .btn-success{background:var(--green);color:var(--black);padding:7px 12px}
    .btn-success:hover{background:#00ff88}
    .btn-danger{background:transparent;color:var(--red);border:1px solid rgba(255,63,63,.25);padding:6px 10px;font-size:.68rem}
    .btn-sm{padding:5px 10px;font-size:.68rem}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:24px}
    .stat-cell{background:var(--surface);padding:18px 20px;cursor:pointer;transition:background .15s}
    .stat-cell:hover{background:var(--surface2)}
    .stat-num{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:700;line-height:1;color:var(--white)}
    .stat-num.orange{color:var(--orange)}.stat-num.green{color:var(--green)}.stat-num.red{color:var(--red)}
    .stat-num.yellow{color:var(--yellow)}.stat-num.blue{color:var(--blue)}.stat-num.purple{color:var(--purple)}
    .stat-label{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin-top:5px}
    .sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
    .card{background:var(--surface);border:1px solid var(--border);padding:16px;margin-bottom:1px;transition:border-color .15s,background .15s;position:relative}
    .card:hover{background:var(--surface2);border-color:var(--border2)}
    .card.urgent{border-left:3px solid var(--yellow)}.card.high{border-left:3px solid var(--orange)}
    .card.med{border-left:3px solid var(--blue)}.card.low{border-left:3px solid var(--mute)}.card.past{border-left:3px solid var(--mute);opacity:.85}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
    .card-name{font-weight:600;font-size:.95rem;letter-spacing:.01em}
    .card-co{font-size:.74rem;color:var(--dim);margin-top:2px}
    .card-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .card-meta{display:flex;gap:16px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:.67rem;color:var(--mute);margin-bottom:10px}
    .card-meta-item{display:flex;flex-direction:column;gap:1px}
    .card-meta-label{font-size:.57rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);opacity:.6}
    .card-meta-value{color:var(--dim)}.card-meta-value.hot{color:var(--red)}.card-meta-value.warm{color:var(--yellow)}
    .card-action{background:rgba(91,200,255,.05);border-left:2px solid var(--orange);padding:8px 12px;font-size:.76rem;color:var(--dim);line-height:1.5;margin-bottom:10px}
    .card-action strong{color:var(--orange)}
    .card-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border)}
    .in-queue-badge{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--green);letter-spacing:.05em}
    .status-dot{display:inline-flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:2px}
    .status-dot::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .sd-tent{background:var(--yellow-dim);color:var(--yellow)}.sd-tent::before{background:var(--yellow)}
    .sd-prosp{background:var(--purple-dim);color:var(--purple)}.sd-prosp::before{background:var(--purple)}
    .sd-def{background:var(--green-dim);color:var(--green)}.sd-def::before{background:var(--green)}
    .sd-closed{background:var(--blue-dim);color:var(--blue)}.sd-closed::before{background:var(--blue)}
    .sd-lost{background:var(--red-dim);color:var(--red)}.sd-lost::before{background:var(--red)}
    .sd-past{background:var(--surface2);color:var(--mute)}.sd-past::before{background:var(--mute)}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
    @media(max-width:900px){.two-col{grid-template-columns:1fr}.yr-grid{grid-template-columns:1fr}}
    .yr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
    .yr-col{background:var(--surface);padding:16px}
    .yr-col-hdr{font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--border)}
    .yr-item{padding:9px 0;border-bottom:1px solid var(--border)}
    .yr-item-name{font-size:.83rem;font-weight:600;margin-bottom:2px}
    .yr-item-co{font-size:.7rem;color:var(--dim)}
    .yr-item-meta{font-family:'IBM Plex Mono',monospace;font-size:.63rem;color:var(--mute);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
    .yr-item-actions{margin-top:6px;display:flex;gap:5px}
    .empty{text-align:center;padding:48px 20px}
    .empty-icon{font-size:1.4rem;opacity:.2;margin-bottom:10px}
    .empty-title{font-size:.82rem;color:var(--dim);margin-bottom:4px;font-weight:500}
    .empty-sub{font-size:.74rem;color:var(--mute)}
    .setup{border:1px solid rgba(77,143,255,.2);background:var(--blue-dim);padding:24px;margin-bottom:20px}
    .setup h3{font-size:.85rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--blue);margin-bottom:12px}
    .setup ol{padding-left:16px;font-size:.8rem;color:var(--dim);line-height:2.2}
    code{font-family:'IBM Plex Mono',monospace;font-size:.76rem;background:var(--surface2);padding:1px 6px;border-radius:2px;color:var(--white)}
    .queue-legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .queue-pill{font-family:'IBM Plex Mono',monospace;font-size:.6rem;padding:3px 8px;border-radius:2px;letter-spacing:.06em;text-transform:uppercase}
    .draft-preview{background:var(--surface2);border-left:2px solid var(--mute);padding:10px 12px;font-size:.77rem;line-height:1.6;color:var(--dim);white-space:pre-wrap;max-height:120px;overflow-y:auto;margin:8px 0}
    .warn-notice{background:var(--yellow-dim);border:1px solid rgba(255,170,0,.2);padding:8px 12px;font-size:.74rem;color:var(--yellow);margin-bottom:13px}
    .notice{background:rgba(0,232,122,.06);border:1px solid rgba(0,232,122,.15);padding:10px 14px;font-size:.76rem;color:rgba(0,232,122,.8);margin-bottom:14px}
    .debug-box{background:var(--surface);border:1px solid var(--border);padding:16px;font-family:'IBM Plex Mono',monospace;font-size:.69rem;color:var(--dim);white-space:pre-wrap;line-height:1.7;max-height:600px;overflow-y:auto}
    hr.div{border:none;border-top:1px solid var(--border);margin:20px 0}
    .spin{display:inline-block;width:10px;height:10px;border:1.5px solid rgba(255,255,255,.2);border-top-color:var(--white);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .snapshot-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:28px}
    .snapshot-panel{background:var(--surface);padding:20px 22px}
    .snapshot-label{font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);margin-bottom:16px}
    .snapshot-big{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:700;line-height:1}
    .snapshot-sub{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--mute);margin-top:3px}
    .spark-wrap{display:flex;align-items:flex-end;gap:4px;margin-bottom:12px}
    .spark-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
    .spark-count{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--dim);min-height:14px}
    .spark-track{width:100%;background:var(--surface2);height:40px;display:flex;align-items:flex-end}
    .spark-bar{width:100%;transition:height .3s}
    .spark-day{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--mute)}
    .spark-day.today{color:var(--orange);font-weight:700}
    #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:200;justify-content:center;align-items:center;padding:20px}
    #modal-overlay.open{display:flex}
    #modal-box{background:var(--surface);border:1px solid var(--border2);width:100%;max-width:660px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
    .modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .modal-title{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
    .modal-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:1rem}
    .modal-close:hover{color:var(--white)}
    .modal-subject{padding:10px 20px;border-bottom:1px solid var(--border)}
    .modal-subject-label{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin-bottom:5px}
    #modal-sub{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--white);padding:7px 10px;font-size:.82rem;font-family:'Barlow',sans-serif;outline:none;border-radius:2px}
    #modal-sub:focus{border-color:var(--orange)}
    .modal-body{padding:14px 20px;flex:1;overflow-y:auto}
    #modal-body-text{width:100%;min-height:220px;background:var(--surface2);border:1px solid var(--border2);color:var(--white);padding:12px;font-size:.8rem;line-height:1.7;resize:vertical;font-family:'Barlow',sans-serif;outline:none;border-radius:2px}
    #modal-body-text:focus{border-color:var(--orange)}
    .modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap}
    .modal-foot button{padding:7px 15px;border-radius:2px;font-size:.79rem;font-weight:600;cursor:pointer;border:none;font-family:'Barlow',sans-serif}
    .risk-flag{background:var(--red-dim);border:1px solid rgba(255,63,63,.2);padding:5px 10px;font-size:.7rem;color:var(--red);margin-bottom:5px}
    @media(max-width:700px){.snapshot-grid{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">SRG <span>//</span><br>Catering</a>
  <div class="nav-links">
    <a href="/" class="nav-link">Pipeline</a>
    <a href="/analytics.html" class="nav-link">Analytics</a>
    <a href="/outreach.html" class="nav-link active">Outreach</a>
  </div>
  <div class="nav-right">
    <span class="sync-label" id="sync-label"></span>
    <button class="btn btn-ghost btn-sm" onclick="doFullSync()" id="btn-sync">&#8635; Sync</button>
  </div>
</nav>

<div class="page">
  <div class="status-bar" id="status-bar"></div>
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label" id="progress-label">Loading...</div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('cmd')"      id="tab-cmd">Command Center</button>
    <button class="tab"        onclick="showTab('tent')"     id="tab-tent">Tentative <span class="badge hot" id="bg-tent">-</span></button>
    <button class="tab"        onclick="showTab('prospect')" id="tab-prospect">Prospects <span class="badge" id="bg-prospect">-</span></button>
    <button class="tab"        onclick="showTab('definite')" id="tab-definite">Definite <span class="badge live" id="bg-definite">-</span></button>
    <button class="tab"        onclick="showTab('closed')"   id="tab-closed">Past Customers <span class="badge" id="bg-closed">-</span></button>
    <button class="tab"        onclick="showTab('lost')"     id="tab-lost">Old Inquiries <span class="badge" id="bg-lost">-</span></button>
    <button class="tab"        onclick="showTab('years')"    id="tab-years">2026 / 2027</button>
    <button class="tab"        onclick="showTab('queue')"    id="tab-queue">Queue <span class="badge" id="bg-queue">0</span></button>
    <button class="tab"        onclick="showTab('debug')"    id="tab-debug">Debug</button>
  </div>
  <div id="pane-cmd"></div>
  <div id="pane-tent"     style="display:none"></div>
  <div id="pane-prospect" style="display:none"></div>
  <div id="pane-definite" style="display:none"></div>
  <div id="pane-closed"   style="display:none"></div>
  <div id="pane-lost"     style="display:none"></div>
  <div id="pane-years"    style="display:none"></div>
  <div id="pane-queue"    style="display:none"></div>
  <div id="pane-debug"    style="display:none"></div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <div class="modal-head"><div class="modal-title" id="modal-title">Review Draft</div><button class="modal-close" onclick="closeModal()">&#10005;</button></div>
    <div class="modal-subject"><div class="modal-subject-label">Subject</div><input type="text" id="modal-sub" placeholder="Subject line..."></div>
    <div class="modal-body"><div id="modal-risks" style="margin-bottom:8px"></div><textarea id="modal-body-text"></textarea></div>
    <div class="modal-foot">
      <button style="background:var(--surface2);color:var(--dim);border:1px solid var(--border2)" onclick="closeModal()">Close</button>
      <button style="background:var(--orange);color:var(--black)" onclick="copyModal()">Copy</button>
      <button style="background:var(--green);color:var(--black)" onclick="approveFromModal()">Approve</button>
    </div>
  </div>
</div>

<script>
const API_TS='/.netlify/functions/tripleseat', API_AI='/.netlify/functions/ai', API_ST='/.netlify/functions/store';
const TS_PLACEHOLDER='2000-01-01';
let allEvents=[], pipeline={}, queue=[], sentMap={}, activeTab='cmd', dbConfigured=false, modalQueueId=null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function daysAgo(d){if(!d)return null;var n=new Date(d);return isNaN(n)?null:Math.floor((Date.now()-n)/86400000);}
function daysUntil(d){if(!d)return null;var n=new Date(d);return isNaN(n)?null:Math.floor((n-Date.now())/86400000);}
function fmtDate(d){if(!d)return null;try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return String(d);}}
function fmtMoney(n){if(!n||n===0)return'--';if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M';if(n>=1000)return'$'+(n/1000).toFixed(1)+'K';return'$'+Math.round(n).toLocaleString();}
function setStatus(msg,type){var el=document.getElementById('status-bar');if(!msg){el.style.display='none';return;}el.className='status-bar '+(type||'ld');el.innerHTML=msg;el.style.display='flex';}
function setProgress(pct,label){document.getElementById('progress-wrap').style.display='block';document.getElementById('progress-fill').style.width=pct+'%';document.getElementById('progress-label').textContent=label;}
function hideProgress(){setTimeout(function(){document.getElementById('progress-wrap').style.display='none';},1500);}

// ── DATE & CONTACT ────────────────────────────────────────────────────────────
function getEventDate(ev){
  var raw=ev.raw||ev;
  var iso=raw.event_start_iso8601||ev.event_start||raw.start_date||null;
  if(!iso)return null;
  return String(iso).startsWith(TS_PLACEHOLDER)?null:String(iso);
}
function isFuture(ev){var d=getEventDate(ev);return d?new Date(d)>new Date():false;}

function getContact(ev){
  var raw=ev.raw||ev;
  var c=raw.contact||{}, a=raw.account||{};
  var emailArr=c.email_addresses||[];
  var email=(emailArr[0]&&emailArr[0].address||'').toLowerCase().trim();
  var phoneArr=c.phone_numbers||[];
  var phone=(phoneArr[0]&&phoneArr[0].number||'').trim();
  var first=c.first_name||'', rawLast=c.last_name||'';
  var last=/^\*+$/.test(rawLast)?'':rawLast;
  var name=[first,last].filter(Boolean).join(' ')||raw.post_as||raw.name||ev.name||'';
  return{email:email,phone:phone,name:name,first:first,last:last,company:a.name||c.company||''};
}

function getGrandTotal(ev){
  var raw=ev.raw||ev;
  return parseFloat(raw.grand_total||raw.total_event_grand_total||(raw.booking&&raw.booking.total_grand_total)||0)||0;
}

// ── PIPELINE ──────────────────────────────────────────────────────────────────
function getCat(ev){
  var s=(ev.status||'').toUpperCase();
  if(s==='TENTATIVE')return isFuture(ev)?'futureTent':'pastTent';
  if(s==='PROSPECT') return isFuture(ev)?'futurePros':'pastPros';
  if(s==='DEFINITE') return isFuture(ev)?'futureDef':'pastDef';
  if(s==='CLOSED')   return 'closed';
  if(s==='LOST')     return 'lost';
  return 'unknown';
}

function buildPipeline(events){
  var cats=['futureTent','futurePros','futureDef','pastDef','closed','pastTent','pastPros','lost','unknown'];
  var p={};cats.forEach(function(k){p[k]=[];});
  events.forEach(function(ev){
    var cat=getCat(ev), contact=getContact(ev), date=getEventDate(ev);
    var score=calcScore(ev), urgency=score>=140?'urgent':score>=100?'high':score>=70?'med':'low';
    p[cat].push(Object.assign({},ev,{_cat:cat,_contact:contact,_date:date,_score:score,_urgency:urgency}));
  });
  function byScore(a,b){return b._score-a._score;}
  function byDate(a,b){if(!a._date&&!b._date)return 0;if(!a._date)return 1;if(!b._date)return -1;return new Date(a._date)-new Date(b._date);}
  function byUpd(a,b){return new Date(b.updated_at||0)-new Date(a.updated_at||0);}
  p.futureTent.sort(byScore);p.futurePros.sort(byScore);
  p.futureDef.sort(byDate);p.pastDef.sort(byUpd);p.closed.sort(byUpd);
  p.pastTent.sort(byUpd);p.pastPros.sort(byUpd);p.lost.sort(byUpd);
  return p;
}

function calcScore(ev){
  var s=(ev.status||'').toUpperCase();
  if(['TENTATIVE','PROSPECT'].indexOf(s)<0||!isFuture(ev))return 0;
  var raw=ev.raw||ev, sc=s==='TENTATIVE'?100:60;
  var ds=daysAgo(ev.updated_at||ev.created_at), dt=daysUntil(getEventDate(ev));
  var g=parseInt(raw.guest_count||ev.guest_count)||0;
  if(s==='TENTATIVE'){if(ds>14)sc+=40;else if(ds>7)sc+=20;else if(ds>3)sc+=10;}
  else{if(ds>10)sc+=30;else if(ds>5)sc+=15;}
  if(dt!==null&&dt>=0){if(dt<=30)sc+=40;else if(dt<=90)sc+=25;else if(dt<=180)sc+=15;else if(dt<=365)sc+=8;}
  if(g>=200)sc+=35;else if(g>=100)sc+=25;else if(g>=50)sc+=15;else if(g>=25)sc+=8;
  return sc;
}

function getAction(ev){
  var s=(ev.status||'').toUpperCase(), raw=ev.raw||ev;
  var dt=daysUntil(ev._date||getEventDate(ev)), ds=daysAgo(ev.updated_at||ev.created_at);
  var g=parseInt(raw.guest_count||ev.guest_count)||0;
  var gStr=g?' ('+g+' guests)':'', evDate=ev._date||getEventDate(ev);
  var dStr=evDate?' on '+fmtDate(evDate):'';
  if(s==='TENTATIVE'){
    if(dt!==null&&dt>=0&&dt<=30)return 'Event'+dStr+' is '+dt+' days away'+gStr+'. Might be worth confirming details.';
    if(ds>14)return 'Looks like this hasn\'t been updated in '+ds+' days'+gStr+'. Could be a good time to check in.';
    if(ds>7) return 'No update in '+ds+' days'+gStr+'. Might be worth keeping this warm.';
    return 'Tentative'+gStr+dStr+' -- worth keeping warm.';
  }
  if(s==='PROSPECT'){
    if(ds!==null&&ds<=2)return 'New inquiry'+gStr+dStr+' -- might be worth a quick response.';
    if(ds>10)return 'Quiet for '+ds+' days'+gStr+'. Low-pressure check-in could help.';
    return 'Active prospect'+gStr+dStr+' -- could be worth a follow-up.';
  }
  if(s==='DEFINITE'){
    if(dt!==null&&dt>=0&&dt<=30)return dt+' days to event'+gStr+'. Could be worth checking that details are still aligned.';
    if(ds>20)return 'We don\'t show a recent touchpoint in '+ds+' days. Might be worth a check-in.';
    return 'Upcoming event'+gStr+dStr+'.';
  }
  return '';
}

// ── RADAR HELPERS ─────────────────────────────────────────────────────────────
function getRadarReason(ev, cat){
  var raw=ev.raw||ev;
  var ds=daysAgo(ev.updated_at||ev.created_at), dt=daysUntil(ev._date||getEventDate(ev));
  var g=parseInt(raw.guest_count||ev.guest_count)||0;
  if(cat==='coldTent'){
    if(ds>14)return 'Looks like this hasn\'t been updated in '+ds+' days -- potentially getting cold.';
    if(ds>7) return 'No update in '+ds+' days. Might be worth keeping this warm.';
    if(dt!==null&&dt>=0&&dt<=60)return 'Event is '+dt+' days out and still tentative.';
    if(g>=100)return 'High-value event ('+g+' guests) still sitting as tentative.';
    return 'Tentative event that could use some warmth.';
  }
  if(cat==='warmPros'){
    if(ds>10)return 'This prospect has been quiet for '+ds+' days.';
    if(ds>3) return 'Inquiry came in '+ds+' days ago -- might be a good time to follow up before it goes quiet.';
    if(dt!==null&&dt>=0&&dt<=90)return 'Event is '+dt+' days out. Good time to stay in touch.';
    return 'Active prospect that could use a warm-up.';
  }
  if(cat==='defTouch'){
    if(ds>20)return 'We don\'t show a recent touchpoint -- last update was '+ds+' days ago.';
    if(dt!==null&&dt>=0&&dt<=30)return 'Event is '+dt+' days away. Worth confirming everything is still aligned.';
    return 'Coming up soon -- might be worth a quick check-in.';
  }
  if(cat==='pastCust')return 'This past customer may be worth a soft reactivation note.';
  if(cat==='oldInq')  return 'They reached out in the past but we don\'t show a completed event. Soft nurture opportunity.';
  return '';
}

function getSuggestedAngle(cat){
  if(cat==='coldTent') return 'Low-pressure check-in to see if they\'re still thinking through catering and whether it\'d help to talk through next steps.';
  if(cat==='warmPros') return 'Helpful follow-up to see if they still need options or a quote.';
  if(cat==='defTouch') return 'Service check-in to make sure all the details are still accurate and nothing has changed.';
  if(cat==='pastCust') return 'Soft note staying in touch -- we\'d be happy to help if anything is coming up.';
  if(cat==='oldInq')   return 'Soft nurture note. Don\'t imply they booked with us before.';
  return '';
}

// ── WEEKLY SNAPSHOT ───────────────────────────────────────────────────────────
function startOfDay(ts){var d=new Date(ts||Date.now());d.setHours(0,0,0,0);return d;}

function buildSnapshot(){
  var now=new Date();
  var weekStart=startOfDay(now);
  weekStart.setDate(now.getDate()-now.getDay());
  var weekEnd=new Date(weekStart.getTime()+7*86400000);

  // Revenue
  var defThisWeek=(pipeline.futureDef||[]).filter(function(o){
    if(!o._date)return false;
    var d=new Date(o._date);return d>=weekStart&&d<weekEnd;
  });
  var confirmedRevWeek=defThisWeek.reduce(function(s,o){return s+getGrandTotal(o);},0);

  var monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  var defThisMonth=(pipeline.futureDef||[]).filter(function(o){
    if(!o._date)return false;
    return new Date(o._date)>=monthStart;
  });
  var confirmedRevMonth=defThisMonth.reduce(function(s,o){return s+getGrandTotal(o);},0);

  var pipelineVal=[].concat(pipeline.futureTent||[],pipeline.futurePros||[]).reduce(function(s,o){return s+getGrandTotal(o);},0);

  // Lead activity - last 7 days bar chart
  var days7=[];
  for(var i=6;i>=0;i--){
    var dayStart=startOfDay(Date.now()-i*86400000);
    var dayEnd=new Date(dayStart.getTime()+86400000);
    var count=allEvents.filter(function(ev){
      var raw=ev.raw||ev;
      var d=new Date(raw.created_at||ev.created_at);
      return !isNaN(d)&&d>=dayStart&&d<dayEnd;
    }).length;
    var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    days7.push({label:dayNames[dayStart.getDay()],count:count,isToday:i===0});
  }
  var maxDay=Math.max.apply(null,days7.map(function(d){return d.count;}));
  if(maxDay===0)maxDay=1;

  var today=startOfDay();
  var newToday=allEvents.filter(function(ev){
    var raw=ev.raw||ev;
    var d=new Date(raw.created_at||ev.created_at);
    return !isNaN(d)&&d>=today;
  }).length;

  var thisWeekCount=days7.reduce(function(s,d){return s+d.count;},0);
  var lwStart=startOfDay(Date.now()-14*86400000);
  var lwEnd=startOfDay(Date.now()-7*86400000);
  var lastWeekCount=allEvents.filter(function(ev){
    var raw=ev.raw||ev;
    var d=new Date(raw.created_at||ev.created_at);
    return !isNaN(d)&&d>=lwStart&&d<lwEnd;
  }).length;
  var trend=lastWeekCount>0?Math.round(((thisWeekCount-lastWeekCount)/lastWeekCount)*100):null;

  // Status breakdown this week
  var sw7Start=startOfDay(Date.now()-7*86400000);
  var statusBreak={};
  allEvents.filter(function(ev){
    var raw=ev.raw||ev;
    var d=new Date(raw.created_at||ev.created_at);
    return !isNaN(d)&&d>=sw7Start;
  }).forEach(function(ev){
    var s=(ev.status||'UNKNOWN').toUpperCase();
    statusBreak[s]=(statusBreak[s]||0)+1;
  });

  var sparkHtml='';
  days7.forEach(function(d){
    var barH=d.count>0?Math.max(Math.round(d.count/maxDay*100),8):0;
    sparkHtml+='<div class="spark-col">'
      +'<div class="spark-count">'+(d.count||'')+'</div>'
      +'<div class="spark-track"><div class="spark-bar" style="height:'+barH+'%;background:'+(d.isToday?'var(--orange)':'var(--border2)')+'"></div></div>'
      +'<div class="spark-day'+(d.isToday?' today':'')+'">'+d.label+'</div>'
      +'</div>';
  });

  var statusPills='';
  var statColors={TENTATIVE:'var(--yellow)',PROSPECT:'var(--purple)',DEFINITE:'var(--green)',CLOSED:'var(--blue)',LOST:'var(--red)'};
  Object.keys(statusBreak).sort(function(a,b){return statusBreak[b]-statusBreak[a];}).forEach(function(s){
    var col=statColors[s]||'var(--mute)';
    statusPills+='<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.62rem;padding:2px 7px;background:'+col+'1a;color:'+col+'">'+s+' '+statusBreak[s]+'</span> ';
  });

  var trendHtml='';
  if(trend!==null){
    var tCol=trend>=0?'var(--green)':'var(--red)';
    var tBg=trend>=0?'var(--green-dim)':'var(--red-dim)';
    trendHtml='<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.62rem;padding:2px 7px;background:'+tBg+';color:'+tCol+'">'+(trend>=0?'+':'')+trend+'% vs last wk</span>';
  }

  var revenueNote=confirmedRevWeek===0&&confirmedRevMonth===0
    ?'<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.63rem;color:var(--mute);margin-top:10px">Revenue reflects amounts entered in Tripleseat on Definite events. $0 means amounts not yet entered.</div>'
    :'';

  return '<div class="snapshot-grid">'
    +'<div class="snapshot-panel">'
    +'<div class="snapshot-label">Expected Revenue</div>'
    +'<div style="display:flex;flex-direction:column;gap:14px">'
    +'<div><div class="snapshot-big" style="color:var(--green)">'+fmtMoney(confirmedRevWeek)+'</div>'
    +'<div class="snapshot-sub">CONFIRMED THIS WEEK &middot; '+defThisWeek.length+' event'+(defThisWeek.length!==1?'s':'')+'</div></div>'
    +'<div style="height:1px;background:var(--border)"></div>'
    +'<div style="display:flex;gap:24px">'
    +'<div><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:1.2rem;font-weight:700">'+fmtMoney(confirmedRevMonth)+'</div>'
    +'<div class="snapshot-sub">THIS MONTH &middot; '+defThisMonth.length+' events</div></div>'
    +'<div><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:1.2rem;font-weight:700;color:var(--yellow)">'+fmtMoney(pipelineVal)+'</div>'
    +'<div class="snapshot-sub">PIPELINE VALUE</div></div>'
    +'</div>'
    +revenueNote
    +'</div></div>'
    +'<div class="snapshot-panel">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">'
    +'<div class="snapshot-label" style="margin-bottom:0">Lead Activity</div>'
    +trendHtml
    +'</div>'
    +'<div class="spark-wrap">'+sparkHtml+'</div>'
    +'<div style="display:flex;gap:20px;margin-bottom:12px">'
    +'<div><div class="snapshot-big" style="color:var(--orange)">'+newToday+'</div><div class="snapshot-sub">TODAY</div></div>'
    +'<div><div class="snapshot-big">'+thisWeekCount+'</div><div class="snapshot-sub">THIS WEEK</div></div>'
    +'<div><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:2rem;font-weight:700;line-height:1;color:var(--dim)">'+lastWeekCount+'</div><div class="snapshot-sub">LAST WEEK</div></div>'
    +'</div>'
    +(statusPills?'<div style="display:flex;gap:4px;flex-wrap:wrap">'+statusPills+'</div>':'')
    +'</div></div>';
}

async function loadRows(table,select,order){
  var all=[],offset=0,limit=1000;
  while(true){
    var qs='select='+(select||'*')+'&limit='+limit+'&offset='+offset;
    if(order)qs+='&order='+order;
    var d=await fetch(API_ST+'?action=get-table&table='+table+'&qs='+encodeURIComponent(qs)).then(function(r){return r.json();}).catch(function(){return {rows:[]};});
    var rows=d.rows||[];all=all.concat(rows);
    if(rows.length<limit)break;offset+=limit;
  }
  return all;
}

async function fetchPages(endpoint){
  var all=[],page=1,total=1;
  while(page<=Math.min(total,150)){
    var res=await fetch(API_TS+'?endpoint='+endpoint+'&page='+page+'&limit=100');
    if(!res.ok)throw new Error('TS '+endpoint+' HTTP '+res.status);
    var data=await res.json();
    total=data.total_pages||1;(data.results||[]).forEach(function(r){all.push(r);});page++;
    if(page<=Math.min(total,150))await new Promise(function(r){setTimeout(r,80);});
  }
  return all;
}
async function batchPost(action,key,items,size){
  for(var i=0;i<items.length;i+=size){
    var chunk={};chunk[key]=items.slice(i,i+size);
    await sbPost(action,chunk);
  }
}
async function sbPost(action,body){
  var res=await fetch(API_ST+'?action='+action,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  var d=await res.json().catch(function(){return {};});
  if(!res.ok||d.ok===false)console.error('[store] '+action+':',d.error||res.status);
  return d;
}

function buildOutreach(leads,bookings,accounts,contacts){
  var map={},byC={},byA={};
  bookings.forEach(function(b){
    if(b.contact_id){byC[b.contact_id]=byC[b.contact_id]||[];byC[b.contact_id].push(b);}
    if(b.account_id){byA[b.account_id]=byA[b.account_id]||[];byA[b.account_id].push(b);}
  });
  var aMap={};accounts.forEach(function(a){aMap[a.id]=a;});
  contacts.forEach(function(c){
    var email=(c.email_address||c.email||'').toLowerCase().trim();if(!email)return;
    var acct=c.account_id?aMap[c.account_id]:null;
    var cb=(byC[c.id]||[]).concat(c.account_id?byA[c.account_id]||[]:[]);
    var uniq=[]; var seen={};cb.forEach(function(x){if(!seen[x.id]){seen[x.id]=1;uniq.push(x);}});
    var closed=uniq.filter(function(b){return(b.status||'').toUpperCase()==='CLOSED';});
    var def=uniq.filter(function(b){return(b.status||'').toUpperCase()==='DEFINITE';});
    var latest=uniq.slice().sort(function(a,b){return new Date(b.updated_at||0)-new Date(a.updated_at||0);})[0];
    map[email]={id:email,ts_contact_id:c.id,ts_account_id:c.account_id||null,first_name:c.first_name,last_name:c.last_name,email:email,company:(acct&&acct.name)||c.company||null,account_status:closed.length?'past_customer':def.length?'past_definite':uniq.length?'active_lead':'never_booked',booking_statuses:Array.from(new Set(uniq.map(function(b){return(b.status||'').toUpperCase();}))),booking_count:uniq.length,last_event_date:(closed[0]&&closed[0].start_date)||(def[0]&&def[0].start_date)||(latest&&latest.start_date)||null,last_booking_status:(latest&&(latest.status||'').toUpperCase())||null,total_guests:uniq.reduce(function(s,b){return s+(parseInt(b.guest_count)||0);},0),tags:[],updated_at:new Date().toISOString()};
  });
  leads.forEach(function(l){
    var email=(l.email_address||l.email||'').toLowerCase().trim();if(!email||map[email])return;
    map[email]={id:email,ts_contact_id:null,ts_account_id:null,first_name:l.first_name,last_name:l.last_name,email:email,company:l.company||null,account_status:'never_booked',booking_statuses:[],booking_count:0,last_event_date:l.event_date||null,last_booking_status:null,total_guests:parseInt(l.guest_count)||0,tags:[],updated_at:new Date().toISOString()};
  });
  return Object.values(map);
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(t){
  activeTab=t;
  ['cmd','tent','prospect','definite','closed','lost','years','queue','debug'].forEach(function(x){
    document.getElementById('pane-'+x).style.display=x===t?'block':'none';
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  renderTab(t);
}
function renderTab(t){
  if(t==='cmd')renderCmd();
  else if(t==='tent')renderCat('futureTent');
  else if(t==='prospect')renderCat('futurePros');
  else if(t==='definite')renderCat('futureDef');
  else if(t==='closed')renderPast();
  else if(t==='lost')renderOld();
  else if(t==='years')renderYears();
  else if(t==='queue')renderQueue();
  else if(t==='debug')renderDebug();
}
function updateBadges(){
  var p=pipeline;
  document.getElementById('bg-tent').textContent=(p.futureTent||[]).length;
  document.getElementById('bg-prospect').textContent=(p.futurePros||[]).length;
  document.getElementById('bg-definite').textContent=(p.futureDef||[]).length;
  document.getElementById('bg-closed').textContent=(p.closed||[]).length+(p.pastDef||[]).length;
  document.getElementById('bg-lost').textContent=(p.lost||[]).length+(p.pastTent||[]).length+(p.pastPros||[]).length;

}

// ── COMMAND CENTER ────────────────────────────────────────────────────────────
function renderCmd(){
  var p=document.getElementById('pane-cmd');
  if(!dbConfigured){renderSetupPane('pane-cmd');return;}
  if(!allEvents.length){p.innerHTML='<div class="empty"><div class="empty-icon">&#9677;</div><div class="empty-title">No data loaded</div><div class="empty-sub">Click Sync to import from Tripleseat</div><br><button class="btn btn-primary" onclick="doFullSync()" style="margin:0 auto;display:flex">Sync now</button></div>';return;}

  var ft=pipeline.futureTent||[], fp=pipeline.futurePros||[], fd=pipeline.futureDef||[];
  var pastCust=(pipeline.closed||[]).concat(pipeline.pastDef||[]);
  var oldInq=(pipeline.pastTent||[]).concat(pipeline.pastPros||[],pipeline.lost||[]);

  // Radar sections — threshold-filtered and snooze-filtered
  var coldTent=ft.filter(function(o){
    if(isSnoozed(o))return false;
    var ds=daysAgo(o.updated_at||o.created_at), dt=daysUntil(o._date);
    var g=parseInt((o.raw||o).guest_count)||0;
    return ds>7||(dt!==null&&dt>=0&&dt<=90)||g>=100;
  }).sort(function(a,b){return daysAgo(b.updated_at||b.created_at)-daysAgo(a.updated_at||a.created_at);}).slice(0,8);

  var warmPros=fp.filter(function(o){
    if(isSnoozed(o))return false;
    var ds=daysAgo(o.updated_at||o.created_at), dt=daysUntil(o._date);
    return ds>3||(dt!==null&&dt>=0&&dt<=90);
  }).sort(function(a,b){return daysAgo(b.updated_at||b.created_at)-daysAgo(a.updated_at||a.created_at);}).slice(0,6);

  var defTouch=fd.filter(function(o){
    if(isSnoozed(o))return false;
    var ds=daysAgo(o.updated_at||o.created_at), dt=daysUntil(o._date);
    return ds>20||(dt!==null&&dt>=0&&dt<=60);
  }).sort(function(a,b){return daysUntil(a._date)-daysUntil(b._date);}).slice(0,4);

  var reactivate=pastCust.filter(function(o){return !isSnoozed(o);})
    .sort(function(a,b){return (parseInt((b.raw||b).guest_count)||0)-(parseInt((a.raw||a).guest_count)||0);}).slice(0,5);

  var nurture=oldInq.filter(function(o){return !isSnoozed(o);}).slice(0,4);
  var touchedToday=Object.keys(sessionStorage).filter(function(k){return k.startsWith('srg_snz_');}).length;
  var drafts=queue.filter(function(q){return['needs_review','approved'].indexOf(q.status)>=0;}).length;
  var guests=ft.reduce(function(s,o){return s+(parseInt((o.raw||o).guest_count)||0);},0);

  var html='<div style="margin-bottom:20px">'
    +'<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px">Command Center</div>'
    +'<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.67rem;color:var(--mute);letter-spacing:.08em">RELATIONSHIPS AND EVENTS WORTH KEEPING WARM TODAY</div>'
    +'</div>'
    +buildSnapshot()
    +'<div class="stat-grid">'
    +sc(coldTent.length,'Getting Cold','orange','tent')
    +sc(warmPros.length,'Warm Up','','prospect')
    +sc(defTouch.length,'Def. Touchpoints','green','definite')
    +sc(reactivate.length,'Re-engage','blue','closed')
    +sc(guests?guests.toLocaleString():'--','Tent. Guests','yellow',null)
    +sc(touchedToday,'Touched','green',null)
    +sc(drafts,'Drafts Ready','orange','queue')
    +'</div>'
    +radarSection('Tentative Getting Cold',coldTent,'coldTent','These tentative events may be getting cold. Worth keeping warm.','orange',ft.length,"showTab('tent')")
    +radarSection('Prospects to Warm Up',warmPros,'warmPros','These prospects could use a follow-up before they go quiet.','purple',fp.length,"showTab('prospect')")
    +radarSection('Upcoming Definite Touchpoints',defTouch,'defTouch',"Booked events coming up where we don't show a recent touchpoint. Service check-in, not sales.",'green',fd.length,"showTab('definite')")
    +radarSection('Past Customers to Re-engage',reactivate,'pastCust','Past customers who may be worth a soft reactivation note.','blue',pastCust.length,"showTab('closed')")
    +radarSection('Old Inquiries to Nurture',nurture,'oldInq',"Reached out in the past but we don't show a completed event. Soft nurture only.",'mute',oldInq.length,"showTab('lost')");

  p.innerHTML=html;
}

function sc(n,l,color,tab){
  return '<div class="stat-cell"'+(tab?' onclick="'+tab+'(\''+tab+'\')"':'')+(tab?'':' style="cursor:default"')+'>'
    +'<div class="stat-num'+(color?' '+color:'')+'">'+( typeof n==='number'?n.toLocaleString():n)+'</div>'
    +'<div class="stat-label">'+l+'</div></div>';
}

function radarSection(title, list, cat, subtitle, color, allCount, linkAction){
  var colVar=color==='mute'?'var(--dim)':'var(--'+color+')';
  var cards=list.length===0
    ?'<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.68rem;color:var(--mute);padding:12px 0">Nothing flagged right now.</div>'
    :list.map(function(o){return radarCard(o,cat);}).join('');
  return '<div style="margin-bottom:28px">'
    +'<div class="sec-hdr">'
    +'<div>'
    +'<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:'+colVar+'">'+title+'</div>'
    +'<div style="font-size:.74rem;color:var(--mute);margin-top:2px">'+subtitle+'</div>'
    +'</div>'
    +'<button class="btn btn-ghost btn-sm" onclick="'+linkAction+'">All '+allCount+' &rarr;</button>'
    +'</div>'

}

function radarCard(o, cat){
  var contact=o._contact||getContact(o), date=o._date||getEventDate(o);
  var raw=o.raw||o, guests=parseInt(raw.guest_count)||0;
  var ds=daysAgo(o.updated_at||o.created_at), dt=date?daysUntil(date):null;
  var inQ=queue.some(function(q){return q.event_id===String(o.id)||q.contact_email===contact.email;});
  var reason=getRadarReason(o,cat), angle=getSuggestedAngle(cat);
  var conf=getConfidence(o), cl=confidenceLabel[conf];
  var isFut=['coldTent','warmPros','defTouch'].indexOf(cat)>=0;

  return '<div class="card low" id="rc-'+o.id+'" style="margin-bottom:8px">'
    +'<div class="card-top">'
    +'<div><div class="card-name">'+esc(contact.name||'Unknown')+'</div>'
    +(contact.company?'<div class="card-co">'+esc(contact.company)+'</div>':'')+'</div>'
    +'<div class="card-right">'
    +'<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.59rem;color:'+cl.color+';padding:2px 6px;background:'+cl.color+'1a">'+cl.text+'</span>'
    +statusDot(o.status,isFut)+'</div></div>'
    +'<div class="card-meta">'
    +(contact.email?'<div class="card-meta-item"><div class="card-meta-label">Email</div><div class="card-meta-value">'+esc(contact.email)+'</div></div>':'<div class="card-meta-item"><div class="card-meta-label">Email</div><div class="card-meta-value hot">not on file</div></div>')
    +(contact.phone?'<div class="card-meta-item"><div class="card-meta-label">Phone</div><div class="card-meta-value">'+esc(contact.phone)+'</div></div>':'')
    +(date?'<div class="card-meta-item"><div class="card-meta-label">Event Date</div><div class="card-meta-value">'+fmtDate(date)+(dt!==null&&dt>=0?' ('+dt+'d out)':'')+'</div></div>':'')
    +(guests?'<div class="card-meta-item"><div class="card-meta-label">Guests</div><div class="card-meta-value">'+guests+'</div></div>':'')
    +(ds!==null?'<div class="card-meta-item"><div class="card-meta-label">Last Updated</div><div class="card-meta-value'+(ds>14?' hot':ds>7?' warm':'')+'">'+ds+'d ago</div></div>':'')
    +'</div>'
    +(contact.email&&sentMap[contact.email]?'<div class="card-meta-item"><div class="card-meta-label">Last Sent</div><div class="card-meta-value">'+daysAgo(sentMap[contact.email])+'d ago</div></div>':'')

    +(angle?'<div style="font-size:.74rem;color:var(--mute);padding:5px 0 8px 0"><span style="font-family:\'IBM Plex Mono\',monospace;font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em">Suggested angle</span><br>'+esc(angle)+'</div>':'')
    +'<div class="card-footer">'
    +(inQ?'<span class="in-queue-badge">&#10003; Draft in queue</span>':'<button class="btn btn-primary btn-sm" onclick="queueOne(\''+esc(String(o.id))+'\')">Draft note</button>')
    +(contact.email?'<a href="mailto:'+esc(contact.email)+'" class="btn btn-ghost btn-sm">Email</a>':'')
    +(contact.phone?'<a href="tel:'+esc(contact.phone)+'" class="btn btn-ghost btn-sm">Call</a>':'')
    +'<button class="btn btn-ghost btn-sm" onclick="markTouched(\''+String(o.id)+'\',\''+cat+'\')" style="color:var(--green);border-color:rgba(0,232,122,.2)">&#10003; Touched</button>'
    +'<button class="btn btn-ghost btn-sm" onclick="doSnooze(\''+String(o.id)+'\')" style="font-size:.63rem">Snooze</button>'
    +'</div></div>';
}

// Update markTouched and doSnooze to use event id strings
function markTouched(evId, cat){
  var days={coldTent:7,warmPros:5,defTouch:20,pastCust:30,oldInq:45}[cat]||7;
  snoozeEv(evId,days);
  var el=document.getElementById('rc-'+String(evId));
  if(el){el.style.transition='opacity .3s';el.style.opacity='0';setTimeout(function(){el.remove();},300);}
}
function doSnooze(evId){
  snoozeEv(evId,7);
  var el=document.getElementById('rc-'+String(evId));
  if(el){el.style.transition='opacity .3s';el.style.opacity='0';setTimeout(function(){el.remove();},300);}
}

  return '<div class="card past">'
    +'<div class="card-top"><div><div class="card-name">'+esc(contact.name||'Unknown')+'</div>'
    +(contact.company?'<div class="card-co">'+esc(contact.company)+'</div>':'')+'</div>'
    +statusDot(o.status,false)+'</div>'
    +'<div class="card-meta">'
    +(contact.email?'<div class="card-meta-item"><div class="card-meta-label">Email</div><div class="card-meta-value">'+esc(contact.email)+'</div></div>':'<div class="card-meta-item"><div class="card-meta-label">Email</div><div class="card-meta-value hot">not on file</div></div>')
    +(contact.phone?'<div class="card-meta-item"><div class="card-meta-label">Phone</div><div class="card-meta-value">'+esc(contact.phone)+'</div></div>':'')
    +(date?'<div class="card-meta-item"><div class="card-meta-label">Event Date</div><div class="card-meta-value">'+fmtDate(date)+'</div></div>':'')
    +(guests?'<div class="card-meta-item"><div class="card-meta-label">Guests</div><div class="card-meta-value">'+guests+'</div></div>':'')
    +(ds!==null?'<div class="card-meta-item"><div class="card-meta-label">Updated</div><div class="card-meta-value">'+ds+'d ago</div></div>':'')
    +(contact.email&&sentMap[contact.email]?'<div class="card-meta-item"><div class="card-meta-label">Last Sent</div><div class="card-meta-value">'+(daysAgo(sentMap[contact.email]))+'d ago</div></div>':'')
    +'</div><div class="card-footer">'
    +(inQ?'<span class="in-queue-badge">&#10003; In queue</span>':'<button class="btn btn-primary btn-sm" onclick="queueOne(\''+esc(String(o.id))+'\')">&#10024; Draft '+draftLabel+'</button>')
    +(contact.email?'<a href="mailto:'+esc(contact.email)+'" class="btn btn-ghost btn-sm">Email</a>':'')
    +'</div></div>';
}

// ── EMAIL QUEUE ───────────────────────────────────────────────────────────────
var WFC={draft_needed:'var(--mute)',draft_generated:'var(--blue)',needs_review:'var(--yellow)',approved:'var(--orange)',ready_to_send:'var(--green)',sent:'var(--green)',skipped:'var(--mute)',failed:'var(--red)'};
var WFL={draft_needed:'Draft needed',draft_generated:'Generated',needs_review:'Needs review',approved:'Approved',ready_to_send:'Ready',sent:'Sent',skipped:'Skipped',failed:'Failed'};
function renderQueue(){
  var p=document.getElementById('pane-queue');
  if(!queue.length){p.innerHTML='<div class="empty"><div class="empty-icon">&#9993;</div><div class="empty-title">Queue is empty</div><div class="empty-sub">Click "Draft" on any event card</div></div>';updateBadges();return;}
  var byS={};queue.forEach(function(q){byS[q.status]=(byS[q.status]||0)+1;});
  var needDraft=queue.filter(function(q){return q.status==='draft_needed';}).length;
  var needReview=queue.filter(function(q){return['needs_review','draft_generated'].indexOf(q.status)>=0;}).length;
  var legend=Object.keys(WFL).map(function(k){return'<span class="queue-pill" style="color:'+WFC[k]+';background:'+WFC[k]+'1a">'+WFL[k]+' ('+(byS[k]||0)+')</span>';}).join('');
  var items=queue.map(function(item){
    var sc=WFC[item.status]||'var(--mute)', sl=WFL[item.status]||item.status;
    var hasRisks=(item.risk_flags||[]).some(function(f){return f&&f!=='none';});
    return '<div class="card '+(['approved','ready_to_send'].indexOf(item.status)>=0?'high':'low')+'" id="qc-'+item.id+'">'
      +'<div class="card-top"><div><div class="card-name">'+esc(item.contact_name||'Unknown')+(item.company?' <span style="font-size:.71rem;color:var(--dim);font-weight:400">'+esc(item.company)+'</span>':'')+'</div>'
      +'<div class="card-co">'+esc(item.contact_email||'')+(item.subject?' &middot; '+esc(item.subject):'')+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:6px">'
      +(hasRisks?'<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.6rem;color:var(--yellow);background:var(--yellow-dim);padding:2px 6px">&#9888; REVIEW</span>':'')
      +'<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.6rem;padding:2px 7px;letter-spacing:.07em;text-transform:uppercase;color:'+sc+';background:'+sc+'1a">'+sl+'</span>'
      +'</div></div>'
      +(item.body?'<div class="draft-preview">'+esc(item.body)+'</div>':'')
      +'<div class="card-footer">'
      +(item.status==='draft_needed'?'<button class="btn btn-primary btn-sm" onclick="generateOne(\''+item.id+'\')">Generate</button>':'')
      +(['draft_generated','needs_review'].indexOf(item.status)>=0?'<button class="btn btn-ghost btn-sm" onclick="openModal(\''+item.id+'\')">Review'+(hasRisks?' &#9888;':'')+'</button><button class="btn btn-success btn-sm" onclick="approveItem(\''+item.id+'\')">&#10003; Approve</button>':'')
      +(item.status==='approved'?'<button class="btn btn-success btn-sm" onclick="markReady(\''+item.id+'\')">Ready</button><button class="btn btn-ghost btn-sm" onclick="openModal(\''+item.id+'\')">View</button>':'')
      +(item.status==='ready_to_send'?'<button class="btn btn-ghost btn-sm" onclick="openModal(\''+item.id+'\')">Copy &amp; send</button><button class="btn btn-success btn-sm" onclick="markSent(\''+item.id+'\')">&#10003; Sent</button>':'')
      +(['sent','skipped'].indexOf(item.status)<0?'<button class="btn btn-ghost btn-sm" onclick="skipItem(\''+item.id+'\')">Skip</button>':'')
      +'<button class="btn btn-danger btn-sm" onclick="removeItem(\''+item.id+'\')">Remove</button>'
      +'</div></div>';
  }).join('');
  p.innerHTML='<div class="queue-legend">'+legend+'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">'
    +'<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:1.1rem;font-weight:700;text-transform:uppercase">'+queue.length+' in queue</div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
    +(needDraft?'<button class="btn btn-primary btn-sm" onclick="generateAll()">Generate '+needDraft+'</button>':'')
    +(needReview?'<button class="btn btn-success btn-sm" onclick="approveAllReady()">&#10003; Approve all</button>':'')
    +'<button class="btn btn-ghost btn-sm" onclick="clearQueue()">Clear</button></div></div>'
    +'<div class="warn-notice">&#128232; No email provider connected. Copy approved emails and send manually.</div>'
    +items;
  updateBadges();
}

// ── DEBUG ─────────────────────────────────────────────────────────────────────
function renderDebug(){
  var p=document.getElementById('pane-debug');
  p.innerHTML='<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:1.1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px">Debug / Sync Status</div>'
    +'<div class="debug-box" id="debug-box">Loading...</div>'
    +'<div style="margin-top:10px;display:flex;gap:7px;flex-wrap:wrap">'
    +'<button class="btn btn-primary btn-sm" onclick="loadDebug()">Refresh</button>'
    +'<button class="btn btn-ghost btn-sm" onclick="doFullSync()">&#8635; Full Sync</button></div>';
  loadDebug();
}
async function loadDebug(){
  var el=document.getElementById('debug-box');if(!el)return;
  try{
    var data=await fetch(API_ST+'?action=debug').then(function(r){return r.json();});
    var sb={};allEvents.forEach(function(ev){var s=ev.status||'UNKNOWN';sb[s]=(sb[s]||0)+1;});
    var ps={};Object.keys(pipeline).forEach(function(k){ps[k]=(pipeline[k]||[]).length;});
    el.textContent=JSON.stringify({supabase:{configured:data.configured,tableCounts:data.tableCounts,syncMetadata:data.syncMetadata},local:{eventsLoaded:allEvents.length,statusBreakdown:sb,pipeline:ps,queue:queue.length,note:'TripleSeat uses 2000-01-01 as placeholder for no date'}},null,2);
  }catch(e){if(el)el.textContent='Error: '+e.message;}
}

// ── QUEUE ACTIONS ─────────────────────────────────────────────────────────────
function queueOne(eventId){
  var ev=allEvents.filter(function(e){return String(e.id)===String(eventId);})[0];
  if(!ev){console.warn('Event not found:',eventId);return;}
  var contact=getContact(ev);
  if(queue.filter(function(q){return q.event_id===String(eventId)||q.contact_email===contact.email;}).length){alert('Already in queue.');return;}
  var item={id:'q_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),event_id:String(ev.id),contact_email:contact.email||'',contact_name:contact.name,company:contact.company||'',campaign_id:getCat(ev),subject:'',body:'',risk_flags:[],status:'draft_needed',ts_status:ev.status,is_future:isFuture(ev),_ev:ev,created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
  queue.push(item);saveQItem(item);updateBadges();showTab('queue');
}
function clearQueue(){if(!confirm('Clear all?'))return;queue=[];fetch(API_ST+'?action=bulk-save-queue',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({queue:[]})}).catch(function(){});updateBadges();renderQueue();}
function approveAllReady(){queue.filter(function(q){return['needs_review','draft_generated'].indexOf(q.status)>=0;}).forEach(function(q){q.status='approved';q.updated_at=new Date().toISOString();updQItem(q);});updateBadges();renderQueue();}
function approveItem(id){var i=queue.filter(function(q){return q.id===id;})[0];if(i){i.status='approved';i.updated_at=new Date().toISOString();updQItem(i);updateBadges();renderQueue();}}
function skipItem(id){var i=queue.filter(function(q){return q.id===id;})[0];if(i){i.status='skipped';i.updated_at=new Date().toISOString();updQItem(i);renderQueue();}}
function markReady(id){var i=queue.filter(function(q){return q.id===id;})[0];if(i){i.status='ready_to_send';i.updated_at=new Date().toISOString();updQItem(i);renderQueue();}}
function markSent(id){
  var i=queue.filter(function(q){return q.id===id;})[0];if(!i)return;
  i.status='sent';i.sent_at=new Date().toISOString();i.updated_at=new Date().toISOString();updQItem(i);
  fetch(API_ST+'?action=record-sent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:i.contact_email,name:i.contact_name,campaign:i.campaign_id,subject:i.subject,body:i.body})}).catch(function(){});
  renderQueue();
}
function removeItem(id){queue=queue.filter(function(q){return q.id!==id;});fetch(API_ST+'?action=bulk-save-queue',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({queue:queue})}).catch(function(){});updateBadges();renderQueue();}
async function saveQItem(item){await fetch(API_ST+'?action=save-queue-item',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)}).catch(function(){});}
async function updQItem(item){await fetch(API_ST+'?action=update-queue-item',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)}).catch(function(){});}

// ── EMAIL GENERATION ──────────────────────────────────────────────────────────
async function generateOne(itemId){
  var item=queue.filter(function(q){return q.id===itemId;})[0];if(!item)return;
  item.status='draft_generated';renderQueue();
  var ev=item._ev||allEvents.filter(function(e){return String(e.id)===item.event_id;})[0]||{};
  var raw=ev.raw||ev, contact=getContact(ev);
  try{
    var res=await fetch(API_AI,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contact:{first_name:contact.first,last_name:contact.last,email:contact.email,company:contact.company,event_date:getEventDate(ev),event_description:raw.name||ev.name||'',guest_count:raw.guest_count||ev.guest_count||null,location_name:ev.location_name||(raw.location&&raw.location.name)||'',last_booking_status:ev.status,is_future:isFuture(ev),pipeline_category:item.campaign_id},campaign:item.campaign_id})});
    var data=await res.json();
    if(!res.ok)throw new Error(data.error||'HTTP '+res.status);
    item.subject=(data.subject||'Following up').replace(/\u2014/g,'-').replace(/\u2013/g,'-');
    item.body=(data.body||'Could not generate.').replace(/\u2014/g,'-').replace(/\u2013/g,'-');
    item.risk_flags=data.riskFlags||[];item.status='needs_review';
  }catch(err){item.body='Error: '+err.message;item.risk_flags=[];item.status='needs_review';}
  item.updated_at=new Date().toISOString();updQItem(item);renderQueue();updateBadges();
}
async function generateAll(){
  var pending=queue.filter(function(q){return q.status==='draft_needed';});if(!pending.length)return;
  var btn=document.querySelector('[onclick="generateAll()"]');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Generating...';}
  for(var i=0;i<pending.length;i++){await generateOne(pending[i].id);if(i<pending.length-1)await new Promise(function(r){setTimeout(r,350);});}
  if(btn){btn.disabled=false;btn.innerHTML='Generate';}
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(itemId){
  var item=queue.filter(function(q){return q.id===itemId;})[0];if(!item)return;
  modalQueueId=itemId;
  document.getElementById('modal-title').textContent='DRAFT -- '+(item.contact_name||'Unknown').toUpperCase();
  document.getElementById('modal-sub').value=item.subject||'';
  document.getElementById('modal-body-text').value=item.body||'';
  var flags=(item.risk_flags||[]).filter(function(f){return f&&f!=='none';});
  document.getElementById('modal-risks').innerHTML=flags.map(function(f){return'<div class="risk-flag">&#9888; '+esc(f)+'</div>';}).join('');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){
  if(modalQueueId){var i=queue.filter(function(q){return q.id===modalQueueId;})[0];if(i){i.subject=document.getElementById('modal-sub').value;i.body=document.getElementById('modal-body-text').value;i.updated_at=new Date().toISOString();updQItem(i);}}
  document.getElementById('modal-overlay').classList.remove('open');modalQueueId=null;renderQueue();
}
function approveFromModal(){
  if(modalQueueId){var i=queue.filter(function(q){return q.id===modalQueueId;})[0];if(i){i.subject=document.getElementById('modal-sub').value;i.body=document.getElementById('modal-body-text').value;i.status='approved';i.approved_at=new Date().toISOString();i.updated_at=new Date().toISOString();updQItem(i);}}
  closeModal();
}
function copyModal(){
  navigator.clipboard.writeText('Subject: '+document.getElementById('modal-sub').value+'\n\n'+document.getElementById('modal-body-text').value)
    .then(function(){var b=document.querySelector('.modal-foot button:nth-child(2)');if(b){b.textContent='Copied!';setTimeout(function(){b.textContent='Copy';},2000);}});
}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── SETUP ─────────────────────────────────────────────────────────────────────
function renderSetup(errMsg){
  document.getElementById('pane-cmd').innerHTML='<div class="setup"><h3>&#9881; Supabase not connected'+(errMsg?' -- '+errMsg:'')+'</h3><ol><li>Go to <strong>supabase.com</strong> and open your project</li><li>Settings &rarr; API &rarr; copy <strong>Project URL</strong> &rarr; set as <code>SUPABASE_URL</code> in Netlify</li><li>Copy <strong>service_role key</strong> &rarr; set as <code>SUPABASE_KEY</code></li><li>Netlify &rarr; Deploys &rarr; Trigger deploy &rarr; refresh &rarr; Sync</li></ol><div style="margin-top:14px;display:flex;gap:8px"><button class="btn btn-primary" onclick="doFullSync()">&#8635; Sync</button><button class="btn btn-ghost" onclick="showTab(\'debug\')">Debug &rarr;</button></div></div>';
}
function renderSetupPane(id){document.getElementById(id).innerHTML='<div class="empty"><div class="empty-icon">&#9881;</div><div class="empty-title">Supabase not connected</div><div class="empty-sub">See Command Center</div></div>';}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadFromDB();
</script>
