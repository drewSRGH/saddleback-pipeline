<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saddleback — Outreach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f0f0e;--s:#181817;--s2:#1f1f1d;--b:#2a2a27;--b2:#333330;--t:#f0ede8;--m:#8a8780;--m2:#5a5855;--a:#e8772a;--a2:#f5a623;--g:#4caf7d;--r:#e05252;--y:#f5a623;--bl:#5b8dee;--pu:#9b7edb;--te:#3dbdb0;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:14px;line-height:1.5}
    nav{display:flex;align-items:center;padding:0 24px;background:var(--s);border-bottom:1px solid var(--b);height:52px;position:sticky;top:0;z-index:50}
    .nb{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;color:var(--a2);margin-right:28px;text-decoration:none}
    .nt{display:flex}
    .ntb{padding:0 14px;height:52px;display:flex;align-items:center;font-size:.82rem;font-weight:500;color:var(--m);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;text-decoration:none}
    .ntb:hover{color:var(--t)}
    .ntb.active{color:var(--t);border-bottom-color:var(--a)}
    .nr{margin-left:auto;display:flex;align-items:center;gap:10px}
    .page{padding:18px 24px;max-width:1400px;margin:0 auto}
    /* TABS */
    .tabs{display:flex;gap:2px;border-bottom:1px solid var(--b);margin-bottom:22px;overflow-x:auto}
    .tab{padding:10px 16px;font-size:.82rem;font-weight:500;color:var(--m);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:color .15s,border-color .15s}
    .tab:hover{color:var(--t)}
    .tab.active{color:var(--t);border-bottom-color:var(--a);font-weight:600}
    .bge{display:inline-block;background:rgba(232,119,42,.15);color:var(--a);border-radius:20px;padding:1px 6px;font-size:.66rem;font-family:'DM Mono',monospace;margin-left:4px}
    .bge.g{background:rgba(76,175,125,.15);color:var(--g)}
    .bge.r{background:rgba(224,82,82,.15);color:var(--r)}
    /* GRID */
    .sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;margin-bottom:20px}
    .sc{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:13px 15px}
    .sn{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;color:var(--t);line-height:1}
    .sl{font-size:.66rem;color:var(--m);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-top:4px}
    /* PROGRESS */
    .pw{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:13px 16px;margin-bottom:18px}
    .pl{font-size:.76rem;color:var(--m);margin-bottom:7px;font-family:'DM Mono',monospace}
    .pb{background:var(--s2);border-radius:4px;height:5px;overflow:hidden}
    .pf{height:100%;background:var(--a);border-radius:4px;transition:width .3s}
    /* STATUS */
    .sm{font-size:.78rem;padding:9px 13px;border-radius:7px;margin-bottom:14px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:8px}
    .sm.ld{background:rgba(91,141,238,.1);color:var(--bl);border:1px solid rgba(91,141,238,.2)}
    .sm.ok{background:rgba(76,175,125,.1);color:var(--g);border:1px solid rgba(76,175,125,.2)}
    .sm.er{background:rgba(224,82,82,.1);color:var(--r);border:1px solid rgba(224,82,82,.2)}
    .sm.wa{background:rgba(245,166,35,.1);color:var(--y);border:1px solid rgba(245,166,35,.2)}
    /* BUTTONS */
    .btn{border:none;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
    .ba{background:var(--a);color:#fff;padding:7px 14px;font-size:.8rem}
    .ba:hover{background:#f08030}
    .ba:disabled{background:var(--b2);color:var(--m2);cursor:not-allowed}
    .bg_{background:transparent;color:var(--m);border:1px solid var(--b2);padding:6px 11px;font-size:.76rem}
    .bg_:hover{color:var(--t);border-color:var(--m)}
    .bge_{background:var(--g);color:#fff;padding:6px 13px;font-size:.78rem}
    .bge_:hover{background:#3d9d6a}
    .br_{background:transparent;color:var(--r);border:1px solid rgba(224,82,82,.3);padding:5px 9px;font-size:.73rem}
    .bs{padding:5px 9px;font-size:.72rem}
    /* CARDS */
    .card{background:var(--s);border:1px solid var(--b);border-radius:11px;padding:15px;margin-bottom:9px;transition:border-color .15s}
    .card:hover{border-color:var(--b2)}
    .card.approved{border-color:rgba(76,175,125,.4)}
    .card.skipped{opacity:.4}
    .card.active-lead{border-left:3px solid var(--g)}
    .card.past-customer{border-left:3px solid var(--a)}
    .card.never-booked{border-left:3px solid var(--m2)}
    .card.lost{border-left:3px solid var(--r);opacity:.6}
    .ch{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:9px}
    .cn{font-weight:600;font-size:.9rem;color:var(--t)}
    .cs{font-size:.72rem;color:var(--m);margin-top:2px}
    .cm{display:flex;gap:12px;flex-wrap:wrap;font-size:.7rem;color:var(--m2);font-family:'DM Mono',monospace;margin-bottom:7px}
    .cm span{color:var(--m)}
    .ct{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
    .tag{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
    .tc{background:rgba(91,141,238,.12);color:var(--bl)}
    .tq{background:rgba(224,82,82,.12);color:var(--r)}
    .ta{background:rgba(155,126,219,.12);color:var(--pu)}
    .tn{background:rgba(90,88,85,.2);color:var(--m)}
    .th{background:rgba(245,166,35,.12);color:var(--y)}
    .tm{background:rgba(61,189,176,.12);color:var(--te)}
    .tp{background:rgba(232,119,42,.12);color:var(--a)}
    .tal{background:rgba(76,175,125,.12);color:var(--g)}
    .tlost{background:rgba(224,82,82,.08);color:var(--r)}
    .cb{background:var(--s2);border-radius:7px;padding:11px 13px;font-size:.78rem;line-height:1.7;color:var(--m);white-space:pre-wrap;max-height:150px;overflow-y:auto;border-left:3px solid var(--b2);margin-bottom:11px}
    .cf{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding-top:9px;border-top:1px solid var(--b)}
    .sp{font-size:.66rem;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap}
    /* RISK FLAGS */
    .risk-flag{background:rgba(224,82,82,.08);border:1px solid rgba(224,82,82,.25);border-radius:6px;padding:7px 11px;font-size:.73rem;color:var(--r);margin-bottom:6px}
    /* COMPANY */
    .cc{background:var(--s);border:1px solid var(--b);border-radius:11px;padding:15px;margin-bottom:9px;cursor:pointer;transition:border-color .15s}
    .cc:hover{border-color:var(--b2)}
    .cc.exp{border-color:var(--a)}
    .cc-contacts{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--b)}
    .cc.exp .cc-contacts{display:block}
    .cm2{background:var(--s2);border-radius:7px;padding:9px 11px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    /* EMPTY */
    .emp{text-align:center;padding:50px 20px;color:var(--m2)}
    .emp-i{font-size:1.8rem;margin-bottom:10px;opacity:.4}
    .emp h3{font-size:.92rem;color:var(--m);margin-bottom:5px}
    .sp2{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    input[type=text]{background:var(--s);border:1px solid var(--b);color:var(--t);padding:7px 11px;border-radius:7px;font-size:.79rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
    input[type=text]:focus{border-color:var(--a)}
    input::placeholder{color:var(--m2)}
    select{background:var(--s);border:1px solid var(--b);color:var(--t);padding:7px 11px;border-radius:7px;font-size:.79rem;font-family:'DM Sans',sans-serif;outline:none}
    /* DEBUG */
    .debug-box{background:var(--s);border:1px solid var(--b2);border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:.73rem;color:var(--m);white-space:pre-wrap;line-height:1.6}
    /* MODAL */
    #mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;justify-content:center;align-items:center;padding:20px}
    #mo.open{display:flex}
    #md{background:var(--s);border:1px solid var(--b2);border-radius:15px;width:100%;max-width:660px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.5)}
    .mh{padding:16px 22px 13px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center}
    .mh h2{font-family:'Fraunces',serif;font-size:.98rem;font-weight:600;color:var(--t)}
    .mc_{background:none;border:none;color:var(--m);cursor:pointer;font-size:1.1rem;line-height:1}
    .ms{padding:9px 22px;border-bottom:1px solid var(--b)}
    .ms-l{font-size:.63rem;text-transform:uppercase;letter-spacing:.08em;color:var(--m2);margin-bottom:3px;font-weight:700}
    #msub{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:6px;color:var(--t);padding:7px 11px;font-size:.83rem;font-family:'DM Sans',sans-serif;outline:none}
    #msub:focus{border-color:var(--a)}
    .mb{padding:13px 22px;flex:1;overflow-y:auto}
    #memail{width:100%;min-height:240px;background:var(--s2);border:1px solid var(--b);border-radius:7px;color:var(--t);padding:13px;font-size:.81rem;line-height:1.65;resize:vertical;font-family:'DM Sans',sans-serif;outline:none}
    #memail:focus{border-color:var(--a)}
    .mf{padding:11px 22px;border-top:1px solid var(--b);display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap}
    .mf button{padding:7px 16px;border-radius:7px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
    #bam{background:var(--g);color:#fff}
    #bcm{background:var(--a);color:#fff}
    #bcm:hover{background:#f08030}
    #bclm{background:var(--s2);color:var(--m);border:1px solid var(--b2)}
  </style>
</head>

<div class="page">

    <div class="mh"><h2 id="mt">Review Email</h2><button class="mc_" onclick="closeModal()">✕</button></div>

<script>
const API_TS = '/.netlify/functions/tripleseat';
const API_AI = '/.netlify/functions/ai';
const API_ST = '/.netlify/functions/store';

// ── PERSONAL DOMAINS — never become companies ──────────────────────────────
const PD = new Set(['gmail.com','yahoo.com','hotmail.com','outlook.com','icloud.com','aol.com','live.com','msn.com','me.com','mac.com','comcast.net','att.net','verizon.net','sbcglobal.net','charter.net','cox.net','earthlink.net','protonmail.com','tutanota.com','ymail.com','googlemail.com','rocketmail.com','bellsouth.net','optonline.net','roadrunner.com','windstream.net','frontier.com','juno.com']);

const DM = {'msu.edu':'Michigan State University','michigan.gov':'State of Michigan','lsd.k12.mi.us':'Lansing School District','okemos.k12.mi.us':'Okemos Public Schools','ingham.org':'Ingham County','lansingmi.gov':'City of Lansing','deltadental.com':'Delta Dental','bcbsm.com':'Blue Cross Blue Shield','sparrow.org':'Sparrow Health System','mclaren.org':'McLaren Health','cooleylaw.edu':'Cooley Law School','occ.edu':'Oakland Community College','lcc.edu':'Lansing Community College'};

// ── STATE ──────────────────────────────────────────────────────────────────
let contacts=[], companies={}, queue=[], contacted={}, suppressed=new Set();
let activeTab='today', modalQueueId=null, storeOk=false, storeError='';

// ── CLEANUP old localStorage keys ─────────────────────────────────────────
(function(){ try{['srg-contacts','srg-lastsync','srg-queue','srg-contacted','srg-suppressed'].forEach(k=>{try{localStorage.removeItem(k);}catch(e){}});}catch(e){} })();

// ── STATUS ─────────────────────────────────────────────────────────────────
function setStatus(msg,type='ld'){const el=document.getElementById('status-msg');if(!msg){el.style.display='none';return;}el.className='sm '+type;el.innerHTML=msg;el.style.display='flex';}
function setProgress(pct,label){document.getElementById('progress-wrap').style.display='block';document.getElementById('pf').style.width=pct+'%';document.getElementById('pl').textContent=label;}
function hideProgress(){setTimeout(()=>{document.getElementById('progress-wrap').style.display='none';},2500);}

// ── DOMAIN & COMPANY ───────────────────────────────────────────────────────
function getDomain(email){if(!email)return null;const m=email.toLowerCase().match(/@([^@]+)$/);return(m&&!PD.has(m[1]))?m[1]:null;}
function domainName(d){if(!d)return null;if(DM[d])return DM[d];const b=d.replace(/\.(com|org|edu|gov|net|mil|k12\.mi\.us|mi\.us)$/,'').split('.').pop();return b.charAt(0).toUpperCase()+b.slice(1);}

// ── DEDUPLICATION ──────────────────────────────────────────────────────────
// Tripleseat returns one record per INQUIRY, not per person.
// Deduplicate by email (primary), then by name if no email.
// Keep the most recent record as the "primary" but collect all event history.
function deduplicateContacts(raw){
  const byEmail={}, byName={};
  raw.forEach(c=>{
    const email=(c.email_address||'').toLowerCase().trim();
    const name=[c.first_name,c.last_name].filter(Boolean).join(' ').toLowerCase().trim();
    const key=email||name;
    if(!key) return;
    if(!byEmail[key]){
      byEmail[key]={...c, _eventHistory:[]};
    }
    // Add this inquiry as an event history entry
    if(c.event_date||c.event_description){
      byEmail[key]._eventHistory.push({
        date:c.event_date, description:c.event_description, guests:c.guest_count,
        style:c.event_style, location:c.location?.name, notes:c.additional_information,
        created:c.created_at, status:c.turned_down_at?'turned_down':'submitted'
      });
    }
    // Keep most recent record's fields as primary (updated_at or created_at)
    const existingDate=new Date(byEmail[key].created_at||0);
    const thisDate=new Date(c.created_at||0);
    if(thisDate>existingDate){
      // Update primary fields but keep accumulated history
      const hist=byEmail[key]._eventHistory;
      byEmail[key]={...c, _eventHistory:hist};
    }
  });
  return Object.values(byEmail);
}

// ── ACCOUNT STATUS ─────────────────────────────────────────────────────────
function getAccountStatus(c){
  const now=Date.now();
  const eventTs=c.event_date?new Date(c.event_date).getTime():null;
  const createdTs=c.created_at?new Date(c.created_at).getTime():null;
  const updatedTs=c.updated_at?new Date(c.updated_at).getTime():null;
  const daysSinceCreated=createdTs?Math.floor((now-createdTs)/86400000):null;
  const daysSinceUpdated=updatedTs?Math.floor((now-updatedTs)/86400000):null;
  if(c.turned_down_at) return 'lost';
  // Future event = active
  if(eventTs&&eventTs>now) return 'active-upcoming';
  // Recently submitted (within 14 days) = active inquiry
  if(daysSinceCreated!==null&&daysSinceCreated<=14) return 'active-inquiry';
  // Recently updated (within 7 days) = someone touched it recently
  if(daysSinceUpdated!==null&&daysSinceUpdated<=7) return 'active-inquiry';
  // Past event date = past customer
  if(eventTs&&eventTs<now) return 'past-customer';
  // Old inquiry, no event date = inquired never booked
  if(daysSinceCreated!==null&&daysSinceCreated>14) return 'inquired-never-booked';
  return 'unknown';
}

const STATUS_LABELS={'active-upcoming':'Upcoming Event','active-inquiry':'Active Inquiry','past-customer':'Past Customer','inquired-never-booked':'Never Booked','lost':'Lost/Turned Down','unknown':'Unknown'};
const STATUS_COLORS={'active-upcoming':'var(--g)','active-inquiry':'var(--bl)','past-customer':'var(--a)','inquired-never-booked':'var(--m)','lost':'var(--r)','unknown':'var(--m2)'};

// ── TAGGING ────────────────────────────────────────────────────────────────
function tagContact(c){
  const tags=[], now=Date.now();
  const eventTs=c.event_date?new Date(c.event_date).getTime():null;
  const createdTs=c.created_at?new Date(c.created_at).getTime():null;
  const refTs=eventTs||createdTs;
  c._daysSince=refTs?Math.floor((now-refTs)/86400000):null;
  c._eventTs=eventTs; c._createdTs=createdTs;
  c._status=getAccountStatus(c);
  const domain=getDomain(c.email_address);
  c._domain=domain;
  if(!c.company&&domain) c._co=domainName(domain);
  const days=c._daysSince;
  if(days!==null){if(days>=180)tags.push('gone-quiet-6mo');if(days>=365)tags.push('gone-quiet-12mo');}
  if((c.company&&c.company.trim())||domain) tags.push('corporate');
  if(domain==='msu.edu'||(c.company||'').toLowerCase().includes('michigan state')||(c.company||'').toLowerCase().match(/\bmsu\b/)) tags.push('msu');
  if(c._status==='inquired-never-booked'||c._status==='lost') tags.push('no-booking');
  if((c.guest_count||0)>=75) tags.push('high-value');
  // Anniversary: event_date anniversary within next 90 days
  const annTs=eventTs||createdTs;
  if(annTs){
    const ref=new Date(annTs), yr=new Date().getFullYear()-ref.getFullYear();
    if(yr>=1){
      const ann=new Date(ref); ann.setFullYear(new Date().getFullYear());
      if(!isNaN(ann.getTime())){
        const dU=Math.floor((ann.getTime()-now)/86400000);
        if(dU>=-7&&dU<=90){tags.push('anniversary');c._annDays=dU;c._annWindow=dU<=30?'30d':dU<=60?'60d':'90d';}
      }
    }
  }
  const desc=(c.event_description||c.additional_information||'').toLowerCase();
  if(/graduat|commencement|class of/.test(desc)) tags.push('graduation');
  if(/holiday|christmas|xmas|thanksgiving|new year|year.end/.test(desc)) tags.push('holiday');
  if(/wedding|reception|bride|groom/.test(desc)) tags.push('wedding');
  if(/corporate|office|meeting|lunch|company|employee|staff|team|department/.test(desc)) tags.push('office-lunch');
  if(/football|spartan|game day|tailgate|watch party/.test(desc)) tags.push('msu-football');
  c._tags=tags;
  return c;
}

// ── SEASONAL CAMPAIGNS ─────────────────────────────────────────────────────
function getActiveCampaigns(){
  const now=new Date(), mo=now.getMonth(); // 0=Jan
  const active=[];
  if(mo>=3&&mo<=5) active.push('graduation'); // Apr-Jun
  if(mo>=6&&mo<=10) active.push('msu-football'); // Jul-Nov
  if(mo>=7&&mo<=9) active.push('back-to-school'); // Aug-Oct
  if(mo>=8&&mo<=11) active.push('holiday'); // Sep-Dec
  if(mo>=5&&mo<=7) active.push('summer'); // Jun-Aug
  return active;
}

// ── BUILD COMPANIES ────────────────────────────────────────────────────────
function buildCompanies(list){
  const map={};
  list.forEach(c=>{
    const name=c.company||c._co;
    const domain=c._domain;
    if((!name&&!domain)||!c.email_address) return;
    const key=(name||'').toLowerCase().trim()||(domain||'');
    if(!key) return;
    if(!map[key]) map[key]={name:name||domainName(domain)||key,domain,contacts:[],events:0,guests:0};
    map[key].contacts.push(c);
    if(c.event_date) map[key].events++;
    if(c.guest_count) map[key].guests+=(parseInt(c.guest_count)||0);
  });
  return Object.fromEntries(Object.entries(map).sort((a,b)=>b[1].contacts.length-a[1].contacts.length));
}

// ── DAILY BATCH ────────────────────────────────────────────────────────────
function buildBatch(n=50){
  const now=Date.now(), inQ=new Set(queue.map(q=>String(q.id)));
  const scored=[];
  contacts.forEach(c=>{
    if(!c.email_address||!c.email_address.includes('@')) return;
    if(inQ.has(String(c.id))) return;
    if(suppressed.has((c.email_address||'').toLowerCase())) return;
    // IMPORTANT: never queue active/open accounts for reactivation
    if(c._status==='active-upcoming'||c._status==='active-inquiry') return;
    if(contacted[String(c.id)]&&(now-contacted[String(c.id)])<30*86400000) return;
    let score=0,campaign=null;
    CAMPAIGNS.forEach(cam=>{if(cam.safeForReactivation&&cam.filter(c)){score+=cam.priority;if(!campaign||cam.priority>(CAMPAIGNS.find(x=>x.id===campaign)?.priority||0))campaign=cam.id;}});
    if(score>0) scored.push({contact:c,score,campaign});
  });
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,n);
}

// ── STORE LOAD / SAVE ──────────────────────────────────────────────────────
async function loadFromStore(){
  setStatus('Loading contacts from server…','ld');
  try{
    const metaRes=await fetch(`${API_ST}?action=get-metadata`);
    const meta=await metaRes.json().catch(()=>({}));
    if(meta.blobsAvailable===false||meta.error){
      storeOk=false; storeError=meta.error||'Netlify Blobs unavailable';
      setStatus(`⚠ Backend storage unavailable: ${storeError} — click Sync to load contacts for this session.`,'wa');
      renderTab(activeTab); return;
    }
    storeOk=true;
    if(!meta.totalContacts||meta.totalContacts===0){
      setStatus('No saved contacts. Click "↻ Sync" to import from Tripleseat.','wa');
      renderTab(activeTab); return;
    }
    setProgress(10,`Loading ${meta.totalContacts.toLocaleString()} contacts from server…`);
    const res=await fetch(`${API_ST}?action=get-contacts`);
    const data=await res.json().catch(()=>({contacts:[]}));
    if(!data.contacts?.length){setStatus('Server returned empty contacts. Try syncing.','wa');renderTab(activeTab);return;}
    setProgress(80,'Processing…');
    contacts=deduplicateContacts(data.contacts).map(tagContact);
    companies=buildCompanies(contacts);
    const qRes=await fetch(`${API_ST}?action=get-queue`);
    const qData=await qRes.json().catch(()=>({queue:[]}));
    queue=qData.queue||[];
    const coRes=await fetch(`${API_ST}?action=get-contacted`);
    contacted=await coRes.json().catch(()=>({}));
    const suRes=await fetch(`${API_ST}?action=get-suppressed`);
    const suData=await suRes.json().catch(()=>({list:[]}));
    suppressed=new Set((suData.list||[]).map(e=>e.toLowerCase()));
    setProgress(100,'✓ Contacts loaded');
    hideProgress();
    const d=meta.lastSync?new Date(meta.lastSync):null;
    document.getElementById('last-updated').textContent=d?'Synced '+d.toLocaleDateString():'';
    setStatus(`✓ ${contacts.length.toLocaleString()} contacts loaded (deduped from ${data.contacts.length.toLocaleString()} raw records) · last synced ${d?d.toLocaleDateString():'never'}`,'ok');
    setTimeout(()=>setStatus('',''),5000);
    updateBadges(); renderTab(activeTab);
    if(d&&(Date.now()-d.getTime())>3*86400000){setStatus(`Data is ${Math.floor((Date.now()-d.getTime())/86400000)} days old — consider syncing`,'wa');}
  }catch(err){
    setStatus('Error loading contacts: '+err.message,'er');
    console.error('Load error:',err);
    renderTab(activeTab);
  }
}

async function saveContacts(raw){
  if(!storeOk) return;
  try{
    setProgress(92,`Saving ${raw.length.toLocaleString()} contacts to server…`);
    const res=await fetch(`${API_ST}?action=save-contacts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contacts:raw})});
    const d=await res.json().catch(()=>({}));
    if(d.ok) setProgress(100,'✓ Saved to server');
    else {storeOk=false; storeError=d.error||'save failed'; console.warn('Save failed:',d);}
  }catch(e){storeOk=false;storeError=e.message;console.warn('Save error:',e);}
}
async function saveQueue(){if(!storeOk)return;try{await fetch(`${API_ST}?action=save-queue`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({queue})});}catch(e){}}
async function saveContacted(){if(!storeOk)return;try{await fetch(`${API_ST}?action=save-contacted`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(contacted)});}catch(e){}}
async function saveSuppressed(){if(!storeOk)return;try{await fetch(`${API_ST}?action=save-suppressed`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({list:[...suppressed]})});}catch(e){}}

// ── TRIPLESEAT SYNC ────────────────────────────────────────────────────────
async function syncFromTripleseat(bg=false){
  const btn=document.getElementById('btn-sync');
  if(btn){btn.disabled=true;btn.textContent='Syncing…';}
  if(!bg){setProgress(0,'Connecting to Tripleseat…');}
  const all=[];let page=1,totalPages=1;
  try{
    while(page<=Math.min(totalPages,90)){
      if(!bg) setProgress(Math.round(page/Math.min(totalPages,90)*80),`Page ${page} of ${Math.min(totalPages,90)} — ${all.length.toLocaleString()} leads…`);
      const res=await fetch(`${API_TS}?endpoint=leads&page=${page}&limit=100`);
      if(!res.ok) throw new Error(`Tripleseat HTTP ${res.status}`);
      const raw=await res.json();
      totalPages=raw.total_pages||1;
      (raw.results||[]).forEach(c=>all.push(c));
      page++;
      if(page<=Math.min(totalPages,90)) await new Promise(r=>setTimeout(r,80));
    }
    contacts=deduplicateContacts(all).map(tagContact);
    companies=buildCompanies(contacts);
    updateBadges(); renderTab(activeTab);
    document.getElementById('last-updated').textContent='Synced '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if(!bg) setStatus(`✓ Synced ${all.length.toLocaleString()} raw → ${contacts.length.toLocaleString()} unique contacts`,'ok');
    setTimeout(()=>setStatus('',''),5000);
    await saveContacts(all);
    hideProgress();
  }catch(err){
    setProgress(100,'Error: '+err.message);
    setStatus('Sync error: '+err.message,'er');
    console.error('Sync:',err);
  }
  if(btn){btn.disabled=false;btn.textContent='↻ Sync';}
}

// ── TABS ───────────────────────────────────────────────────────────────────
function showTab(t){
  activeTab=t;
  ['today','campaigns','open','past','companies','contacts','queue','suppressed','debug'].forEach(x=>{
    document.getElementById('pane-'+x).style.display=x===t?'block':'none';
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  renderTab(t);
}
function renderTab(t){
  if(t==='today') renderToday();
  else if(t==='campaigns') renderCampaigns();
  else if(t==='open') renderOpen();
  else if(t==='past') renderPast();
  else if(t==='companies') renderCompanies();
  else if(t==='contacts') renderAllContacts();
  else if(t==='queue') renderQueue();
  else if(t==='suppressed') renderSuppressed();
  else if(t==='debug') renderDebug();
}
function updateBadges(){
  const open=contacts.filter(c=>c._status==='active-upcoming'||c._status==='active-inquiry').length;
  const past=contacts.filter(c=>c._status==='past-customer'||c._status==='inquired-never-booked').length;
  document.getElementById('bg-open').textContent=open.toLocaleString();
  document.getElementById('bg-past').textContent=past.toLocaleString();
  document.getElementById('bg-companies').textContent=Object.keys(companies).length.toLocaleString();
  document.getElementById('bg-contacts').textContent=contacts.length.toLocaleString();
  document.getElementById('bg-queue').textContent=queue.filter(q=>q.status==='ready'||q.status==='approved').length;
}

  ${entries.length>60?`<div style="text-align:center;padding:16px;color:var(--m2);font-size:.74rem">${entries.length-60} more — search to narrow</div>`:''}`;
}
function toggleCo(k){const c=document.getElementById('co-'+k);if(c)c.classList.toggle('exp');}

// ── ALL CONTACTS ───────────────────────────────────────────────────────────
function renderAllContacts(search='',filterTag=''){
  const p=document.getElementById('pane-contacts');
  if(!contacts.length){p.innerHTML=noContacts();return;}
  const s=search.toLowerCase();
  let list=filterTag?contacts.filter(c=>c._tags.includes(filterTag)):contacts;
  if(s) list=list.filter(c=>[c.first_name,c.last_name,c.company,c.email_address,c._co].join(' ').toLowerCase().includes(s));
  const inQ=new Set(queue.map(q=>String(q.id)));
  p.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;flex-wrap:wrap;gap:8px">
    <div><span style="font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600">${list.length.toLocaleString()}</span> <span style="font-size:.76rem;color:var(--m)">unique contacts (deduped)</span></div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <input type="text" placeholder="Search…" value="${esc(search)}" oninput="renderAllContacts(this.value,'${filterTag}')">
      <select onchange="renderAllContacts('${search}',this.value)">
        <option value="">All</option>
        ${CAMPAIGNS.map(c=>`<option value="${c.id}" ${filterTag===c.id?'selected':''}>${c.label}</option>`).join('')}
        <option value="active-upcoming">Active upcoming</option>
        <option value="active-inquiry">Active inquiry</option>
      </select>
    </div>
  </div>
  ${list.slice(0,100).map(c=>contactCard(c,true)).join('')}
  ${list.length>100?`<div style="text-align:center;padding:16px;color:var(--m2);font-size:.74rem">Showing 100 of ${list.length.toLocaleString()} — search to narrow</div>`:''}`;
}

function contactCard(c,showQueueBtn){
  const name=[c.first_name,c.last_name].filter(Boolean).join(' ')||'Unknown';
  const co=c.company||c._co||'';
  const inQ=queue.some(q=>String(q.id)===String(c.id));
  const sc_=STATUS_COLORS[c._status]||'var(--m)';
  const sl=STATUS_LABELS[c._status]||'?';
  const isActive=c._status==='active-upcoming'||c._status==='active-inquiry';
  return `<div class="card ${c._status==='lost'?'lost':isActive?'active-lead':c._status==='past-customer'?'past-customer':'never-booked'}">
    <div class="ch">
      <div><div class="cn">${esc(name)}</div>${co?`<div class="cs">${esc(co)}</div>`:''}</div>
      <span class="sp" style="color:${sc_};background:${sc_}1a">${sl}</span>
    </div>
    <div class="cm">
      ${c.email_address?`<div><span>Email</span> ${esc(c.email_address)}</div>`:''}
      ${c.event_date?`<div><span>Event</span> ${new Date(c.event_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>`:''}
      ${c.guest_count?`<div><span>Guests</span> ${c.guest_count}</div>`:''}
      ${c._daysSince!==null?`<div><span>Age</span> ${c._daysSince}d</div>`:''}
    </div>
    <div class="ct">${(c._tags||[]).map(t=>`<span class="tag ${tagCls(t)}">${t.replace(/-/g,' ')}</span>`).join('')}</div>
    ${c._eventHistory?.length>1?`<div style="font-size:.7rem;color:var(--m);margin-bottom:8px">📋 ${c._eventHistory.length} inquiries on record</div>`:''}
    ${showQueueBtn&&!isActive?`<div style="display:flex;gap:6px">
      ${inQ?`<span style="font-size:.7rem;color:var(--g);font-family:'DM Mono',monospace">✓ Queued</span>`:`<button class="btn ba bs" onclick="queueOne(${c.id},'')">+ Queue</button>`}
      <button class="btn bg_ bs" onclick="addToSuppressed('${esc((c.email_address||'').toLowerCase())}')">Suppress</button>
    </div>`:''}
  </div>`;
}
function tagCls(t){if(t.includes('quiet'))return'tq';if(t==='corporate')return'tc';if(t==='anniversary')return'ta';if(t==='no-booking')return'tn';if(t==='high-value')return'th';if(t==='msu')return'tm';if(t==='lost')return'tlost';return'tn';}

// ── QUEUE ──────────────────────────────────────────────────────────────────
function renderQueue(){
  const p=document.getElementById('pane-queue');
  const pending=queue.filter(q=>q.status==='pending').length;
  const ready=queue.filter(q=>q.status==='ready').length;
  const approved=queue.filter(q=>q.status==='approved').length;
  if(!queue.length){p.innerHTML=`<div class="emp"><div class="emp-i">✉</div><h3>Queue is empty</h3><p>Go to Today or Campaigns to queue contacts.</p></div>`;updateBadges();return;}
  const sColor={pending:'var(--m2)',generating:'var(--y)',ready:'var(--a)',approved:'var(--g)',skipped:'var(--m2)',error:'var(--r)'};
  const sLabel={pending:'Needs generation',generating:'Generating…',ready:'Ready to review',approved:'✓ Approved',skipped:'Skipped',error:'Error'};
  p.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:9px">
    <div><span style="font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600">${queue.length}</span> <span style="font-size:.76rem;color:var(--m)">in queue · ${ready} ready · ${approved} approved · ${pending} pending</span></div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      ${pending>0?`<button class="btn ba" onclick="generateAll()">✨ Generate ${pending}</button>`:''}
      <button class="btn bge_" onclick="approveAll()">✓ Approve all ready</button>
      <button class="btn bg_" onclick="clearQueue()">Clear</button>
    </div>
  </div>
  ${queue.map(item=>{
    const sc_=sColor[item.status]||'var(--m)',sl=sLabel[item.status]||item.status;
    const c=item.contact,co=c?.company||c?._co||'';
    const hasRisks=item.riskFlags&&item.riskFlags.length>0&&item.riskFlags[0]!=='none';
    return `<div class="card ${item.status}" id="qcard-${item.id}">
      <div class="ch">
        <div><div class="cn">${esc(item.name)}${co?` <span style="font-size:.71rem;color:var(--m);font-weight:400">${esc(co)}</span>`:''}</div>
        <div class="cs">${esc(item.email)}${item.subject?' · '+esc(item.subject):''}</div></div>
        <div style="display:flex;align-items:center;gap:6px">
          ${hasRisks?`<span style="font-size:.65rem;color:var(--y);background:rgba(245,166,35,.1);padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace">⚠ ${item.riskFlags.length} flag${item.riskFlags.length>1?'s':''}</span>`:''}
          <span class="sp" style="color:${sc_};background:${sc_}1a">${sl}</span>
        </div>
      </div>
      ${item.body?`<div class="cb">${esc(item.body)}</div>`:''}
      <div class="cf">
        ${item.status==='pending'?`<button class="btn ba bs" onclick="generateOne('${item.id}')">✨ Generate</button>`:''}
        ${item.status==='ready'||item.status==='error'?`<button class="btn bg_ bs" onclick="openModal('${item.id}')">👁 Review${hasRisks?' ⚠':''}</button><button class="btn bge_ bs" onclick="approveItem('${item.id}')">✓ Approve</button>`:''}
        ${item.status==='approved'?`<button class="btn bg_ bs" onclick="openModal('${item.id}')">👁 View</button>`:''}
        ${item.status!=='skipped'?`<button class="btn bg_ bs" onclick="skipItem('${item.id}')">Skip</button>`:''}
        <button class="btn br_ bs" onclick="removeItem('${item.id}')">Remove</button>
      </div>
    </div>`;
  }).join('')}`;
  updateBadges();
}

// ── SUPPRESSED ─────────────────────────────────────────────────────────────
function renderSuppressed(){
  const p=document.getElementById('pane-suppressed');
  const list=[...suppressed].sort();
  p.innerHTML=`<div style="margin-bottom:14px">
    <div style="font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;margin-bottom:4px">Do Not Contact List</div>
    <div style="font-size:.76rem;color:var(--m)">These email addresses will never be queued for outreach.</div>
  </div>
  <div style="display:flex;gap:7px;margin-bottom:14px">
    <input type="text" id="supp-inp" placeholder="email@domain.com" style="flex:1">
    <button class="btn ba" onclick="addToSuppressedManual()">Add</button>
  </div>
  ${list.length===0?`<div class="emp"><div class="emp-i">✓</div><h3>No suppressed contacts</h3></div>`:''}
  ${list.map(email=>`<div style="background:var(--s);border:1px solid var(--b);border-radius:8px;padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:.82rem;font-family:'DM Mono',monospace;color:var(--m)">${esc(email)}</span>
    <button class="btn bg_ bs" onclick="removeSuppressed('${esc(email)}')">Remove</button>
  </div>`).join('')}`;
}

// ── DEBUG ──────────────────────────────────────────────────────────────────
function renderDebug(){
  const p=document.getElementById('pane-debug');
  p.innerHTML=`<div style="font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;margin-bottom:16px">Debug / Storage Status</div>
  <div class="debug-box" id="debug-content">Loading debug info…</div>
  <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn ba" onclick="loadDebug()">Refresh</button>
    <button class="btn bg_" onclick="syncFromTripleseat()">↻ Full Sync</button>
    <button class="btn br_" onclick="clearAllData()">⚠ Clear all stored data</button>
  </div>`;
  loadDebug();
}

async function loadDebug(){
  const el=document.getElementById('debug-content'); if(!el) return;
  try{
    const res=await fetch(`${API_ST}?action=debug`);
    const data=await res.json();
    el.textContent=JSON.stringify({
      ...data,
      frontendState:{
        contactsInMemory:contacts.length,
        uniqueCompanies:Object.keys(companies).length,
        queueLength:queue.length,
        suppressedCount:suppressed.size,
        storeOk,
        storeError:storeError||'none',
        activeTab,
      }
    },null,2);
  }catch(err){el.textContent='Error loading debug: '+err.message;}
}

async function clearAllData(){
  if(!confirm('Clear ALL stored data? This cannot be undone.')) return;
  contacts=[];companies={};queue=[];contacted={};suppressed=new Set();
  try{
    await fetch(`${API_ST}?action=save-contacts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contacts:[]})});
    await fetch(`${API_ST}?action=save-queue`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({queue:[]})});
  }catch(e){}
  updateBadges();renderTab(activeTab);setStatus('All data cleared','ok');setTimeout(()=>setStatus('',''),3000);
}

// ── QUEUE ACTIONS ──────────────────────────────────────────────────────────
function queueOne(cId,campaign){
  const c=contacts.find(x=>String(x.id)===String(cId));
  if(!c||queue.find(q=>String(q.id)===String(cId))) return;
  if(c._status==='active-upcoming'||c._status==='active-inquiry'){alert('This is an active account — Ryan should handle it directly.');return;}
  if(suppressed.has((c.email_address||'').toLowerCase())){alert('This contact is on the Do Not Contact list.');return;}
  queue.push({id:String(c.id),contact:c,name:[c.first_name,c.last_name].filter(Boolean).join(' ')||'Contact',email:c.email_address||'',subject:'',body:'',riskFlags:[],status:'pending',campaign:campaign||''});
  saveQueue();updateBadges();renderTab(activeTab);
}
function queueBatch(){
  const batch=buildBatch(50);let added=0;
  batch.forEach(({contact:c,campaign})=>{
    if(!queue.find(q=>String(q.id)===String(c.id))){
      queue.push({id:String(c.id),contact:c,name:[c.first_name,c.last_name].filter(Boolean).join(' ')||'Contact',email:c.email_address||'',subject:'',body:'',riskFlags:[],status:'pending',campaign});
      added++;
    }
  });
  saveQueue();updateBadges();if(added>0)showTab('queue');
}
function queueCampaign(camId,limit){
  const cam=CAMPAIGNS.find(c=>c.id===camId);if(!cam)return;
  const inQ=new Set(queue.map(q=>String(q.id)));const now=Date.now();
  contacts.filter(cam.filter).filter(c=>c.email_address&&!inQ.has(String(c.id))&&c._status!=='active-upcoming'&&c._status!=='active-inquiry'&&!suppressed.has((c.email_address||'').toLowerCase())&&!(contacted[c.id]&&now-contacted[c.id]<30*86400000)).slice(0,limit).forEach(c=>{
    queue.push({id:String(c.id),contact:c,name:[c.first_name,c.last_name].filter(Boolean).join(' ')||'Contact',email:c.email_address||'',subject:'',body:'',riskFlags:[],status:'pending',campaign:camId});
  });
  saveQueue();updateBadges();showTab('queue');
}
function queueCompany(sk){
  const entry=Object.entries(companies).find(([k])=>k.replace(/[^a-z0-9]/g,'').slice(0,30)===sk);if(!entry)return;
  const [,co]=entry,inQ=new Set(queue.map(q=>String(q.id)));
  co.contacts.filter(c=>c.email_address&&!inQ.has(String(c.id))&&c._status!=='active-upcoming'&&c._status!=='active-inquiry').slice(0,10).forEach(c=>{
    queue.push({id:String(c.id),contact:c,name:[c.first_name,c.last_name].filter(Boolean).join(' ')||'Contact',email:c.email_address||'',subject:'',body:'',riskFlags:[],status:'pending',campaign:'corporate'});
  });
  saveQueue();updateBadges();showTab('queue');
}
function skipContact(cId){contacted[String(cId)]=Date.now();saveContacted();renderTab(activeTab);}
function clearQueue(){if(!confirm('Clear all queued emails?'))return;queue=[];saveQueue();updateBadges();renderQueue();}
function approveAll(){queue.filter(q=>q.status==='ready').forEach(q=>{q.status='approved';markContacted(q.id);});saveQueue();updateBadges();renderQueue();}
function approveItem(id){const i=queue.find(q=>q.id===id);if(i){i.status='approved';markContacted(i.id);saveQueue();updateBadges();renderQueue();}}
function skipItem(id){const i=queue.find(q=>q.id===id);if(i){i.status='skipped';saveQueue();renderQueue();}}
function removeItem(id){queue=queue.filter(q=>q.id!==id);saveQueue();updateBadges();renderQueue();}
function markContacted(cId){contacted[String(cId)]=Date.now();saveContacted();}

// ── SUPPRESSION ────────────────────────────────────────────────────────────
function addToSuppressed(email){if(!email)return;suppressed.add(email.toLowerCase());saveSuppressed();queue=queue.filter(q=>q.email.toLowerCase()!==email);saveQueue();updateBadges();}
function addToSuppressedManual(){const v=document.getElementById('supp-inp')?.value?.trim()?.toLowerCase();if(!v)return;addToSuppressed(v);document.getElementById('supp-inp').value='';renderSuppressed();}
function removeSuppressed(email){suppressed.delete(email.toLowerCase());saveSuppressed();renderSuppressed();}

// ── EMAIL GENERATION ───────────────────────────────────────────────────────
async function generateOne(itemId){
  const item=queue.find(q=>q.id===itemId);if(!item)return;
  item.status='generating';renderQueue();
  try{
    const res=await fetch(API_AI,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contact:item.contact,campaign:item.campaign,accountStatus:item.contact._status})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||`HTTP ${res.status}`);
    item.subject=data.subject||'Following up from Saddleback Catering';
    item.body=data.body||'Unable to generate email body.';
    item.riskFlags=data.riskFlags||[];
    item.status='ready';
  }catch(err){item.body=`Error: ${err.message}`;item.riskFlags=[];item.status='error';}
  saveQueue();renderQueue();updateBadges();
}
async function generateAll(){
  const pending=queue.filter(q=>q.status==='pending');if(!pending.length)return;
  const btn=document.querySelector('[onclick="generateAll()"]');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="sp2"></span> Generating…';}
  for(let i=0;i<pending.length;i++){await generateOne(pending[i].id);if(i<pending.length-1)await new Promise(r=>setTimeout(r,300));}
  if(btn){btn.disabled=false;btn.innerHTML='✨ Generate emails';}
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(itemId){
  const item=queue.find(q=>q.id===itemId);if(!item)return;
  modalQueueId=itemId;
  document.getElementById('mt').textContent=`Email to ${item.name}`;
  document.getElementById('msub').value=item.subject||'';
  document.getElementById('memail').value=item.body||'';
  const flagsEl=document.getElementById('risk-flags-display');
  const flags=(item.riskFlags||[]).filter(f=>f&&f!=='none');
  flagsEl.innerHTML=flags.length?flags.map(f=>`<div class="risk-flag">⚠ ${esc(f)}</div>`).join(''):'';
  document.getElementById('mo').classList.add('open');
}
function closeModal(){
  if(modalQueueId){const i=queue.find(q=>q.id===modalQueueId);if(i){i.subject=document.getElementById('msub').value;i.body=document.getElementById('memail').value;}}
  document.getElementById('mo').classList.remove('open');modalQueueId=null;saveQueue();renderQueue();
}
function approveFromModal(){
  if(modalQueueId){const i=queue.find(q=>q.id===modalQueueId);if(i){i.subject=document.getElementById('msub').value;i.body=document.getElementById('memail').value;i.status='approved';markContacted(i.id);}}
  closeModal();
}
function copyModal(){
  const t=document.getElementById('memail').value;
  navigator.clipboard.writeText(`Subject: ${document.getElementById('msub').value}\n\n${t}`).then(()=>{
    const btn=document.getElementById('bcm');btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent='Copy',2000);
  });
}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── UTILS ──────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function noContacts(){return `<div class="emp"><div class="emp-i">👥</div><h3>No contacts loaded</h3><p>Click "↻ Sync" to import from Tripleseat.</p></div>`;}

// ── INIT ───────────────────────────────────────────────────────────────────
loadFromStore();
</script>
</body>
</html>
