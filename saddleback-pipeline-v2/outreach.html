<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saddleback — Sales Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f0f0e;--s:#181817;--s2:#1f1f1d;--b:#2a2a27;--b2:#333330;--t:#f0ede8;--m:#8a8780;--m2:#5a5855;--a:#e8772a;--a2:#f5a623;--g:#4caf7d;--r:#e05252;--y:#f5a623;--bl:#5b8dee;--pu:#9b7edb;--te:#3dbdb0;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:14px;line-height:1.5}
    nav{display:flex;align-items:center;padding:0 22px;background:var(--s);border-bottom:1px solid var(--b);height:52px;position:sticky;top:0;z-index:50}
    .nb{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;color:var(--a2);margin-right:24px;text-decoration:none}
    .nt{display:flex}
    .ntb{padding:0 13px;height:52px;display:flex;align-items:center;font-size:.81rem;font-weight:500;color:var(--m);border-bottom:2px solid transparent;transition:color .15s;text-decoration:none}
    .ntb:hover{color:var(--t)}.ntb.active{color:var(--t);border-bottom-color:var(--a)}
    .nr{margin-left:auto;display:flex;align-items:center;gap:9px}
    .page{padding:16px 22px;max-width:1500px;margin:0 auto}
    .tabs{display:flex;gap:1px;border-bottom:1px solid var(--b);margin-bottom:18px;overflow-x:auto}
    .tab{padding:9px 14px;font-size:.79rem;font-weight:500;color:var(--m);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:color .15s}
    .tab:hover{color:var(--t)}.tab.active{color:var(--t);border-bottom-color:var(--a);font-weight:600}
    .bge{display:inline-block;border-radius:20px;padding:1px 6px;font-size:.63rem;font-family:'DM Mono',monospace;margin-left:3px}
    .bge.g{background:rgba(76,175,125,.15);color:var(--g)}.bge.y{background:rgba(245,166,35,.15);color:var(--y)}
    .bge.r{background:rgba(224,82,82,.15);color:var(--r)}.bge.b{background:rgba(91,141,238,.15);color:var(--bl)}
    .bge.m{background:rgba(90,88,85,.2);color:var(--m)}.bge.a{background:rgba(232,119,42,.15);color:var(--a)}
    .sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:18px}
    .sc{background:var(--s);border:1px solid var(--b);border-radius:9px;padding:12px 14px;cursor:pointer;transition:border-color .15s}
    .sc:hover{border-color:var(--b2)}.sn{font-family:'Fraunces',serif;font-size:1.35rem;font-weight:700;line-height:1}
    .sl{font-size:.64rem;color:var(--m);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-top:3px}
    .pw{background:var(--s);border:1px solid var(--b);border-radius:7px;padding:11px 15px;margin-bottom:16px}
    .pl{font-size:.74rem;color:var(--m);margin-bottom:6px;font-family:'DM Mono',monospace}
    .pb{background:var(--s2);border-radius:3px;height:4px;overflow:hidden}
    .pf{height:100%;background:var(--a);border-radius:3px;transition:width .3s}
    .sm{font-size:.76rem;padding:8px 12px;border-radius:7px;margin-bottom:13px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:7px}
    .sm.ld{background:rgba(91,141,238,.1);color:var(--bl);border:1px solid rgba(91,141,238,.2)}
    .sm.ok{background:rgba(76,175,125,.1);color:var(--g);border:1px solid rgba(76,175,125,.2)}
    .sm.er{background:rgba(224,82,82,.1);color:var(--r);border:1px solid rgba(224,82,82,.2)}
    .sm.wa{background:rgba(245,166,35,.1);color:var(--y);border:1px solid rgba(245,166,35,.2)}
    .btn{border:none;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
    .ba{background:var(--a);color:#fff;padding:6px 13px;font-size:.79rem}.ba:hover{background:#f08030}
    .ba:disabled{background:var(--b2);color:var(--m2);cursor:not-allowed}
    .bgh{background:transparent;color:var(--m);border:1px solid var(--b2);padding:5px 10px;font-size:.74rem}
    .bgh:hover{color:var(--t);border-color:var(--m)}
    .bgg{background:var(--g);color:#fff;padding:6px 12px;font-size:.76rem}.bgg:hover{background:#3d9d6a}
    .br{background:transparent;color:var(--r);border:1px solid rgba(224,82,82,.3);padding:4px 8px;font-size:.71rem}
    .bs{padding:4px 9px;font-size:.71rem}
    .pill{font-size:.63rem;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .pill-tent{background:rgba(245,166,35,.15);color:var(--y);border:1px solid rgba(245,166,35,.3)}
    .pill-def{background:rgba(76,175,125,.15);color:var(--g);border:1px solid rgba(76,175,125,.3)}
    .pill-closed{background:rgba(91,141,238,.15);color:var(--bl);border:1px solid rgba(91,141,238,.3)}
    .pill-prosp{background:rgba(155,126,219,.15);color:var(--pu);border:1px solid rgba(155,126,219,.3)}
    .pill-lost{background:rgba(224,82,82,.1);color:var(--r);border:1px solid rgba(224,82,82,.2)}
    .pill-past{background:rgba(90,88,85,.15);color:var(--m);border:1px solid rgba(90,88,85,.3)}
    .opp{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px;margin-bottom:8px;transition:border-color .15s}
    .opp:hover{border-color:var(--b2)}
    .opp.urgent{border-left:3px solid var(--y)}.opp.high{border-left:3px solid var(--a)}
    .opp.med{border-left:3px solid var(--bl)}.opp.low{border-left:3px solid var(--m2)}
    .opp.past-card{border-left:3px solid var(--m2)}
    .opp-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}

    .opp-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:.69rem;color:var(--m2);font-family:'DM Mono',monospace;margin-bottom:8px}
    .opp-meta span{color:var(--m)}
    .opp-action{background:rgba(232,119,42,.06);border:1px solid rgba(232,119,42,.15);border-radius:6px;padding:7px 10px;font-size:.75rem;color:var(--m);margin-bottom:9px;line-height:1.5}
    .opp-action strong{color:var(--a2)}
    .opp-footer{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--b)}
    .score{font-size:.65rem;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px}
    .score-high{background:rgba(245,166,35,.15);color:var(--y)}
    .score-med{background:rgba(91,141,238,.12);color:var(--bl)}
    .sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
    .sec-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:600;color:var(--t)}
    .yr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
    .yr-col{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px}
    .yr-col-hdr{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--b)}
    .draft-body{background:var(--s2);border-radius:6px;padding:10px 12px;font-size:.78rem;line-height:1.65;color:var(--m);white-space:pre-wrap;max-height:140px;overflow-y:auto;border-left:3px solid var(--b2);margin:8px 0}
    .risk{background:rgba(224,82,82,.07);border:1px solid rgba(224,82,82,.2);border-radius:5px;padding:5px 9px;font-size:.7rem;color:var(--r);margin-bottom:5px}
    .setup{background:rgba(91,141,238,.07);border:1px solid rgba(91,141,238,.2);border-radius:10px;padding:17px 20px;margin-bottom:18px}
    .setup h3{font-size:.92rem;font-weight:600;color:var(--bl);margin-bottom:9px}
    .setup ol{padding-left:16px;font-size:.8rem;color:var(--m);line-height:2.1}
    code{background:var(--s2);padding:1px 6px;border-radius:3px;font-family:'DM Mono',monospace;font-size:.78rem;color:var(--t)}
    .emp{text-align:center;padding:40px 20px;color:var(--m2)}
    .emp-i{font-size:1.6rem;margin-bottom:8px;opacity:.4}
    .emp h3{font-size:.88rem;color:var(--m);margin-bottom:4px}
    .sp2{display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    input[type=text]{background:var(--s);border:1px solid var(--b);color:var(--t);padding:6px 10px;border-radius:6px;font-size:.77rem;font-family:'DM Sans',sans-serif;outline:none}
    input[type=text]:focus{border-color:var(--a)}input::placeholder{color:var(--m2)}
    .dbg{background:var(--s);border:1px solid var(--b2);border-radius:7px;padding:13px;font-family:'DM Mono',monospace;font-size:.71rem;color:var(--m);white-space:pre-wrap;line-height:1.6;max-height:500px;overflow-y:auto}
    .wfl{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px}
    .wfi{font-size:.65rem;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px}
    .notice{background:rgba(61,189,176,.07);border:1px solid rgba(61,189,176,.2);border-radius:8px;padding:10px 14px;font-size:.76rem;color:var(--te);margin-bottom:14px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
    @media(max-width:900px){.two-col{grid-template-columns:1fr}.yr-grid{grid-template-columns:1fr}}
    hr.div{border:none;border-top:1px solid var(--b);margin:20px 0}
    #mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;justify-content:center;align-items:center;padding:20px}
    #mo.open{display:flex}
    #md{background:var(--s);border:1px solid var(--b2);border-radius:14px;width:100%;max-width:640px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,.5)}
    .mh{padding:15px 20px 12px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center}
    .mh h2{font-family:'Fraunces',serif;font-size:.95rem;font-weight:600}
    .mc{background:none;border:none;color:var(--m);cursor:pointer;font-size:1rem}
    .ms-w{padding:8px 20px;border-bottom:1px solid var(--b)}
    .ms-l{font-size:.61rem;text-transform:uppercase;letter-spacing:.08em;color:var(--m2);margin-bottom:3px;font-weight:700}
    #msub{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:5px;color:var(--t);padding:6px 10px;font-size:.81rem;font-family:'DM Sans',sans-serif;outline:none}
    .mb{padding:12px 20px;flex:1;overflow-y:auto}
    #memail{width:100%;min-height:220px;background:var(--s2);border:1px solid var(--b);border-radius:6px;color:var(--t);padding:12px;font-size:.79rem;line-height:1.65;resize:vertical;font-family:'DM Sans',sans-serif;outline:none}
    .mf{padding:10px 20px;border-top:1px solid var(--b);display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
    .mf button{padding:7px 15px;border-radius:6px;font-size:.79rem;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
    #bam{background:var(--g);color:#fff}#bcm{background:var(--a);color:#fff}
    #bclm{background:var(--s2);color:var(--m);border:1px solid var(--b2)}
  </style>
</head>

    <div class="mh"><h2 id="mt">Review Draft</h2><button class="mc" onclick="closeModal()">✕</button></div>

<script>
const API_TS='/.netlify/functions/tripleseat';
const API_AI='/.netlify/functions/ai';
const API_ST='/.netlify/functions/store';
const TS_PLACEHOLDER='2000-01-01'; // TripleSeat fake date for "no date set"

let allEvents=[],pipeline={},queue=[],activeTab='cmd',dbConfigured=false,modalQueueId=null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function daysAgo(d){if(!d)return null;const n=new Date(d);return isNaN(n)?null:Math.floor((Date.now()-n)/86400000);}
function daysUntil(d){if(!d)return null;const n=new Date(d);return isNaN(n)?null:Math.floor((n-Date.now())/86400000);}
function fmtDate(d){if(!d)return null;try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return String(d);}}
function setStatus(msg,type='ld'){const el=document.getElementById('status-msg');if(!msg){el.style.display='none';return;}el.className='sm '+type;el.innerHTML=msg;el.style.display='flex';}
function setProgress(pct,label){document.getElementById('progress-wrap').style.display='block';document.getElementById('pf').style.width=pct+'%';document.getElementById('pl').textContent=label;}
function hideProgress(){setTimeout(()=>document.getElementById('progress-wrap').style.display='none',2000);}

// ── DATE LOGIC ────────────────────────────────────────────────────────────────
function getEventDate(ev){
  const raw=ev.raw||ev;
  const iso=raw?.event_start_iso8601||ev.event_start||raw?.start_date||null;
  if(!iso)return null;
  const s=String(iso);
  return s.startsWith(TS_PLACEHOLDER)?null:s;
}
function isFutureEvent(ev){const d=getEventDate(ev);return d?new Date(d)>new Date():false;}

// ── CONTACT EXTRACTION ────────────────────────────────────────────────────────
// Email lives at raw.contact.email_addresses[0].address — NOT a flat field
function extractContact(ev){
  const raw=ev.raw||ev;
  const c=raw?.contact||{};
  const a=raw?.account||{};
  const email=((c.email_addresses||[])[0]?.address||'').toLowerCase().trim();
  const phone=((c.phone_numbers||[])[0]?.number||'').trim();
  const first=c.first_name||'';
  const last=/^\*+$/.test(c.last_name||'')?'':(c.last_name||'');
  const name=[first,last].filter(Boolean).join(' ')||raw?.post_as||raw?.name||ev.name||'';
  const company=a.name||c.company||'';
  return{email,phone,name,first,last,company,contactId:c.id||null};
}

// ── PIPELINE ──────────────────────────────────────────────────────────────────
function getCategory(ev){
  const s=(ev.status||'').toUpperCase();
  if(s==='TENTATIVE')return isFutureEvent(ev)?'futureTentative':'pastTentative';
  if(s==='PROSPECT') return isFutureEvent(ev)?'futureProspect':'pastProspect';
  if(s==='DEFINITE') return isFutureEvent(ev)?'futureDefinite':'pastDefinite';
  if(s==='CLOSED')   return 'closed';
  if(s==='LOST')     return 'lost';
  return 'unknown';
}
function buildPipeline(events){
  const keys=['futureTentative','futureProspect','futureDefinite','pastDefinite','closed','pastTentative','pastProspect','lost','unknown'];
  const p=Object.fromEntries(keys.map(k=>[k,[]]));
  events.forEach(ev=>{
    const cat=getCategory(ev);
    const contact=extractContact(ev);
    const date=getEventDate(ev);
    const score=scoreEvent(ev);
    const urgency=score>=140?'urgent':score>=100?'high':score>=70?'med':'low';
    p[cat].push({...ev,_cat:cat,_contact:contact,_date:date,_score:score,_urgency:urgency});
  });
  const byDateAsc=(a,b)=>{if(!a._date&&!b._date)return 0;if(!a._date)return 1;if(!b._date)return -1;return new Date(a._date)-new Date(b._date);};
  const byScoreDesc=(a,b)=>b._score-a._score;
  const byUpdDesc=(a,b)=>new Date(b.updated_at||0)-new Date(a.updated_at||0);
  p.futureTentative.sort(byScoreDesc);p.futureProspect.sort(byScoreDesc);
  p.futureDefinite.sort(byDateAsc);p.pastDefinite.sort(byUpdDesc);
  p.closed.sort(byUpdDesc);p.pastTentative.sort(byUpdDesc);p.pastProspect.sort(byUpdDesc);p.lost.sort(byUpdDesc);
  return p;
}
function scoreEvent(ev){
  const s=(ev.status||'').toUpperCase();
  if(!['TENTATIVE','PROSPECT'].includes(s)||!isFutureEvent(ev))return 0;
  const raw=ev.raw||ev;
  let score=s==='TENTATIVE'?100:60;
  const ds=daysAgo(ev.updated_at||ev.created_at);
  const dt=daysUntil(getEventDate(ev));
  const g=parseInt(raw?.guest_count||ev.guest_count)||0;
  if(s==='TENTATIVE'){if(ds>14)score+=40;else if(ds>7)score+=20;else if(ds>3)score+=10;}
  else{if(ds>10)score+=30;else if(ds>5)score+=15;}
  if(dt!==null&&dt>=0){if(dt<=30)score+=40;else if(dt<=90)score+=25;else if(dt<=180)score+=15;else if(dt<=365)score+=8;}
  if(g>=200)score+=35;else if(g>=100)score+=25;else if(g>=50)score+=15;else if(g>=25)score+=8;
  const nm=(raw?.name||ev.name||'').toLowerCase();
  if(/wedding|reception/.test(nm))score+=15;
  if(/corporate|company|staff/.test(nm))score+=10;
  if(/graduat/.test(nm))score+=10;
  if(/holiday|christmas/.test(nm))score+=8;
  return score;
}
function suggestAction(ev){
  const s=(ev.status||'').toUpperCase();
  const raw=ev.raw||ev;
  const dt=daysUntil(ev._date||getEventDate(ev));
  const ds=daysAgo(ev.updated_at||ev.created_at);
  const g=parseInt(raw?.guest_count||ev.guest_count)||0;
  const gStr=g?` (${g} guests)`:'';
  const dStr=(ev._date||getEventDate(ev))?` on ${fmtDate(ev._date||getEventDate(ev))}`:'';
  if(s==='TENTATIVE'){
    if(dt!==null&&dt>=0&&dt<=30)return`Event${dStr} is only ${dt} days away${gStr}. Ryan should confirm details and lock in the date.`;
    if(ds>14)return`Tentative${gStr}${dStr} — ${ds} days since last update. Going cold. Check in and ask about locking in the date.`;
    if(ds>7) return`Tentative${gStr}${dStr} — ${ds} days since update. Good time for a warm check-in.`;
    return`Tentative${gStr}${dStr}. Follow up to move toward Definite.`;
  }
  if(s==='PROSPECT'){
    if(ds!==null&&ds<=2)return`New inquiry${gStr}${dStr} — just came in. Ryan should respond quickly.`;
    if(ds>10)return`Prospect quiet for ${ds} days${gStr}. Low-pressure check-in.`;
    return`Active prospect${gStr}${dStr} — ${ds} days old. Follow up to understand their needs.`;
  }
  if(s==='DEFINITE'){
    if(dt!==null&&dt>=0&&dt<=30)return`Event${dStr} is ${dt} days away${gStr}. Check in to confirm all details.`;
    if(ds>20)return`No contact in ${ds} days. Good time for a service check-in.`;
    return`Upcoming booked event${gStr}${dStr}.`;
  }
  return'';
}
function pillClass(status,future){
  if(!future&&['TENTATIVE','PROSPECT','DEFINITE'].includes(status))return'pill-past';
  return{TENTATIVE:'pill-tent',PROSPECT:'pill-prosp',DEFINITE:'pill-def',CLOSED:'pill-closed',LOST:'pill-lost'}[status]||'';
}
function statusColor(s){return{TENTATIVE:'var(--y)',PROSPECT:'var(--pu)',DEFINITE:'var(--g)',CLOSED:'var(--bl)',LOST:'var(--r)'}[s]||'var(--m)';}

// ── LOAD FROM SUPABASE ────────────────────────────────────────────────────────
// Queries tables directly — does NOT gate on sync_metadata values.
// Only shows "no data" if both ts_events and ts_bookings are genuinely empty.
async function loadFromDB(){
  setStatus('Loading…','ld');
  try{
    const meta=await fetch(`${API_ST}?action=get-metadata`).then(r=>r.json()).catch(()=>({}));
    if(meta.configured===false||meta.ok===false){
      dbConfigured=false;renderSetupBanner(meta.error);setStatus('','');return;
    }
    dbConfigured=true;

    setProgress(15,'Loading events…');
    const evRows=await loadAllRows('ts_events','*','event_start.asc.nullslast');
    let bkRows=[];
    if(evRows.length===0){
      setProgress(35,'Loading bookings…');
      bkRows=await loadAllRows('ts_bookings','*','start_date.asc.nullslast');
    }
    allEvents=evRows.length>0?evRows:bkRows;

    if(allEvents.length===0){
      setStatus('No data yet. Click "↻ Full Sync" to import from Tripleseat.','wa');
      hideProgress();renderTab(activeTab);return;
    }
    if(evRows.length===0&&bkRows.length>0){
      setTimeout(()=>setStatus('Using booking data — run Full Sync to load event status data.','wa'),4500);
    }

    setProgress(70,'Building pipeline…');
    pipeline=buildPipeline(allEvents);

    setProgress(85,'Loading queue…');
    const qData=await fetch(`${API_ST}?action=get-queue`).then(r=>r.json()).catch(()=>({queue:[]}));
    queue=qData.queue||[];

    setProgress(100,'✓ Loaded');
    hideProgress();
    if(meta.last_full_sync) document.getElementById('last-sync-label').textContent='Synced '+new Date(meta.last_full_sync).toLocaleDateString();
    setStatus(`✓ ${allEvents.length.toLocaleString()} events loaded`,'ok');
    setTimeout(()=>setStatus('',''),4000);
    updateBadges();renderTab(activeTab);
  }catch(err){
    console.error('[loadFromDB]',err);
    setStatus('Load error: '+err.message,'er');
    renderTab(activeTab);
  }
}

async function loadAllRows(table,select,order){
  select=select||'*';const all=[];let offset=0;const limit=2000;
  while(true){
    let qs=`select=${select}&limit=${limit}&offset=${offset}`;
    if(order)qs+=`&order=${order}`;
    const data=await fetch(`${API_ST}?action=get-table&table=${table}&qs=${encodeURIComponent(qs)}`).then(r=>r.json()).catch(()=>({rows:[]}));
    const rows=data.rows||[];
    all.push(...rows);
    if(rows.length<limit)break;
    offset+=limit;
  }
  return all;
}

// ── FULL SYNC ─────────────────────────────────────────────────────────────────
async function doFullSync(){
  const btn=document.getElementById('btn-sync');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="sp2"></span> Syncing…';}
  setProgress(0,'Starting…');
  try{
    setProgress(5,'Fetching events…');
    const evArr=await fetchAllPages('events');
    setProgress(28,`${evArr.length} events — saving…`);
    await sbPost('save-events',{events:evArr});

    setProgress(30,'Fetching bookings…');
    const bkArr=await fetchAllPages('bookings');
    setProgress(43,`${bkArr.length} bookings — saving…`);
    await sbPost('save-bookings',{bookings:bkArr});

    setProgress(45,'Fetching accounts…');
    const acArr=await fetchAllPages('accounts');
    setProgress(55,`${acArr.length} accounts — saving…`);
    await sbPost('save-accounts',{accounts:acArr});

    setProgress(57,'Fetching contacts…');
    const ctArr=await fetchAllPages('contacts');
    setProgress(68,`${ctArr.length} contacts — saving…`);
    await sbPost('save-contacts',{contacts:ctArr});

    setProgress(70,'Fetching leads…');
    const ldArr=await fetchAllPages('leads');
    setProgress(76,`${ldArr.length} leads — saving…`);
    await sbPost('save-leads',{leads:ldArr});

    setProgress(78,'Saving checkpoint…');
    await sbPost('save-sync-checkpoint',{total_events:evArr.length,total_bookings:bkArr.length,total_contacts:ctArr.length,total_accounts:acArr.length,total_leads:ldArr.length});

    try{
      const out=buildLegacyOutreach(ldArr,bkArr,acArr,ctArr);
      for(let i=0;i<out.length;i+=300){setProgress(78+Math.round((i/Math.max(out.length,1))*17),'Saving profiles…');await sbPost('save-outreach-contacts',{contacts:out.slice(i,i+300)});}
    }catch(e){console.warn('outreach profiles non-fatal:',e.message);}

    allEvents=evArr.length>0?evArr:bkArr;
    pipeline=buildPipeline(allEvents);
    queue=(await fetch(`${API_ST}?action=get-queue`).then(r=>r.json()).catch(()=>({queue:[]}))).queue||[];
    setProgress(100,'✓ Done');hideProgress();
    document.getElementById('last-sync-label').textContent='Synced '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setStatus(`✓ ${evArr.length} events, ${ctArr.length} contacts synced`,'ok');
    setTimeout(()=>setStatus('',''),6000);
    dbConfigured=true;updateBadges();renderTab(activeTab);
  }catch(err){
    console.error('[doFullSync]',err);setStatus('Sync error: '+err.message,'er');
  }
  if(btn){btn.disabled=false;btn.textContent='↻ Full Sync';}
}

async function fetchAllPages(endpoint){
  const all=[];let page=1,total=1;
  while(page<=Math.min(total,150)){
    const res=await fetch(`${API_TS}?endpoint=${endpoint}&page=${page}&limit=100`);
    if(!res.ok)throw new Error(`TS ${endpoint} HTTP ${res.status}`);
    const data=await res.json();
    total=data.total_pages||1;(data.results||[]).forEach(r=>all.push(r));page++;
    if(page<=Math.min(total,150))await new Promise(r=>setTimeout(r,80));
  }
  return all;
}
async function sbPost(action,body){
  const res=await fetch(`${API_ST}?action=${action}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json().catch(()=>({}));
  if(!res.ok||data.ok===false)console.error(`[sbPost] ${action}:`,data.error||res.status);
  return data;
}
function buildLegacyOutreach(leads,bookings,accounts,contacts){
  const map={},byC={},byA={};
  bookings.forEach(b=>{if(b.contact_id){byC[b.contact_id]=byC[b.contact_id]||[];byC[b.contact_id].push(b);}if(b.account_id){byA[b.account_id]=byA[b.account_id]||[];byA[b.account_id].push(b);}});
  const aMap={};accounts.forEach(a=>aMap[a.id]=a);
  contacts.forEach(c=>{
    const email=(c.email_address||c.email||'').toLowerCase().trim();if(!email)return;
    const acct=c.account_id?aMap[c.account_id]:null;
    const cb=[...(byC[c.id]||[]),...(c.account_id?byA[c.account_id]||[]:[] )];
    const uniq=[...new Map(cb.map(x=>[x.id,x])).values()];
    const closed=uniq.filter(b=>(b.status||'').toUpperCase()==='CLOSED');
    const def=uniq.filter(b=>(b.status||'').toUpperCase()==='DEFINITE');
    const latest=uniq.sort((a,b)=>new Date(b.updated_at||0)-new Date(a.updated_at||0))[0];
    map[email]={id:email,ts_contact_id:c.id,ts_account_id:c.account_id||null,first_name:c.first_name,last_name:c.last_name,email,company:acct?.name||c.company||null,account_status:closed.length?'past_customer':def.length?'past_definite':uniq.length?'active_lead':'never_booked',booking_statuses:[...new Set(uniq.map(b=>(b.status||'').toUpperCase()))],booking_count:uniq.length,last_event_date:closed[0]?.start_date||def[0]?.start_date||latest?.start_date||null,last_booking_status:(latest?.status||'').toUpperCase()||null,total_guests:uniq.reduce((s,b)=>s+(parseInt(b.guest_count)||0),0),tags:[],updated_at:new Date().toISOString()};
  });
  leads.forEach(l=>{const email=(l.email_address||l.email||'').toLowerCase().trim();if(!email||map[email])return;map[email]={id:email,ts_contact_id:null,ts_account_id:null,first_name:l.first_name,last_name:l.last_name,email,company:l.company||null,account_status:'never_booked',booking_statuses:[],booking_count:0,last_event_date:l.event_date||null,last_booking_status:null,total_guests:parseInt(l.guest_count)||0,tags:[],updated_at:new Date().toISOString()};});
  return Object.values(map);
}

}

// ── CARDS ─────────────────────────────────────────────────────────────────────
function oppCard(o,showAction){
  const raw=o.raw||o;
  const contact=o._contact||extractContact(o);
  const date=o._date||getEventDate(o);
  const guests=parseInt(raw.guest_count)||0;
  const ds=daysAgo(o.updated_at);
  const dt=date?daysUntil(date):null;
  const inQ=queue.some(q=>q.event_id===String(o.id)||q.contact_email===contact.email);
  const action=showAction?suggestAction(o):'';
  return`<div class="opp ${o._urgency||'low'}">
    <div class="opp-header">
      <div><div class="opp-name">${esc(contact.name||'Unknown')}</div>${contact.company?`<div class="opp-co">${esc(contact.company)}</div>`:''}</div>
      <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
        ${o._score>0?`<span class="score ${o._urgency==='urgent'||o._urgency==='high'?'score-high':'score-med'}">${o._score}</span>`:''}
        <span class="pill ${pillClass(o.status,true)}">${o.status||'?'}</span>
      </div>
    </div>
    <div class="opp-meta">
      ${contact.email?`<div><span>Email</span> ${esc(contact.email)}</div>`:'<div style="color:var(--r)"><span>Email</span> not on file</div>'}
      ${contact.phone?`<div><span>Phone</span> ${esc(contact.phone)}</div>`:''}
      ${date?`<div><span>Event</span> ${fmtDate(date)}</div>`:''}
      ${guests?`<div><span>Guests</span> ${guests}</div>`:''}
      ${o.location_name||(raw.location?.name)?`<div><span>Location</span> ${esc(o.location_name||raw.location?.name)}</div>`:''}
      ${ds!==null?`<div style="color:${ds>7?'var(--r)':ds>3?'var(--y)':'var(--m2)'}"><span>Updated</span> ${ds}d ago</div>`:''}
      ${dt!==null&&dt>=0?`<div style="color:${dt<=30?'var(--y)':'var(--m2)'}"><span>Days out</span> ${dt}</div>`:''}
    </div>
    ${action?`<div class="opp-action"><strong>Suggested:</strong> ${esc(action)}</div>`:''}
    <div class="opp-footer">
      ${inQ?`<span style="font-size:.7rem;color:var(--g);font-family:'DM Mono',monospace">✓ In queue</span>`:`<button class="btn ba bs" onclick="queueOne('${esc(String(o.id))}')">✨ Draft message</button>`}
      ${contact.email?`<a href="mailto:${esc(contact.email)}" class="btn bgh bs">Email</a>`:''}
      ${contact.phone?`<a href="tel:${esc(contact.phone)}" class="btn bgh bs">Call</a>`:''}
    </div>
  </div>`;
}
function pastCard(o,draftLabel){
  const contact=o._contact||extractContact(o);
  const date=o._date||getEventDate(o);
  const raw=o.raw||o;
  const guests=parseInt(raw.guest_count)||0;
  const ds=daysAgo(o.updated_at);
  const inQ=queue.some(q=>q.event_id===String(o.id)||q.contact_email===contact.email);
  return`<div class="opp past-card">
    <div class="opp-header">
      <div><div class="opp-name">${esc(contact.name||'Unknown')}</div>${contact.company?`<div class="opp-co">${esc(contact.company)}</div>`:''}</div>
      <span class="pill ${pillClass(o.status,false)}">${o.status||'?'}</span>
    </div>
    <div class="opp-meta">
      ${contact.email?`<div><span>Email</span> ${esc(contact.email)}</div>`:'<div style="color:var(--r)"><span>Email</span> not on file</div>'}
      ${contact.phone?`<div><span>Phone</span> ${esc(contact.phone)}</div>`:''}
      ${date?`<div><span>Event date</span> ${fmtDate(date)}</div>`:''}
      ${guests?`<div><span>Guests</span> ${guests}</div>`:''}
      ${ds!==null?`<div><span>Updated</span> ${ds}d ago</div>`:''}
    </div>
    <div class="opp-footer">
      ${inQ?`<span style="font-size:.7rem;color:var(--g);font-family:'DM Mono',monospace">✓ In queue</span>`:`<button class="btn ba bs" onclick="queueOne('${esc(String(o.id))}')">✨ Draft ${draftLabel}</button>`}
      ${contact.email?`<a href="mailto:${esc(contact.email)}" class="btn bgh bs">Email</a>`:''}
    </div>
  </div>`;
}

// ── EMAIL QUEUE ───────────────────────────────────────────────────────────────
const WFC={draft_needed:'var(--m2)',draft_generated:'var(--bl)',needs_review:'var(--y)',approved:'var(--a)',ready_to_send:'var(--g)',sent:'var(--g)',skipped:'var(--m2)',failed:'var(--r)'};
const WFL={draft_needed:'Draft needed',draft_generated:'Generated',needs_review:'Needs review',approved:'Approved',ready_to_send:'Ready',sent:'Sent',skipped:'Skipped',failed:'Failed'};
function renderQueue(){
  const p=document.getElementById('pane-queue');
  if(!queue.length){p.innerHTML=`<div class="emp"><div class="emp-i">✉</div><h3>Queue is empty</h3><p>Click "Draft message" on any opportunity card.</p></div>`;updateBadges();return;}
  const byS={};queue.forEach(q=>{byS[q.status]=(byS[q.status]||0)+1;});
  const needDraft=queue.filter(q=>q.status==='draft_needed').length;
  const needReview=queue.filter(q=>['needs_review','draft_generated'].includes(q.status)).length;
  p.innerHTML=`
  <div class="wfl">${Object.entries(WFL).map(([k,v])=>`<span class="wfi" style="color:${WFC[k]};background:${WFC[k]}1a">${v} (${byS[k]||0})</span>`).join('')}</div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
    <span style="font-family:'Fraunces',serif;font-size:1rem;font-weight:600">${queue.length} in queue</span>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${needDraft?`<button class="btn ba" onclick="generateAll()">✨ Generate ${needDraft}</button>`:''}
      ${needReview?`<button class="btn bgg" onclick="approveAllReady()">✓ Approve all</button>`:''}
      <button class="btn bgh" onclick="clearQueue()">Clear</button>
    </div>
  </div>
  <div style="background:rgba(91,141,238,.07);border:1px solid rgba(91,141,238,.2);border-radius:7px;padding:8px 12px;margin-bottom:13px;font-size:.74rem;color:var(--bl)">
    📨 No email provider connected. Copy approved emails and send manually. Mark as Sent after sending.
  </div>
  ${queue.map(item=>{
    const sc=WFC[item.status]||'var(--m)',sl=WFL[item.status]||item.status;
    const hasRisks=(item.risk_flags||[]).some(f=>f&&f!=='none');
    return`<div class="opp ${['approved','ready_to_send'].includes(item.status)?'high':''}" id="qc-${item.id}">
      <div class="opp-header">
        <div><div class="opp-name">${esc(item.contact_name||'Unknown')} ${item.company?`<span style="font-size:.71rem;color:var(--m);font-weight:400">${esc(item.company)}</span>`:''}</div>
        <div class="opp-co">${esc(item.contact_email||'')}${item.subject?' · '+esc(item.subject):''}</div></div>
        <div style="display:flex;align-items:center;gap:5px">
          ${hasRisks?`<span style="font-size:.63rem;color:var(--y);background:rgba(245,166,35,.1);padding:2px 6px;border-radius:20px">⚠ review</span>`:''}
          <span class="pill" style="color:${sc};background:${sc}1a;border-color:${sc}44">${sl}</span>
        </div>
      </div>
      ${item.body?`<div class="draft-body">${esc(item.body)}</div>`:''}
      <div class="opp-footer">
        ${item.status==='draft_needed'?`<button class="btn ba bs" onclick="generateOne('${item.id}')">✨ Generate</button>`:''}
        ${['draft_generated','needs_review'].includes(item.status)?`<button class="btn bgh bs" onclick="openModal('${item.id}')">👁 Review${hasRisks?' ⚠':''}</button><button class="btn bgg bs" onclick="approveItem('${item.id}')">✓ Approve</button>`:''}
        ${item.status==='approved'?`<button class="btn bgg bs" onclick="markReady('${item.id}')">→ Ready</button><button class="btn bgh bs" onclick="openModal('${item.id}')">👁 View</button>`:''}
        ${item.status==='ready_to_send'?`<button class="btn bgh bs" onclick="openModal('${item.id}')">📋 Copy & send</button><button class="btn bgg bs" onclick="markSent('${item.id}')">✓ Mark sent</button>`:''}
        ${!['sent','skipped'].includes(item.status)?`<button class="btn bgh bs" onclick="skipItem('${item.id}')">Skip</button>`:''}
        <button class="btn br bs" onclick="removeItem('${item.id}')">Remove</button>
      </div>
    </div>`;
  }).join('')}`;
  updateBadges();
}

// ── DEBUG ─────────────────────────────────────────────────────────────────────
function renderDebug(){
  const p=document.getElementById('pane-debug');
  p.innerHTML=`<div style="font-family:'Fraunces',serif;font-size:1rem;font-weight:600;margin-bottom:13px">Debug / Storage Status</div>
  <div class="dbg" id="dbg-content">Loading…</div>
  <div style="margin-top:11px;display:flex;gap:7px;flex-wrap:wrap">
    <button class="btn ba" onclick="loadDebug()">Refresh</button>
    <button class="btn bgh" onclick="doFullSync()">↻ Full Sync</button>
  </div>`;
  loadDebug();
}
async function loadDebug(){
  const el=document.getElementById('dbg-content');if(!el)return;
  try{
    const data=await fetch(`${API_ST}?action=debug`).then(r=>r.json());
    const sb={};allEvents.forEach(ev=>{const s=ev.status||'UNKNOWN';sb[s]=(sb[s]||0)+1;});
    const noDate=allEvents.filter(ev=>!getEventDate(ev)).length;
    const noEmail=allEvents.filter(ev=>!extractContact(ev).email).length;
    const ps={};Object.keys(pipeline).forEach(k=>ps[k]=(pipeline[k]||[]).length);
    el.textContent=JSON.stringify({supabase:{configured:data.configured,tableCounts:data.tableCounts,syncMetadata:data.syncMetadata},local:{eventsLoaded:allEvents.length,statusBreakdown:sb,pipeline:ps,noRealDate:noDate,noEmail:noEmail,queueLength:queue.length,note:'TripleSeat uses 2000-01-01 as placeholder when no date is set'}},null,2);
  }catch(e){if(el)el.textContent='Error: '+e.message;}
}

// ── QUEUE ACTIONS ─────────────────────────────────────────────────────────────
function queueOne(eventId){
  const ev=allEvents.find(e=>String(e.id)===String(eventId));
  if(!ev){console.warn('Event not found:',eventId);return;}
  const contact=extractContact(ev);
  if(queue.find(q=>q.event_id===String(eventId)||q.contact_email===contact.email)){alert('Already in queue.');return;}
  const item={id:'q_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),event_id:String(ev.id),contact_email:contact.email||'',contact_name:contact.name,company:contact.company||'',campaign_id:getCategory(ev),subject:'',body:'',risk_flags:[],status:'draft_needed',ts_status:ev.status,is_future:isFutureEvent(ev),_ev:ev,created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
  queue.push(item);saveQueueItem(item);updateBadges();showTab('queue');
}
function clearQueue(){if(!confirm('Clear all?'))return;queue=[];fetch(`${API_ST}?action=bulk-save-queue`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({queue:[]})}).catch(()=>{});updateBadges();renderQueue();}
function approveAllReady(){queue.filter(q=>['needs_review','draft_generated'].includes(q.status)).forEach(q=>{q.status='approved';q.updated_at=new Date().toISOString();updateQueueItem(q);});updateBadges();renderQueue();}
function approveItem(id){const i=queue.find(q=>q.id===id);if(i){i.status='approved';i.updated_at=new Date().toISOString();updateQueueItem(i);updateBadges();renderQueue();}}
function skipItem(id){const i=queue.find(q=>q.id===id);if(i){i.status='skipped';i.updated_at=new Date().toISOString();updateQueueItem(i);renderQueue();}}
function markReady(id){const i=queue.find(q=>q.id===id);if(i){i.status='ready_to_send';i.updated_at=new Date().toISOString();updateQueueItem(i);renderQueue();}}
function markSent(id){
  const i=queue.find(q=>q.id===id);if(!i)return;
  i.status='sent';i.sent_at=new Date().toISOString();i.updated_at=new Date().toISOString();
  updateQueueItem(i);
  fetch(`${API_ST}?action=record-sent`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:i.contact_email,name:i.contact_name,campaign:i.campaign_id,subject:i.subject,body:i.body})}).catch(()=>{});
  renderQueue();
}
function removeItem(id){queue=queue.filter(q=>q.id!==id);fetch(`${API_ST}?action=bulk-save-queue`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({queue})}).catch(()=>{});updateBadges();renderQueue();}
async function saveQueueItem(item){await fetch(`${API_ST}?action=save-queue-item`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)}).catch(()=>{});}
async function updateQueueItem(item){await fetch(`${API_ST}?action=update-queue-item`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)}).catch(()=>{});}

// ── EMAIL GENERATION ──────────────────────────────────────────────────────────
async function generateOne(itemId){
  const item=queue.find(q=>q.id===itemId);if(!item)return;
  item.status='draft_generated';renderQueue();
  const ev=item._ev||allEvents.find(e=>String(e.id)===item.event_id)||{};
  const raw=ev.raw||ev;const contact=extractContact(ev);
  try{
    const res=await fetch(API_AI,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contact:{first_name:contact.first,last_name:contact.last,email:contact.email,company:contact.company,event_date:getEventDate(ev),event_description:raw.name||ev.name||'',guest_count:raw.guest_count||ev.guest_count||null,location_name:ev.location_name||raw.location?.name||'',last_booking_status:ev.status,is_future:isFutureEvent(ev),pipeline_category:item.campaign_id},campaign:item.campaign_id})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||`HTTP ${res.status}`);
    item.subject=(data.subject||'Following up').replace(/[\u2014\u2013]/g,'-');
    item.body=(data.body||'Could not generate.').replace(/[\u2014\u2013]/g,'-');
    item.risk_flags=data.riskFlags||[];item.status='needs_review';
  }catch(err){item.body=`Error: ${err.message}`;item.risk_flags=[];item.status='needs_review';}
  item.updated_at=new Date().toISOString();
  updateQueueItem(item);renderQueue();updateBadges();
}
async function generateAll(){
  const pending=queue.filter(q=>q.status==='draft_needed');if(!pending.length)return;
  const btn=document.querySelector('[onclick="generateAll()"]');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="sp2"></span> Generating…';}
  for(let i=0;i<pending.length;i++){await generateOne(pending[i].id);if(i<pending.length-1)await new Promise(r=>setTimeout(r,350));}
  if(btn){btn.disabled=false;btn.innerHTML='✨ Generate';}
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(itemId){
  const item=queue.find(q=>q.id===itemId);if(!item)return;
  modalQueueId=itemId;
  document.getElementById('mt').textContent=`Draft: ${item.contact_name||'Unknown'}`;
  document.getElementById('msub').value=item.subject||'';
  document.getElementById('memail').value=item.body||'';
  const flags=(item.risk_flags||[]).filter(f=>f&&f!=='none');
  document.getElementById('risk-display').innerHTML=flags.map(f=>`<div class="risk">⚠ ${esc(f)}</div>`).join('');
  document.getElementById('mo').classList.add('open');
}
function closeModal(){
  if(modalQueueId){const i=queue.find(q=>q.id===modalQueueId);if(i){i.subject=document.getElementById('msub').value;i.body=document.getElementById('memail').value;i.updated_at=new Date().toISOString();updateQueueItem(i);}}
  document.getElementById('mo').classList.remove('open');modalQueueId=null;renderQueue();
}
function approveFromModal(){
  if(modalQueueId){const i=queue.find(q=>q.id===modalQueueId);if(i){i.subject=document.getElementById('msub').value;i.body=document.getElementById('memail').value;i.status='approved';i.approved_at=new Date().toISOString();i.updated_at=new Date().toISOString();updateQueueItem(i);}}
  closeModal();
}
function copyModal(){
  navigator.clipboard.writeText(`Subject: ${document.getElementById('msub').value}\n\n${document.getElementById('memail').value}`).then(()=>{const b=document.getElementById('bcm');b.textContent='✓ Copied!';setTimeout(()=>b.textContent='Copy',2000);});
}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeModal();});

function renderSetupPane(paneId){document.getElementById(paneId).innerHTML=`<div class="emp"><div class="emp-i">⚙</div><h3>Supabase not connected</h3><p>See Command Center for setup steps.</p></div>`;}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadFromDB();
</script>
