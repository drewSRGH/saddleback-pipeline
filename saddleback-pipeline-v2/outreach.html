<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saddleback — Sales Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f0f0e;--s:#181817;--s2:#1f1f1d;--b:#2a2a27;--b2:#333330;--t:#f0ede8;--m:#8a8780;--m2:#5a5855;--a:#e8772a;--a2:#f5a623;--g:#4caf7d;--r:#e05252;--y:#f5a623;--bl:#5b8dee;--pu:#9b7edb;--te:#3dbdb0;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:14px;line-height:1.5}
    nav{display:flex;align-items:center;padding:0 22px;background:var(--s);border-bottom:1px solid var(--b);height:52px;position:sticky;top:0;z-index:50}
    .nb{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;color:var(--a2);margin-right:24px;text-decoration:none}
    .nt{display:flex}
    .ntb{padding:0 13px;height:52px;display:flex;align-items:center;font-size:.81rem;font-weight:500;color:var(--m);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;text-decoration:none}
    .ntb:hover{color:var(--t)}
    .ntb.active{color:var(--t);border-bottom-color:var(--a)}
    .nr{margin-left:auto;display:flex;align-items:center;gap:9px}
    .page{padding:16px 22px;max-width:1500px;margin:0 auto}
    .tabs{display:flex;gap:1px;border-bottom:1px solid var(--b);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .tab{padding:9px 14px;font-size:.79rem;font-weight:500;color:var(--m);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:color .15s,border-color .15s}
    .tab:hover{color:var(--t)}
    .tab.active{color:var(--t);border-bottom-color:var(--a);font-weight:600}
    .bge{display:inline-block;border-radius:20px;padding:1px 6px;font-size:.63rem;font-family:'DM Mono',monospace;margin-left:3px}
    .bge.g{background:rgba(76,175,125,.15);color:var(--g)}
    .bge.y{background:rgba(245,166,35,.15);color:var(--y)}
    .bge.r{background:rgba(224,82,82,.15);color:var(--r)}
    .bge.b{background:rgba(91,141,238,.15);color:var(--bl)}
    .bge.m{background:rgba(90,88,85,.2);color:var(--m)}
    .bge.a{background:rgba(232,119,42,.15);color:var(--a)}
    /* STATS */
    .sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:18px}
    .sc{background:var(--s);border:1px solid var(--b);border-radius:9px;padding:12px 14px;cursor:pointer;transition:border-color .15s}
    .sc:hover{border-color:var(--b2)}
    .sn{font-family:'Fraunces',serif;font-size:1.35rem;font-weight:700;line-height:1}
    .sl{font-size:.64rem;color:var(--m);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-top:3px}
    /* PROGRESS */
    .pw{background:var(--s);border:1px solid var(--b);border-radius:7px;padding:11px 15px;margin-bottom:16px}
    .pl{font-size:.74rem;color:var(--m);margin-bottom:6px;font-family:'DM Mono',monospace}
    .pb{background:var(--s2);border-radius:3px;height:4px;overflow:hidden}
    .pf{height:100%;background:var(--a);border-radius:3px;transition:width .3s}
    /* STATUS MSG */
    .sm{font-size:.76rem;padding:8px 12px;border-radius:7px;margin-bottom:13px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:7px}
    .sm.ld{background:rgba(91,141,238,.1);color:var(--bl);border:1px solid rgba(91,141,238,.2)}
    .sm.ok{background:rgba(76,175,125,.1);color:var(--g);border:1px solid rgba(76,175,125,.2)}
    .sm.er{background:rgba(224,82,82,.1);color:var(--r);border:1px solid rgba(224,82,82,.2)}
    .sm.wa{background:rgba(245,166,35,.1);color:var(--y);border:1px solid rgba(245,166,35,.2)}
    /* BUTTONS */
    .btn{border:none;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
    .ba{background:var(--a);color:#fff;padding:6px 13px;font-size:.79rem}
    .ba:hover{background:#f08030}
    .ba:disabled{background:var(--b2);color:var(--m2);cursor:not-allowed}
    .bgh{background:transparent;color:var(--m);border:1px solid var(--b2);padding:5px 10px;font-size:.74rem}
    .bgh:hover{color:var(--t);border-color:var(--m)}
    .bgg{background:var(--g);color:#fff;padding:6px 12px;font-size:.76rem}
    .bgg:hover{background:#3d9d6a}
    .br{background:transparent;color:var(--r);border:1px solid rgba(224,82,82,.3);padding:4px 8px;font-size:.71rem}
    .bs{padding:4px 9px;font-size:.71rem}
    /* STATUS PILLS */
    .pill{font-size:.63rem;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .pill-tent{background:rgba(245,166,35,.15);color:var(--y);border:1px solid rgba(245,166,35,.3)}
    .pill-def{background:rgba(76,175,125,.15);color:var(--g);border:1px solid rgba(76,175,125,.3)}
    .pill-closed{background:rgba(91,141,238,.15);color:var(--bl);border:1px solid rgba(91,141,238,.3)}
    .pill-prosp{background:rgba(155,126,219,.15);color:var(--pu);border:1px solid rgba(155,126,219,.3)}
    .pill-lost{background:rgba(224,82,82,.1);color:var(--r);border:1px solid rgba(224,82,82,.2)}
    .pill-lead{background:rgba(61,189,176,.12);color:var(--te);border:1px solid rgba(61,189,176,.2)}
    /* OPPORTUNITY CARDS */
    .opp{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px;margin-bottom:8px;transition:border-color .15s}
    .opp:hover{border-color:var(--b2)}
    .opp.urgent{border-left:3px solid var(--y)}
    .opp.high{border-left:3px solid var(--a)}
    .opp.med{border-left:3px solid var(--bl)}
    .opp.low{border-left:3px solid var(--m2)}
    .opp.closed-past{border-left:3px solid var(--g)}
    .opp-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
    .opp-name{font-weight:600;font-size:.9rem}
    .opp-co{font-size:.72rem;color:var(--m);margin-top:1px}
    .opp-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:.69rem;color:var(--m2);font-family:'DM Mono',monospace;margin-bottom:8px}
    .opp-meta span{color:var(--m)}
    .opp-action{background:rgba(232,119,42,.06);border:1px solid rgba(232,119,42,.15);border-radius:6px;padding:7px 10px;font-size:.75rem;color:var(--m);margin-bottom:9px;line-height:1.5}
    .opp-action strong{color:var(--a2)}
    .opp-footer{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--b)}
    /* SCORE BADGE */
    .score{font-size:.65rem;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px}
    .score-high{background:rgba(245,166,35,.15);color:var(--y)}
    .score-med{background:rgba(91,141,238,.12);color:var(--bl)}
    .score-low{background:rgba(90,88,85,.2);color:var(--m)}
    /* SECTION HEADERS */
    .sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
    .sec-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:600;color:var(--t)}
    /* YEAR GRID */
    .yr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
    .yr-col{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px}
    .yr-col-hdr{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--b)}
    /* DRAFT CARD */
    .draft-body{background:var(--s2);border-radius:6px;padding:10px 12px;font-size:.78rem;line-height:1.65;color:var(--m);white-space:pre-wrap;max-height:140px;overflow-y:auto;border-left:3px solid var(--b2);margin:8px 0}
    .risk{background:rgba(224,82,82,.07);border:1px solid rgba(224,82,82,.2);border-radius:5px;padding:5px 9px;font-size:.7rem;color:var(--r);margin-bottom:5px}
    /* SETUP */
    .setup{background:rgba(91,141,238,.07);border:1px solid rgba(91,141,238,.2);border-radius:10px;padding:17px 20px;margin-bottom:18px}
    .setup h3{font-size:.92rem;font-weight:600;color:var(--bl);margin-bottom:9px}
    .setup ol{padding-left:16px;font-size:.8rem;color:var(--m);line-height:2.1}
    code{background:var(--s2);padding:1px 6px;border-radius:3px;font-family:'DM Mono',monospace;font-size:.78rem;color:var(--t)}
    /* EMPTY */
    .emp{text-align:center;padding:40px 20px;color:var(--m2)}
    .emp-i{font-size:1.6rem;margin-bottom:8px;opacity:.4}
    .emp h3{font-size:.88rem;color:var(--m);margin-bottom:4px}
    .sp2{display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    input[type=text]{background:var(--s);border:1px solid var(--b);color:var(--t);padding:6px 10px;border-radius:6px;font-size:.77rem;font-family:'DM Sans',sans-serif;outline:none}
    input[type=text]:focus{border-color:var(--a)}
    input::placeholder{color:var(--m2)}
    select{background:var(--s);border:1px solid var(--b);color:var(--t);padding:6px 10px;border-radius:6px;font-size:.77rem;font-family:'DM Sans',sans-serif;outline:none}
    .dbg{background:var(--s);border:1px solid var(--b2);border-radius:7px;padding:13px;font-family:'DM Mono',monospace;font-size:.71rem;color:var(--m);white-space:pre-wrap;line-height:1.6;max-height:500px;overflow-y:auto}
    /* WF LEGEND */
    .wfl{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px}
    .wfi{font-size:.65rem;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px}
    /* MODAL */
    #mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;justify-content:center;align-items:center;padding:20px}
    #mo.open{display:flex}
    #md{background:var(--s);border:1px solid var(--b2);border-radius:14px;width:100%;max-width:640px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,.5)}
    .mh{padding:15px 20px 12px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center}
    .mh h2{font-family:'Fraunces',serif;font-size:.95rem;font-weight:600}
    .mc{background:none;border:none;color:var(--m);cursor:pointer;font-size:1rem}
    .ms-w{padding:8px 20px;border-bottom:1px solid var(--b)}
    .ms-l{font-size:.61rem;text-transform:uppercase;letter-spacing:.08em;color:var(--m2);margin-bottom:3px;font-weight:700}
    #msub{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:5px;color:var(--t);padding:6px 10px;font-size:.81rem;font-family:'DM Sans',sans-serif;outline:none}
    .mb{padding:12px 20px;flex:1;overflow-y:auto}
    #memail{width:100%;min-height:220px;background:var(--s2);border:1px solid var(--b);border-radius:6px;color:var(--t);padding:12px;font-size:.79rem;line-height:1.65;resize:vertical;font-family:'DM Sans',sans-serif;outline:none}
    .mf{padding:10px 20px;border-top:1px solid var(--b);display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
    .mf button{padding:7px 15px;border-radius:6px;font-size:.79rem;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
    #bam{background:var(--g);color:#fff}
    #bcm{background:var(--a);color:#fff}
    #bclm{background:var(--s2);color:var(--m);border:1px solid var(--b2)}
  </style>
</head>
<body>
<nav>
  <a class="nb" href="/">🔥 Saddleback SRG</a>
  <div class="nt">
    <a href="/" class="ntb">Pipeline</a>
    <a href="/analytics.html" class="ntb">Analytics</a>
    <a href="/outreach.html" class="ntb active">Outreach</a>
  </div>
  <div class="nr">
    <span style="font-size:.68rem;color:var(--m2);font-family:'DM Mono',monospace" id="last-sync-label"></span>
    <button class="btn bgh bs" onclick="doFullSync()" id="btn-sync">↻ Full Sync</button>
  </div>
</nav>

<div class="page">
  <div id="status-msg" style="display:none"></div>
  <div id="progress-wrap" style="display:none" class="pw">
    <div class="pl" id="pl">Loading…</div>
    <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('cmd')"       id="tab-cmd">Command Center</button>
    <button class="tab"        onclick="showTab('tent')"      id="tab-tent">Tentative <span class="bge y" id="bg-tent">—</span></button>
    <button class="tab"        onclick="showTab('prospect')"  id="tab-prospect">Prospects <span class="bge b" id="bg-prospect">—</span></button>
    <button class="tab"        onclick="showTab('definite')"  id="tab-definite">Definite <span class="bge g" id="bg-definite">—</span></button>
    <button class="tab"        onclick="showTab('closed')"    id="tab-closed">Past Customers <span class="bge a" id="bg-closed">—</span></button>
    <button class="tab"        onclick="showTab('lost')"      id="tab-lost">Lost / Nurture <span class="bge r" id="bg-lost">—</span></button>
    <button class="tab"        onclick="showTab('years')"     id="tab-years">2026 / 2027</button>
    <button class="tab"        onclick="showTab('queue')"     id="tab-queue">Email Queue <span class="bge g" id="bg-queue">0</span></button>
    <button class="tab"        onclick="showTab('debug')"     id="tab-debug">Debug / Sync</button>
  </div>

  <div id="pane-cmd"></div>
  <div id="pane-tent"     style="display:none"></div>
  <div id="pane-prospect" style="display:none"></div>
  <div id="pane-definite" style="display:none"></div>
  <div id="pane-closed"   style="display:none"></div>
  <div id="pane-lost"     style="display:none"></div>
  <div id="pane-years"    style="display:none"></div>
  <div id="pane-queue"    style="display:none"></div>
  <div id="pane-debug"    style="display:none"></div>
</div>

<!-- MODAL -->
<div id="mo">
  <div id="md">
    <div class="mh"><h2 id="mt">Review Draft</h2><button class="mc" onclick="closeModal()">✕</button></div>
    <div class="ms-w"><div class="ms-l">Subject</div><input type="text" id="msub" placeholder="Subject…"></div>
    <div class="mb"><div id="risk-display" style="margin-bottom:8px"></div><textarea id="memail"></textarea></div>
    <div class="mf">
      <button id="bclm" onclick="closeModal()">Close</button>
      <button id="bcm"  onclick="copyModal()">Copy</button>
      <button id="bam"  onclick="approveFromModal()">✓ Approve</button>
    </div>
  </div>
</div>

<script>
const API_TS='/.netlify/functions/tripleseat', API_AI='/.netlify/functions/ai', API_ST='/.netlify/functions/store';

// ── PERSONAL DOMAINS ──────────────────────────────────────────────────────────
const PD=new Set(['gmail.com','yahoo.com','hotmail.com','outlook.com','icloud.com','aol.com','live.com','msn.com','me.com','mac.com','comcast.net','att.net','verizon.net','sbcglobal.net','charter.net','cox.net','earthlink.net','protonmail.com','ymail.com','googlemail.com','rocketmail.com','bellsouth.net']);
const DM={'msu.edu':'Michigan State University','michigan.gov':'State of Michigan','lsd.k12.mi.us':'Lansing School District','okemos.k12.mi.us':'Okemos Public Schools','ingham.org':'Ingham County','lansingmi.gov':'City of Lansing','deltadental.com':'Delta Dental','bcbsm.com':'Blue Cross Blue Shield','sparrow.org':'Sparrow Health System','mclaren.org':'McLaren Health','lcc.edu':'Lansing Community College'};

// ── STATE ─────────────────────────────────────────────────────────────────────
let bookings=[], contacts=[], accounts=[], leads=[];
let opportunities=[];  // enriched, scored, deduped
let queue=[];
let activeTab='cmd', modalQueueId=null, dbConfigured=false;

(function(){try{['srg-contacts','srg-lastsync','srg-queue'].forEach(k=>{try{localStorage.removeItem(k);}catch(e){}});}catch(e){}})();

// ── HELPERS ───────────────────────────────────────────────────────────────────
function setStatus(msg,type='ld'){const el=document.getElementById('status-msg');if(!msg){el.style.display='none';return;}el.className='sm '+type;el.innerHTML=msg;el.style.display='flex';}
function setProgress(pct,label){document.getElementById('progress-wrap').style.display='block';document.getElementById('pf').style.width=pct+'%';document.getElementById('pl').textContent=label;}
function hideProgress(){setTimeout(()=>document.getElementById('progress-wrap').style.display='none',2000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getDomain(email){if(!email)return null;const m=email.toLowerCase().match(/@([^@]+)$/);return(m&&!PD.has(m[1]))?m[1]:null;}
function domainName(d){if(!d)return null;if(DM[d])return DM[d];const b=d.replace(/\.(com|org|edu|gov|net|mil|k12\.mi\.us|mi\.us)$/,'').split('.').pop();return b?b.charAt(0).toUpperCase()+b.slice(1):null;}
function daysAgo(dateStr){if(!dateStr)return null;return Math.floor((Date.now()-new Date(dateStr).getTime())/86400000);}
function daysUntil(dateStr){if(!dateStr)return null;return Math.floor((new Date(dateStr).getTime()-Date.now())/86400000);}
function fmtDate(d){if(!d)return null;try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return d;}}
function fmtMonth(d){if(!d)return null;try{return new Date(d).toLocaleDateString('en-US',{month:'short',year:'numeric'});}catch(e){return d;}}

// ── STATUS HELPERS ────────────────────────────────────────────────────────────
const STATUS_ORDER={TENTATIVE:0,PROSPECT:1,DEFINITE:2,CLOSED:3,LOST:4};
function pillClass(s){const m={TENTATIVE:'pill-tent',PROSPECT:'pill-prosp',DEFINITE:'pill-def',CLOSED:'pill-closed',LOST:'pill-lost'};return m[s]||'pill-lead';}
function statusColor(s){const m={TENTATIVE:'var(--y)',PROSPECT:'var(--pu)',DEFINITE:'var(--g)',CLOSED:'var(--bl)',LOST:'var(--r)'};return m[s]||'var(--m)';}

// ── OPPORTUNITY SCORING ───────────────────────────────────────────────────────
function scoreOpportunity(b, contactData, allBookingsForContact) {
  let score = 0;
  const status = (b.status||'').toUpperCase();
  const daysSinceUpdate = daysAgo(b.updated_at||b.created_at);
  const daysToEvent = daysUntil(b.start_date);
  const guests = parseInt(b.guest_count)||0;
  const year = b.start_date ? new Date(b.start_date).getFullYear() : null;

  // Status base score
  if(status==='TENTATIVE') score+=100;
  else if(status==='PROSPECT') score+=60;
  else return 0; // Definite/Closed/Lost don't need sales scoring

  // Recency urgency — stale = needs attention
  if(status==='TENTATIVE'){
    if(daysSinceUpdate>14) score+=40;
    else if(daysSinceUpdate>7) score+=20;
    else if(daysSinceUpdate>3) score+=10;
  } else if(status==='PROSPECT'){
    if(daysSinceUpdate>10) score+=30;
    else if(daysSinceUpdate>5) score+=15;
    else if(daysSinceUpdate>2) score+=8;
  }

  // Guest count
  if(guests>=200) score+=35;
  else if(guests>=100) score+=25;
  else if(guests>=50) score+=15;
  else if(guests>=25) score+=8;

  // Event timing
  if(daysToEvent!==null){
    if(daysToEvent>0&&daysToEvent<=90) score+=25;
    else if(daysToEvent>0&&daysToEvent<=180) score+=15;
    else if(daysToEvent>0&&daysToEvent<=365) score+=8;
  }

  // Year bonus — 2026 is more urgent than 2027
  if(year===2026) score+=15;
  else if(year===2027) score+=8;

  // Prior closed history = higher value
  const hasClosed=allBookingsForContact.some(x=>(x.status||'').toUpperCase()==='CLOSED');
  if(hasClosed) score+=20;

  // Description keywords
  const desc=(b.description||b.name||'').toLowerCase();
  if(/wedding|reception/.test(desc)) score+=15;
  if(/corporate|company|office|staff/.test(desc)) score+=10;
  if(/graduat|graduation/.test(desc)) score+=10;
  if(/holiday|christmas|thanksgiving/.test(desc)) score+=8;

  return score;
}

// ── SUGGESTED NEXT ACTION ─────────────────────────────────────────────────────
function suggestAction(b, score, allBookingsForContact) {
  const status=(b.status||'').toUpperCase();
  const daysSinceUpdate=daysAgo(b.updated_at||b.created_at);
  const daysToEvent=daysUntil(b.start_date);
  const guests=parseInt(b.guest_count)||0;
  const hasClosed=allBookingsForContact.some(x=>(x.status||'').toUpperCase()==='CLOSED');
  const yr=b.start_date?new Date(b.start_date).getFullYear():null;
  const guestStr=guests?` (${guests} guests)`:'';
  const dateStr=b.start_date?` on ${fmtDate(b.start_date)}`:'';

  if(status==='TENTATIVE'){
    if(daysSinceUpdate>14) return `Tentative${guestStr}${dateStr} — last updated ${daysSinceUpdate} days ago. This lead is going cold. Ryan should check in and ask about locking in the date.`;
    if(daysSinceUpdate>7)  return `Tentative${guestStr}${dateStr} — ${daysSinceUpdate} days since last update. Good time for a warm check-in to keep momentum.`;
    if(daysToEvent!==null&&daysToEvent<=90) return `Tentative event${dateStr} is only ${daysToEvent} days away${guestStr}. Ryan should confirm commitment and discuss next steps.`;
    if(yr===2027)          return `2027 Tentative${guestStr}. Keep this warm — ask if they want to start planning or lock in availability.`;
    return `Tentative booking${guestStr}${dateStr}. Follow up to move toward Definite.`;
  }
  if(status==='PROSPECT'){
    if(daysSinceUpdate<=3)  return `New Prospect${guestStr}${dateStr} — created ${daysSinceUpdate} days ago. Ryan should send a first follow-up soon.`;
    if(daysSinceUpdate>10)  return `Prospect has gone quiet for ${daysSinceUpdate} days${guestStr}. Low-pressure check-in recommended.`;
    return `Prospect${guestStr}${dateStr} — ${daysSinceUpdate} days old. Good time for Ryan to follow up and understand their needs.`;
  }
  return '';
}

// ── BUILD OPPORTUNITIES ───────────────────────────────────────────────────────
function buildOpportunities() {
  // Group bookings by contact/account
  const bookingsByContact={}, bookingsByAccount={};
  bookings.forEach(b=>{
    if(b.contact_id){bookingsByContact[b.contact_id]=bookingsByContact[b.contact_id]||[];bookingsByContact[b.contact_id].push(b);}
    if(b.account_id){bookingsByAccount[b.account_id]=bookingsByAccount[b.account_id]||[];bookingsByAccount[b.account_id].push(b);}
  });
  const accountMap={};
  accounts.forEach(a=>accountMap[a.id]=a);
  const contactMap={};
  contacts.forEach(c=>contactMap[c.id]=c);

  const opps=[];
  // Central status extraction — checks all possible field names
  function getStatus(r){
    if(!r) return 'UNKNOWN';
    // Events use 'status' field directly: TENTATIVE, DEFINITE, CLOSED, PROSPECT, LOST
    const s = r.status || r.event_status || r.booking_status || '';
    const norm = s.toString().toUpperCase().trim();
    if(['TENTATIVE','DEFINITE','CLOSED','PROSPECT','LOST'].includes(norm)) return norm;
    // Common variations
    if(norm==='DEFINITIVE') return 'DEFINITE';
    if(norm==='CANCELLED'||norm==='CANCELED') return 'LOST';
    if(norm==='WON') return 'CLOSED';
    return norm||'UNKNOWN';
  }

  // Field normalization — events use event_start, bookings use start_date
  function getEventDate(r){
    return r.event_start||r.start_date||r.event_date||null;
  }
  function getEventEnd(r){
    return r.event_end||r.end_date||null;
  }

  bookings.forEach(b=>{
    const status=getStatus(b);
    const contact=b.contact_id?contactMap[b.contact_id]:null;
    const account=b.account_id?accountMap[b.account_id]:null;
    const allForContact=[...(bookingsByContact[b.contact_id]||[]),...(bookingsByAccount[b.account_id]||[])];
    const uniqueAll=[...new Map(allForContact.map(x=>[x.id,x])).values()];

    const email=(contact?.email_address||contact?.email||account?.email||'').toLowerCase().trim();
    const name=[contact?.first_name,contact?.last_name].filter(Boolean).join(' ')||account?.name||'Unknown';
    const company=account?.name||contact?.company||'';
    const phone=contact?.phone_number||contact?.phone||account?.phone||'';

    // Count bookings by status for this contact/account
    const statusCounts={TENTATIVE:0,PROSPECT:0,DEFINITE:0,CLOSED:0,LOST:0};
    uniqueAll.forEach(x=>{const s=(x.status||'').toUpperCase();if(statusCounts[s]!==undefined)statusCounts[s]++;});
    const hasClosed=statusCounts.CLOSED>0;
    const hasDefinite=statusCounts.DEFINITE>0;

    // Customer type
    let customerType='lead_only';
    if(hasClosed) customerType='past_customer';
    else if(hasDefinite) customerType='past_definite';
    else if(status==='TENTATIVE'||status==='PROSPECT') customerType='active_lead';
    else if(status==='LOST'&&!hasClosed&&!hasDefinite) customerType='lost_only';

    const score=(status==='TENTATIVE'||status==='PROSPECT')?scoreOpportunity(b,contact,uniqueAll):0;
    const action=(status==='TENTATIVE'||status==='PROSPECT')?suggestAction(b,score,uniqueAll):'';
    const urgency=score>=140?'urgent':score>=100?'high':score>=70?'med':'low';

    opps.push({
      id:String(b.id), bookingId:b.id, status,
      name, company, email, phone,
      eventDate:getEventDate(b), eventYear:getEventDate(b)?new Date(getEventDate(b)).getFullYear():null,      guests:parseInt(b.guest_count)||0,
      description:b.description||b.name||'',
      location:b.location_name||'',
      updatedAt:b.updated_at||b.created_at,
      createdAt:b.created_at,
      daysSinceUpdate:daysAgo(b.updated_at||b.created_at),
      daysToEvent:daysUntil(b.start_date),
      score, urgency, action,
      customerType, hasClosed, hasDefinite,
      statusCounts,
      totalBookings:uniqueAll.length,
      rawBooking:b,
    });
  });

  // Deduplicate: keep highest-score booking per email (for active leads)
  // But keep ALL closed/definite for past customer section
  const activeMap={};
  const closed=[], definite=[], lostArr=[];
  opps.forEach(o=>{
    if(o.status==='CLOSED'){closed.push(o);return;}
    if(o.status==='DEFINITE'){definite.push(o);return;}
    if(o.status==='LOST'){lostArr.push(o);return;}
    const key=o.email||o.name;
    if(!activeMap[key]||o.score>activeMap[key].score) activeMap[key]=o;
  });

  return [...Object.values(activeMap),...definite,...closed,...lostArr]
    .sort((a,b)=>b.score-a.score||STATUS_ORDER[a.status]-STATUS_ORDER[b.status]);
}

// ── LOAD FROM SUPABASE ────────────────────────────────────────────────────────
async function loadFromDB() {
  setStatus('Loading…','ld');
  try {
    const metaRes = await fetch(`${API_ST}?action=get-metadata`);
    const meta    = await metaRes.json().catch(()=>({}));

    if (meta.configured === false || meta.ok === false) {
      dbConfigured = false;
      renderSetupBanner(meta.error);
      setStatus('','');
      return;
    }
    dbConfigured = true;

    // Always try to load — don't gate on metadata values.
    // Only bail if the table is genuinely empty.
    setProgress(20,'Loading events…');
    const evRows = await loadAllRows('ts_events','*','event_start.asc.nullslast');
    const bkRows = evRows.length === 0
      ? await loadAllRows('ts_bookings','*','start_date.asc.nullslast')
      : [];
    allEvents = evRows.length > 0 ? evRows : bkRows;

    if (allEvents.length === 0) {
      setStatus('No data yet. Click "↻ Full Sync" to import from Tripleseat.','wa');
      hideProgress();
      renderTab(activeTab);
      return;
    }

    if (evRows.length === 0 && bkRows.length > 0) {
      setStatus('Using booking data — run Full Sync to get proper event status data.','wa');
    }

    setProgress(70,'Building pipeline…');
    pipeline = buildPipeline(allEvents);

    setProgress(85,'Loading queue…');
    const qData = await fetch(`${API_ST}?action=get-queue`).then(r=>r.json()).catch(()=>({queue:[]}));
    queue = qData.queue || [];

    setProgress(100,'✓ Loaded');
    hideProgress();

    const lastSync = meta.last_full_sync;
    const syncDate = lastSync ? new Date(lastSync) : null;
    document.getElementById('last-sync-label').textContent = syncDate
      ? 'Synced '+syncDate.toLocaleDateString() : '';

    setStatus(`✓ ${allEvents.length.toLocaleString()} events loaded`,'ok');
    setTimeout(()=>setStatus('',''),4000);
    updateBadges();
    renderTab(activeTab);

    if (syncDate && (Date.now()-syncDate.getTime()) > 3*86400000) {
      setTimeout(()=>setStatus(`Data is ${Math.floor((Date.now()-syncDate.getTime())/86400000)} days old. Consider a Full Sync.`,'wa'),5000);
    }
  } catch(err) {
    console.error('[loadFromDB]',err);
    setStatus('Load error: '+err.message,'er');
    renderTab(activeTab);
  }
}
  try{
    // 1. Leads
    setProgress(3,'Fetching leads…');
    const allLeads=await fetchAllPages('leads');
    setProgress(10,`${allLeads.length} leads — saving…`);
    const lSave=await sbPost('save-leads',{leads:allLeads});
    if(lSave?.ok===false) throw new Error('save-leads: '+lSave.error);

    // 2. Events — STATUS LIVES HERE (TENTATIVE/DEFINITE/CLOSED/PROSPECT/LOST)
    setProgress(13,'Fetching events (status: Tentative/Definite/Closed/Prospect/Lost)…');
    const allEvents=await fetchAllPages('events');
    setProgress(35,`${allEvents.length} events — saving…`);
    const eSave=await sbPost('save-events',{events:allEvents});
    if(eSave?.ok===false) throw new Error('save-events: '+eSave.error);

    // Also fetch bookings for account/contact linking
    setProgress(36,'Fetching bookings (account/contact links)…');
    const allBookings=await fetchAllPages('bookings');
    setProgress(40,`${allBookings.length} bookings — saving…`);
    const bSave=await sbPost('save-bookings',{bookings:allBookings});
    if(bSave?.ok===false) throw new Error('save-bookings: '+bSave.error);

    // 3. Accounts
    setProgress(40,'Fetching accounts…');
    const allAccounts=await fetchAllPages('accounts');
    setProgress(52,`${allAccounts.length} accounts — saving…`);
    const aSave=await sbPost('save-accounts',{accounts:allAccounts});
    if(aSave?.ok===false) throw new Error('save-accounts: '+aSave.error);

    // 4. Contacts
    setProgress(55,'Fetching contacts…');
    const allContacts=await fetchAllPages('contacts');
    setProgress(68,`${allContacts.length} contacts — saving…`);
    const cSave=await sbPost('save-contacts',{contacts:allContacts});
    if(cSave?.ok===false) throw new Error('save-contacts: '+cSave.error);

    // 5. Build + save outreach_contacts
    setProgress(72,'Building opportunity profiles…');
    // Use events (with status) as primary, bookings as supplement
    bookings=allEvents.length>0?allEvents:allBookings;
    accounts=allAccounts; contacts=allContacts; leads=allLeads;
    const outreach=buildLegacyOutreachContacts(allLeads,allBookings,allAccounts,allContacts);
    setProgress(80,`${outreach.length} profiles — saving…`);
    for(let i=0;i<outreach.length;i+=300){
      const pct=80+Math.round((i/outreach.length)*15);
      setProgress(pct,`Saving profiles ${i+1}-${Math.min(i+300,outreach.length)}…`);
      const r=await sbPost('save-outreach-contacts',{contacts:outreach.slice(i,i+300)});
      if(r?.ok===false) throw new Error('save-outreach-contacts batch: '+r.error);
    }

    // 6. Verify
    setProgress(97,'Verifying…');
    const vm=await fetch(`${API_ST}?action=get-metadata`).then(r=>r.json()).catch(()=>({}));
    if(parseInt(vm.total_bookings||'0')===0) console.warn('Warning: bookings still 0 after sync');

    // 7. Build opportunities in memory
    opportunities=buildOpportunities();
    updateBadges(); renderTab(activeTab); dbConfigured=true;

    setProgress(100,`✓ ${allBookings.length} bookings with real status data synced`);
    hideProgress();
    document.getElementById('last-sync-label').textContent='Synced '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setStatus(`✓ Sync complete: ${allBookings.length} bookings, ${allLeads.length} leads, ${allContacts.length} contacts. Page will load from database going forward.`,'ok');
    setTimeout(()=>setStatus('',''),8000);

  }catch(err){
    console.error('[doFullSync]',err);
    setProgress(100,'Sync error: '+err.message);
    setStatus('Sync error: '+err.message,'er');
  }
  if(btn){btn.disabled=false;btn.textContent='↻ Full Sync';}
}

async function fetchAllPages(endpoint){
  const all=[];let page=1,total=1;
  while(page<=Math.min(total,100)){
    const res=await fetch(`${API_TS}?endpoint=${endpoint}&page=${page}&limit=100`);
    if(!res.ok) throw new Error(`TS ${endpoint} HTTP ${res.status}`);
    const data=await res.json();
    total=data.total_pages||1;
    (data.results||[]).forEach(r=>all.push(r));
    page++;
    if(page<=Math.min(total,100)) await new Promise(r=>setTimeout(r,80));
  }
  return all;
}

async function sbPost(action,body){
  const res=await fetch(`${API_ST}?action=${action}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json().catch(()=>({}));
  if(!res.ok||data.ok===false) console.error(`[sbPost] ${action} failed:`,data.error||res.status);
  return data;
}

// Legacy outreach contacts builder (for outreach_contacts table compatibility)
function buildLegacyOutreachContacts(leads,bookings,accounts,contacts){
  const map={};
  const bookingsByContact={},bookingsByAccount={};
  bookings.forEach(b=>{
    if(b.contact_id){bookingsByContact[b.contact_id]=bookingsByContact[b.contact_id]||[];bookingsByContact[b.contact_id].push(b);}
    if(b.account_id){bookingsByAccount[b.account_id]=bookingsByAccount[b.account_id]||[];bookingsByAccount[b.account_id].push(b);}
  });
  const accountMap={};accounts.forEach(a=>accountMap[a.id]=a);

  contacts.forEach(c=>{
    const email=(c.email_address||c.email||'').toLowerCase().trim();
    if(!email) return;
    const acct=c.account_id?accountMap[c.account_id]:null;
    const cBookings=[...(bookingsByContact[c.id]||[]),...(c.account_id?bookingsByAccount[c.account_id]||[]:[])] ;
    const unique=[...new Map(cBookings.map(x=>[x.id,x])).values()];
    const closed=unique.filter(b=>(b.status||'').toUpperCase()==='CLOSED');
    const definite=unique.filter(b=>(b.status||'').toUpperCase()==='DEFINITE');
    const latest=unique.sort((a,b)=>new Date(b.updated_at||0)-new Date(a.updated_at||0))[0];
    const lastEventDate=closed[0]?.start_date||definite[0]?.start_date||latest?.start_date||null;
    const domain=getDomain(email);
    map[email]={
      id:email,ts_contact_id:c.id,ts_account_id:c.account_id||null,
      first_name:c.first_name,last_name:c.last_name,email,
      company:acct?.name||c.company||null,domain,
      account_status:closed.length?'past_customer':definite.length?'past_definite':unique.length?'active_lead':'never_booked',
      booking_statuses:[...new Set(unique.map(b=>(b.status||'').toUpperCase()))],
      booking_count:unique.length,
      last_event_date:lastEventDate,
      last_booking_status:(latest?.status||'').toUpperCase()||null,
      total_guests:unique.reduce((s,b)=>s+(parseInt(b.guest_count)||0),0),
      tags:[],updated_at:new Date().toISOString(),
    };
  });

  leads.forEach(l=>{
    const email=(l.email_address||l.email||'').toLowerCase().trim();
    if(!email||map[email]) return;
    const domain=getDomain(email);
    map[email]={
      id:email,ts_contact_id:null,ts_account_id:null,
      first_name:l.first_name,last_name:l.last_name,email,
      company:l.company||null,domain,account_status:'never_booked',
      booking_statuses:[],booking_count:0,
      last_event_date:l.event_date||null,last_booking_status:null,
      total_guests:parseInt(l.guest_count)||0,tags:[],
      updated_at:new Date().toISOString(),
    };
  });
  return Object.values(map);
}

  <div style="background:${statusColor(status)}0f;border:1px solid ${statusColor(status)}33;border-radius:8px;padding:10px 14px;margin-bottom:16px">
    <div style="font-size:.82rem;font-weight:600;color:${statusColor(status)};margin-bottom:3px">${labels[status]}</div>
    <div style="font-size:.75rem;color:var(--m)">${notes[status]}</div>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;font-size:.74rem;font-family:'DM Mono',monospace;color:var(--m2)">
    <span><span style="color:var(--m)">${list.length}</span> total</span>
    ${totGuests?`<span><span style="color:var(--m)">${totGuests.toLocaleString()}</span> total guests</span>`:''}
    ${avg?`<span><span style="color:var(--m)">${avg}</span> avg guests</span>`:''}
    ${yr2026?`<span><span style="color:var(--y)">${yr2026}</span> in 2026</span>`:''}
    ${yr2027?`<span><span style="color:var(--y)">${yr2027}</span> in 2027</span>`:''}
    ${stale?`<span><span style="color:var(--r)">${stale}</span> stale (7d+)</span>`:''}
  </div>
  ${list.length===0?`<div class="emp"><div class="emp-i">—</div><h3>No ${status.toLowerCase()} events</h3><p>Sync from Tripleseat to get latest data.</p></div>`:''}
  ${list.map(o=>oppCard(o,status==='TENTATIVE'||status==='PROSPECT')).join('')}`;
}

// ── 2026 / 2027 VIEW ─────────────────────────────────────────────────────────
function renderYears(){
  const p=document.getElementById('pane-years');
  const activeStatuses=['TENTATIVE','PROSPECT','DEFINITE'];
  const yr2026=opportunities.filter(o=>o.eventYear===2026&&activeStatuses.includes(o.status));
  const yr2027=opportunities.filter(o=>o.eventYear===2027&&activeStatuses.includes(o.status));

  function yearSection(yr,list){
    const byStatus={TENTATIVE:list.filter(o=>o.status==='TENTATIVE'),PROSPECT:list.filter(o=>o.status==='PROSPECT'),DEFINITE:list.filter(o=>o.status==='DEFINITE')};
    return `
    <div style="margin-bottom:24px">
      <div style="font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;margin-bottom:14px;color:var(--a2)">${yr} Active Leads <span style="font-size:.76rem;font-family:'DM Sans',sans-serif;color:var(--m);font-weight:400">${list.length} total · ${list.reduce((s,o)=>s+o.guests,0).toLocaleString()} guests</span></div>
      <div class="yr-grid">
        ${['TENTATIVE','PROSPECT','DEFINITE'].map(st=>`
        <div class="yr-col">
          <div class="yr-col-hdr" style="color:${statusColor(st)}">${st} <span style="color:var(--m2)">(${byStatus[st].length})</span></div>
          ${byStatus[st].length===0?`<div style="font-size:.74rem;color:var(--m2);padding:8px 0">None</div>`:''}
          ${byStatus[st].slice(0,20).map(o=>`
          <div style="padding:8px 0;border-bottom:1px solid var(--b);last-child:border-none">
            <div style="font-size:.84rem;font-weight:600">${esc(o.name)}</div>
            ${o.company?`<div style="font-size:.7rem;color:var(--m)">${esc(o.company)}</div>`:''}
            <div style="font-size:.68rem;color:var(--m2);font-family:'DM Mono',monospace;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap">
              ${o.eventDate?`<span>${fmtDate(o.eventDate)}</span>`:''}
              ${o.guests?`<span>${o.guests} guests</span>`:''}
              ${o.daysSinceUpdate!==null?`<span style="color:${o.daysSinceUpdate>7?'var(--r)':'var(--m2)'}">${o.daysSinceUpdate}d ago</span>`:''}
            </div>
            <div style="margin-top:5px;display:flex;gap:5px">
              <button class="btn ba bs" onclick="queueOne('${esc(o.id)}','${o.status.toLowerCase()}')">Draft</button>
              ${o.email?`<a href="mailto:${esc(o.email)}" class="btn bgh bs">Email</a>`:''}
            </div>
          </div>`).join('')}
          ${byStatus[st].length>20?`<div style="font-size:.7rem;color:var(--m2);padding:8px 0">+${byStatus[st].length-20} more</div>`:''}
        </div>`).join('')}
      </div>
    </div>`;
  }

  p.innerHTML=yearSection(2026,yr2026)+yearSection(2027,yr2027)+(yr2026.length===0&&yr2027.length===0?`<div class="emp"><div class="emp-i">—</div><h3>No 2026/2027 leads</h3><p>Sync from Tripleseat to get event date data.</p></div>`:'');
}

// ── OPPORTUNITY CARD ──────────────────────────────────────────────────────────

  return `<div class="opp ${o.urgency||'low'}">
    <div class="opp-header">
      <div>
        <div class="opp-name">${esc(o.name)}</div>
        ${o.company?`<div class="opp-co">${esc(o.company)}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
        ${o.score>0?`<span class="score ${o.urgency==='urgent'||o.urgency==='high'?'score-high':'score-med'}">${o.score}</span>`:''}
        <span class="pill ${pillClass(o.status)}">${o.status}</span>
      </div>
    </div>
    <div class="opp-meta">
      ${o.email?`<div><span>Email</span> ${esc(o.email)}</div>`:''}
      ${o.phone?`<div><span>Phone</span> ${esc(o.phone)}</div>`:''}
      ${o.eventDate?`<div><span>Event</span> ${fmtDate(o.eventDate)}</div>`:''}
      ${o.guests?`<div><span>Guests</span> ${o.guests}</div>`:''}
      ${o.location?`<div><span>Location</span> ${esc(o.location)}</div>`:''}
      ${o.description?`<div><span>Type</span> ${esc(o.description.slice(0,50))}</div>`:''}
      ${o.daysSinceUpdate!==null?`<div style="color:${o.daysSinceUpdate>7?'var(--r)':o.daysSinceUpdate>3?'var(--y)':'var(--m2)'}"><span>Updated</span> ${o.daysSinceUpdate}d ago</div>`:''}
    </div>
    ${showAction&&o.action?`<div class="opp-action"><strong>Suggested:</strong> ${esc(o.action)}</div>`:''}
    <div class="opp-footer">
      ${inQ?`<span style="font-size:.7rem;color:var(--g);font-family:'DM Mono',monospace">✓ In queue</span>`:
      `<button class="btn ba bs" onclick="queueOne('${esc(o.id)}','${o.status.toLowerCase()}')">✨ Draft message</button>`}
      ${o.email?`<a href="mailto:${esc(o.email)}" class="btn bgh bs">Email</a>`:''}
      ${o.phone?`<a href="tel:${esc(o.phone)}" class="btn bgh bs">Call</a>`:''}

}

// ── QUEUE ─────────────────────────────────────────────────────────────────────
const WFC={draft_needed:'var(--m2)',draft_generated:'var(--bl)',needs_review:'var(--y)',approved:'var(--a)',ready_to_send:'var(--g)',sent:'var(--g)',skipped:'var(--m2)',failed:'var(--r)'};
const WFL={draft_needed:'Draft needed',draft_generated:'Generated',needs_review:'Needs review',approved:'Approved',ready_to_send:'Ready to send',sent:'Sent',skipped:'Skipped',failed:'Failed'};

function renderQueue(){
  const p=document.getElementById('pane-queue');
  const byS={};queue.forEach(q=>{byS[q.status]=(byS[q.status]||0)+1;});
  const needDraft=queue.filter(q=>q.status==='draft_needed').length;
  const needReview=queue.filter(q=>q.status==='needs_review'||q.status==='draft_generated').length;

  if(!queue.length){p.innerHTML=`<div class="emp"><div class="emp-i">✉</div><h3>Queue is empty</h3><p>Go to Command Center and click "Draft message" on any opportunity.</p></div>`;updateBadges();return;}

  p.innerHTML=`
  <div class="wfl">${Object.entries(WFL).map(([k,v])=>`<span class="wfi" style="color:${WFC[k]};background:${WFC[k]}1a">${v} (${byS[k]||0})</span>`).join('')}</div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
    <span style="font-family:'Fraunces',serif;font-size:1rem;font-weight:600">${queue.length} in queue</span>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${needDraft?`<button class="btn ba" onclick="generateAll()">✨ Generate ${needDraft}</button>`:''}
      ${needReview?`<button class="btn bgg" onclick="approveAllReady()">✓ Approve all reviewed</button>`:''}
      <button class="btn bgh" onclick="clearQueue()">Clear</button>
    </div>
  </div>
  <div style="background:rgba(91,141,238,.07);border:1px solid rgba(91,141,238,.2);border-radius:7px;padding:8px 12px;margin-bottom:13px;font-size:.74rem;color:var(--bl)">
    📨 Email provider not configured yet. Approved emails must be copied and sent manually. Mark as "Sent" after sending.
  </div>
  ${queue.map(item=>{
    const sc_=WFC[item.status]||'var(--m)',sl=WFL[item.status]||item.status;
    const hasRisks=item.risk_flags?.some(f=>f&&f!=='none');
    return `<div class="opp ${item.status==='approved'||item.status==='ready_to_send'?'high':''}" id="qc-${item.id}">
      <div class="opp-header">
        <div><div class="opp-name">${esc(item.contact_name||'Unknown')} ${item.company?`<span style="font-size:.71rem;color:var(--m);font-weight:400">${esc(item.company)}</span>`:''}</div>
        <div class="opp-co">${esc(item.contact_email)} ${item.subject?' · '+esc(item.subject):''}</div></div>
        <div style="display:flex;align-items:center;gap:5px">
          ${hasRisks?`<span style="font-size:.63rem;color:var(--y);background:rgba(245,166,35,.1);padding:2px 6px;border-radius:20px">⚠ review</span>`:''}
          <span class="pill" style="color:${sc_};background:${sc_}1a;border-color:${sc_}44">${sl}</span>
        </div>
      </div>
      ${item.body?`<div class="draft-body">${esc(item.body)}</div>`:''}
      <div class="opp-footer">
        ${item.status==='draft_needed'?`<button class="btn ba bs" onclick="generateOne('${item.id}')">✨ Generate</button>`:''}
        ${['draft_generated','needs_review'].includes(item.status)?`<button class="btn bgh bs" onclick="openModal('${item.id}')">👁 Review${hasRisks?' ⚠':''}</button><button class="btn bgg bs" onclick="approveItem('${item.id}')">✓ Approve</button>`:''}
        ${item.status==='approved'?`<button class="btn bgg bs" onclick="markReady('${item.id}')">→ Ready to send</button><button class="btn bgh bs" onclick="openModal('${item.id}')">👁 View</button>`:''}
        ${item.status==='ready_to_send'?`<button class="btn bgh bs" onclick="openModal('${item.id}')">📋 Copy & send</button><button class="btn bgg bs" onclick="markSent('${item.id}')">✓ Mark sent</button>`:''}
        ${!['sent','skipped'].includes(item.status)?`<button class="btn bgh bs" onclick="skipItem('${item.id}')">Skip</button>`:''}
        <button class="btn br bs" onclick="removeItem('${item.id}')">Remove</button>
      </div>
    </div>`;
  }).join('')}`;
  updateBadges();
}

// ── DEBUG ─────────────────────────────────────────────────────────────────────
function renderDebug(){
  const p=document.getElementById('pane-debug');
  p.innerHTML=`<div style="font-family:'Fraunces',serif;font-size:1rem;font-weight:600;margin-bottom:13px">Debug / Storage Status</div>
  <div class="dbg" id="dbg-content">Loading…</div>
  <div style="margin-top:11px;display:flex;gap:7px;flex-wrap:wrap">
    <button class="btn ba" onclick="loadDebug()">Refresh</button>
    <button class="btn bgh" onclick="doFullSync()">↻ Full Sync</button>
    <button class="btn br" onclick="if(confirm('Clear all?')){doFullSync();}">⚠ Re-sync all</button>
  </div>`;
  loadDebug();
}
async function loadDebug(){
  const el=document.getElementById('dbg-content');if(!el)return;
  try{
    const res=await fetch(`${API_ST}?action=debug`);
    const data=await res.json();
    // Show status inspector prominently
    const si=data.statusInspector||{};
    const siHtml=si.eventStatusBreakdown?`
      <div style="background:rgba(91,141,238,.08);border:1px solid rgba(91,141,238,.2);border-radius:7px;padding:12px 14px;margin-bottom:12px">
        <div style="font-size:.8rem;font-weight:600;color:var(--bl);margin-bottom:8px">Tripleseat Status Inspector</div>
        <div style="font-size:.72rem;color:var(--m2);font-family:'DM Mono',monospace;margin-bottom:6px">Total events inspected: ${si.totalEvents||0}</div>
        <div style="font-size:.72rem;color:var(--m2);font-family:'DM Mono',monospace;margin-bottom:6px">Status field: ts_events.status</div>
        ${Object.entries(si.eventStatusBreakdown||{}).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
          <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--b);font-size:.75rem;font-family:'DM Mono',monospace">
            <span style="color:${k==='TENTATIVE'?'var(--y)':k==='DEFINITE'?'var(--g)':k==='CLOSED'?'var(--bl)':k==='PROSPECT'?'var(--pu)':k==='LOST'?'var(--r)':'var(--m)'}">${k}</span>
            <span style="color:var(--t);font-weight:600">${v}</span>
          </div>`).join('')}
      </div>`:'';
    el.innerHTML=siHtml;
    const pre=document.createElement('pre');
    pre.style.cssText='font-size:.71rem;color:var(--m);white-space:pre-wrap;line-height:1.6';
    pre.textContent=JSON.stringify({
      supabase:data,
      frontend:{
        eventsInMemory:bookings.length,
        contactsInMemory:contacts.length,
        accountsInMemory:accounts.length,
        leadsInMemory:leads.length,
        opportunitiesBuilt:opportunities.length,
        statusBreakdown:['TENTATIVE','PROSPECT','DEFINITE','CLOSED','LOST'].reduce((m,s)=>{m[s]=opportunities.filter(o=>o.status===s).length;return m;},{}),
        queueLength:queue.length,
        dbConfigured,
        loadDebug:window._loadDebug||'none',
      }
    },null,2);
  }catch(e){if(el){el.textContent='Error: '+e.message;}}
}

// ── QUEUE ACTIONS ─────────────────────────────────────────────────────────────
function queueOne(oppId, campaign){
  const o=opportunities.find(x=>x.id===oppId);
  if(!o) return;
  if(queue.find(q=>q.booking_id===oppId||q.contact_email===o.email)){
    alert('Already in queue.');return;
  }
  if(o.status==='DEFINITE'){alert('Definite bookings are booked business — do not send sales emails.');return;}
  const item={
    id:'q_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    booking_id:oppId, contact_email:o.email||'',
    contact_name:o.name, company:o.company||'',
    campaign_id:campaign||o.status.toLowerCase(),
    subject:'',body:'',risk_flags:[],status:'draft_needed',
    ts_status:o.status, has_closed:o.hasClosed, has_definite:o.hasDefinite,
    _opp:o,
    created_at:new Date().toISOString(), updated_at:new Date().toISOString(),
  };
  queue.push(item);
  saveQueueItem(item); updateBadges(); showTab('queue');
}
function clearQueue(){if(!confirm('Clear all?'))return;queue=[];fetch(`${API_ST}?action=bulk-save-queue`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({queue:[]})}).catch(()=>{});updateBadges();renderQueue();}
function approveAllReady(){queue.filter(q=>q.status==='needs_review'||q.status==='draft_generated').forEach(q=>{q.status='approved';q.updated_at=new Date().toISOString();updateQueueItem(q);});updateBadges();renderQueue();}
function approveItem(id){const i=queue.find(q=>q.id===id);if(i){i.status='approved';i.updated_at=new Date().toISOString();updateQueueItem(i);updateBadges();renderQueue();}}
function skipItem(id){const i=queue.find(q=>q.id===id);if(i){i.status='skipped';i.updated_at=new Date().toISOString();updateQueueItem(i);renderQueue();}}
function markReady(id){const i=queue.find(q=>q.id===id);if(i){i.status='ready_to_send';i.updated_at=new Date().toISOString();updateQueueItem(i);renderQueue();}}
function markSent(id){
  const i=queue.find(q=>q.id===id);if(!i)return;
  i.status='sent';i.sent_at=new Date().toISOString();i.updated_at=new Date().toISOString();
  updateQueueItem(i);
  fetch(`${API_ST}?action=record-sent`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:i.contact_email,name:i.contact_name,campaign:i.campaign_id,subject:i.subject,body:i.body})}).catch(()=>{});
  renderQueue();
}
function removeItem(id){queue=queue.filter(q=>q.id!==id);fetch(`${API_ST}?action=bulk-save-queue`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({queue})}).catch(()=>{});updateBadges();renderQueue();}
async function saveQueueItem(item){await fetch(`${API_ST}?action=save-queue-item`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)}).catch(()=>{});}
async function updateQueueItem(item){await fetch(`${API_ST}?action=update-queue-item`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)}).catch(()=>{});}

// ── EMAIL GENERATION ──────────────────────────────────────────────────────────
async function generateOne(itemId){
  const item=queue.find(q=>q.id===itemId);if(!item)return;
  item.status='draft_generated';renderQueue();
  const o=item._opp||opportunities.find(x=>x.id===item.booking_id)||{email:item.contact_email};
  try{
    const res=await fetch(API_AI,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contact:{first_name:o.name?.split(' ')[0],last_name:o.name?.split(' ').slice(1).join(' '),email:o.email,company:o.company,event_date:o.eventDate,event_description:o.description,guest_count:o.guests,location_name:o.location,last_booking_status:o.status,booking_count:o.totalBookings,hasClosed:o.hasClosed,hasDefinite:o.hasDefinite},campaign:item.campaign_id||o.status?.toLowerCase()})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||`HTTP ${res.status}`);
    item.subject=data.subject||'Following up';
    item.body=data.body||'Could not generate.';
    item.risk_flags=data.riskFlags||[];
    item.status='needs_review';
  }catch(err){item.body=`Error: ${err.message}`;item.risk_flags=[];item.status='needs_review';}
  item.updated_at=new Date().toISOString();
  updateQueueItem(item);renderQueue();updateBadges();
}
async function generateAll(){
  const pending=queue.filter(q=>q.status==='draft_needed');if(!pending.length)return;
  const btn=document.querySelector('[onclick="generateAll()"]');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="sp2"></span> Generating…';}
  for(let i=0;i<pending.length;i++){await generateOne(pending[i].id);if(i<pending.length-1)await new Promise(r=>setTimeout(r,300));}
  if(btn){btn.disabled=false;btn.innerHTML='✨ Generate';}
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(itemId){
  const item=queue.find(q=>q.id===itemId);if(!item)return;
  modalQueueId=itemId;
  document.getElementById('mt').textContent=`Draft: ${item.contact_name}`;
  document.getElementById('msub').value=item.subject||'';
  document.getElementById('memail').value=item.body||'';
  const flags=(item.risk_flags||[]).filter(f=>f&&f!=='none');
  document.getElementById('risk-display').innerHTML=flags.map(f=>`<div class="risk">⚠ ${esc(f)}</div>`).join('');
  document.getElementById('mo').classList.add('open');
}
function closeModal(){
  if(modalQueueId){const i=queue.find(q=>q.id===modalQueueId);if(i){i.subject=document.getElementById('msub').value;i.body=document.getElementById('memail').value;i.updated_at=new Date().toISOString();updateQueueItem(i);}}
  document.getElementById('mo').classList.remove('open');modalQueueId=null;renderQueue();
}
function approveFromModal(){
  if(modalQueueId){const i=queue.find(q=>q.id===modalQueueId);if(i){i.subject=document.getElementById('msub').value;i.body=document.getElementById('memail').value;i.status='approved';i.approved_at=new Date().toISOString();i.updated_at=new Date().toISOString();updateQueueItem(i);}}
  closeModal();
}
function copyModal(){
  navigator.clipboard.writeText(`Subject: ${document.getElementById('msub').value}\n\n${document.getElementById('memail').value}`).then(()=>{const b=document.getElementById('bcm');b.textContent='✓ Copied!';setTimeout(()=>b.textContent='Copy',2000);});
}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeModal();});
