<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saddleback — Outreach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0f0f0e; --surface:#181817; --surface2:#1f1f1d;
      --border:#2a2a27; --border2:#333330;
      --text:#f0ede8; --muted:#8a8780; --muted2:#5a5855;
      --accent:#e8772a; --accent2:#f5a623;
      --green:#4caf7d; --red:#e05252; --yellow:#f5a623;
      --blue:#5b8dee; --purple:#9b7edb; --teal:#3dbdb0;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
    nav{display:flex;align-items:center;padding:0 28px;background:var(--surface);border-bottom:1px solid var(--border);height:52px;position:sticky;top:0;z-index:50}
    .nav-brand{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;color:var(--accent2);margin-right:32px;text-decoration:none}
    .nav-tabs{display:flex}
    .nav-tab{padding:0 16px;height:52px;display:flex;align-items:center;font-size:0.82rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;text-decoration:none}
    .nav-tab:hover{color:var(--text)}
    .nav-tab.active{color:var(--text);border-bottom-color:var(--accent)}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
    .page{padding:20px 28px;max-width:1400px;margin:0 auto}

    /* TABS */
    .main-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .main-tab{padding:11px 20px;font-size:0.85rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;transition:color .15s,border-color .15s}
    .main-tab:hover{color:var(--text)}
    .main-tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:600}
    .badge{display:inline-block;background:rgba(232,119,42,0.15);color:var(--accent);border-radius:20px;padding:1px 7px;font-size:0.68rem;font-family:'DM Mono',monospace;margin-left:5px}
    .badge.green{background:rgba(76,175,125,0.15);color:var(--green)}

    /* STATS GRID */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:24px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .15s}
    .stat-card:hover{border-color:var(--border2)}
    .stat-card.active{border-color:var(--accent)}
    .stat-num{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;color:var(--text);line-height:1}
    .stat-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
    .stat-lbl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-top:4px;display:flex;align-items:center}

    /* PROGRESS */
    .progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:20px}
    .progress-label{font-size:0.78rem;color:var(--muted);margin-bottom:8px;font-family:'DM Mono',monospace}
    .progress-bg{background:var(--surface2);border-radius:4px;height:6px;overflow:hidden}
    .progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}

    /* BUTTONS */
    .btn{border:none;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
    .btn-accent{background:var(--accent);color:#fff;padding:7px 16px;font-size:0.82rem}
    .btn-accent:hover{background:#f08030}
    .btn-accent:disabled{background:var(--border2);color:var(--muted2);cursor:not-allowed}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);padding:6px 12px;font-size:0.78rem}
    .btn-ghost:hover{color:var(--text);border-color:var(--muted)}
    .btn-green{background:var(--green);color:#fff;padding:7px 14px;font-size:0.8rem}
    .btn-green:hover{background:#3d9d6a}
    .btn-red{background:transparent;color:var(--red);border:1px solid rgba(224,82,82,.3);padding:5px 10px;font-size:0.75rem}
    .btn-sm{padding:5px 10px;font-size:0.73rem}

    /* CARDS */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;transition:border-color .15s}
    .card:hover{border-color:var(--border2)}
    .card.approved{border-color:rgba(76,175,125,.4)}
    .card.skipped{opacity:.45}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
    .card-name{font-weight:600;font-size:.92rem;color:var(--text)}
    .card-sub{font-size:.73rem;color:var(--muted);margin-top:2px}
    .card-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:.72rem;color:var(--muted2);font-family:'DM Mono',monospace;margin-bottom:8px}
    .card-meta span{color:var(--muted)}
    .card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
    .tag{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
    .tag-corp{background:rgba(91,141,238,.12);color:var(--blue)}
    .tag-quiet{background:rgba(224,82,82,.12);color:var(--red)}
    .tag-ann{background:rgba(155,126,219,.12);color:var(--purple)}
    .tag-nb{background:rgba(90,88,85,.2);color:var(--muted)}
    .tag-hv{background:rgba(245,166,35,.12);color:var(--yellow)}
    .tag-rep{background:rgba(76,175,125,.12);color:var(--green)}
    .tag-msu{background:rgba(61,189,176,.12);color:var(--teal)}
    .tag-campaign{background:rgba(232,119,42,.12);color:var(--accent);font-size:.65rem}
    .card-body{background:var(--surface2);border-radius:8px;padding:12px 14px;font-size:.8rem;line-height:1.7;color:var(--muted);white-space:pre-wrap;max-height:160px;overflow-y:auto;border-left:3px solid var(--border2);margin-bottom:12px}
    .card-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border)}
    .status-pill{font-size:.68rem;padding:2px 9px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap}

    /* COMPANY CARDS */
    .company-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
    .company-card:hover{border-color:var(--border2)}
    .company-card.expanded{border-color:var(--accent)}
    .company-contacts{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
    .company-card.expanded .company-contacts{display:block}
    .contact-mini{background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .contact-mini-name{font-size:.85rem;font-weight:500;color:var(--text)}
    .contact-mini-email{font-size:.72rem;color:var(--muted2);font-family:'DM Mono',monospace}

    /* CAMPAIGN */
    .campaign-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
    .campaign-title{font-size:.95rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:10px}
    .campaign-desc{font-size:.78rem;color:var(--muted);margin-top:4px;margin-bottom:14px}
    .campaign-meta{display:flex;gap:16px;font-size:.72rem;color:var(--muted2);font-family:'DM Mono',monospace;margin-bottom:14px}
    .campaign-contacts-preview{display:flex;gap:8px;flex-wrap:wrap}

    /* EMPTY / MISC */
    .empty{text-align:center;padding:60px 24px;color:var(--muted2)}
    .empty-icon{font-size:2rem;margin-bottom:12px;opacity:.4}
    .empty h3{font-size:.95rem;color:var(--muted);margin-bottom:6px}
    .spinner{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .sync-note{font-size:.72rem;color:var(--muted2);font-family:'DM Mono',monospace;margin-bottom:16px}
    .divider{border:none;border-top:1px solid var(--border);margin:20px 0}
    input[type=text]{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:.8rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
    input[type=text]:focus{border-color:var(--accent)}
    input::placeholder{color:var(--muted2)}

    /* MODAL */
    #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;justify-content:center;align-items:center;padding:20px}
    #modal-overlay.open{display:flex}
    #modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:660px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.5)}
    .modal-hdr{padding:18px 24px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .modal-hdr h2{font-family:'Fraunces',serif;font-size:1rem;font-weight:600;color:var(--text)}
    .modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;line-height:1}
    .modal-close:hover{color:var(--text)}
    .modal-subj{padding:10px 24px;border-bottom:1px solid var(--border)}
    .modal-subj-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);margin-bottom:4px;font-weight:700}
    #modal-subject{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:.85rem;font-family:'DM Sans',sans-serif;outline:none}
    #modal-subject:focus{border-color:var(--accent)}
    .modal-body{padding:14px 24px;flex:1;overflow-y:auto}
    #modal-email{width:100%;min-height:260px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:14px;font-size:.83rem;line-height:1.65;resize:vertical;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
    #modal-email:focus{border-color:var(--accent)}
    .modal-ftr{padding:12px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
    .modal-ftr button{padding:8px 18px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
    #btn-approve-modal{background:var(--green);color:#fff}
    #btn-copy-modal{background:var(--accent);color:#fff}
    #btn-copy-modal:hover{background:#f08030}
    #btn-close-modal{background:var(--surface2);color:var(--muted);border:1px solid var(--border2)}
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">🔥 Saddleback SRG</a>
  <div class="nav-tabs">
    <a href="/" class="nav-tab">Pipeline</a>
    <a href="/analytics.html" class="nav-tab">Analytics</a>
    <a href="/outreach.html" class="nav-tab active">Outreach</a>
  </div>
  <div class="nav-right">
    <span style="font-size:.72rem;color:var(--muted2);font-family:'DM Mono',monospace" id="last-updated"></span>
    <button class="btn btn-ghost btn-sm" onclick="syncFromTripleseat()" id="btn-sync">↻ Sync Tripleseat</button>
  </div>
</nav>

<div class="page">

  <!-- PROGRESS -->
  <div id="progress-wrap" style="display:none" class="progress-wrap">
    <div class="progress-label" id="progress-label">Loading…</div>
    <div class="progress-bg"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <!-- MAIN TABS -->
  <div class="main-tabs">
    <button class="main-tab active" onclick="showTab('today')" id="tab-today">Today's Outreach</button>
    <button class="main-tab" onclick="showTab('campaigns')" id="tab-campaigns">Campaigns</button>
    <button class="main-tab" onclick="showTab('companies')" id="tab-companies">Companies <span class="badge" id="badge-companies">—</span></button>
    <button class="main-tab" onclick="showTab('contacts')" id="tab-contacts">All Contacts <span class="badge" id="badge-contacts">—</span></button>
    <button class="main-tab" onclick="showTab('queue')" id="tab-queue">Email Queue <span class="badge green" id="badge-queue">0</span></button>
  </div>

  <div id="pane-today"></div>
  <div id="pane-campaigns" style="display:none"></div>
  <div id="pane-companies" style="display:none"></div>
  <div id="pane-contacts" style="display:none"></div>
  <div id="pane-queue" style="display:none"></div>

</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-hdr">
      <h2 id="modal-title">Review Email</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-subj">
      <div class="modal-subj-lbl">Subject line</div>
      <input type="text" id="modal-subject" placeholder="Email subject…">
    </div>
    <div class="modal-body"><textarea id="modal-email"></textarea></div>
    <div class="modal-ftr">
      <button id="btn-close-modal" onclick="closeModal()">Close</button>
      <button id="btn-copy-modal" onclick="copyModal()">Copy to clipboard</button>
      <button id="btn-approve-modal" onclick="approveFromModal()">✓ Approve</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API_TS = '/.netlify/functions/tripleseat';
const API_AI = '/.netlify/functions/ai';

// ── STATE ─────────────────────────────────────────────────────────────────────
let contacts  = [];
let companies = {};   // domain/name → { name, contacts[] }
let queue     = [];
let activeTab = 'today';
let modalQueueId = null;

// Personal email domains to exclude from company grouping
const PERSONAL_DOMAINS = new Set(['gmail.com','yahoo.com','hotmail.com','outlook.com','icloud.com','aol.com','live.com','msn.com','me.com','mac.com','comcast.net','att.net','verizon.net','sbcglobal.net']);

// ── COMPANY DOMAIN EXTRACTION ─────────────────────────────────────────────────
function extractDomain(email) {
  if(!email) return null;
  const m = email.toLowerCase().match(/@([^@]+)$/);
  if(!m) return null;
  const domain = m[1];
  return PERSONAL_DOMAINS.has(domain) ? null : domain;
}

function domainToName(domain) {
  if(!domain) return null;
  const map = {
    'msu.edu': 'Michigan State University',
    'michigan.gov': 'State of Michigan',
    'lsd.k12.mi.us': 'Lansing School District',
    'okemos.k12.mi.us': 'Okemos Public Schools',
    'haslett.k12.mi.us': 'Haslett Public Schools',
    'ingham.org': 'Ingham County',
    'eaton.org': 'Eaton County',
    'lansingmi.gov': 'City of Lansing',
    'deltadental.com': 'Delta Dental',
    'bcbsm.com': 'Blue Cross Blue Shield',
    'sparrow.org': 'Sparrow Health System',
    'mclaren.org': 'McLaren Health',
    'allegiance.org': 'Henry Ford Allegiance',
  };
  if(map[domain]) return map[domain];
  // Convert domain to readable name
  const base = domain.replace(/\.(com|org|edu|gov|net|mil|k12\.mi\.us|mi\.us)$/, '').split('.').pop();
  return base.charAt(0).toUpperCase() + base.slice(1);
}

// ── TAGGING ───────────────────────────────────────────────────────────────────
function tagContact(c) {
  const tags = [];
  const now = Date.now();

  // Use event_date as primary signal — that's when the actual event was
  // Fall back to created_at if no event_date
  const eventTs   = c.event_date ? new Date(c.event_date).getTime() : null;
  const createdTs = c.created_at ? new Date(c.created_at).getTime() : null;
  const refTs     = eventTs || createdTs;
  const daysSinceRef = refTs ? Math.floor((now - refTs) / 86400000) : null;

  c._daysSinceEvent = daysSinceRef;
  c._eventTs = eventTs;
  c._createdTs = createdTs;

  // Company domain
  const domain = extractDomain(c.email_address);
  c.company_domain = domain;
  if(!c.company && domain) c._derived_company = domainToName(domain);

  // Gone quiet — event or inquiry was 6+ months ago
  if(daysSinceRef !== null) {
    if(daysSinceRef >= 180) tags.push('gone-quiet-6mo');
    if(daysSinceRef >= 365) tags.push('gone-quiet-12mo');
    if(daysSinceRef >= 548) tags.push('gone-quiet-18mo');
  }

  // Corporate — has company name or non-personal domain
  if((c.company && c.company.trim()) || domain) tags.push('corporate');

  // MSU
  if(domain === 'msu.edu' || (c.company||'').toLowerCase().includes('michigan state') || (c.company||'').toLowerCase().includes('msu')) tags.push('msu');

  // Never booked
  if(c.turned_down_at || (!c.event_date && daysSinceRef > 30)) tags.push('no-booking');

  // High value
  if((c.guest_count || 0) >= 75) tags.push('high-value');

  // Anniversary — event or inquiry anniversary within next 90 days
  const dateForAnn = eventTs || createdTs;
  if(dateForAnn) {
    const ref = new Date(dateForAnn);
    const yearsAgo = new Date().getFullYear() - ref.getFullYear();
    if(yearsAgo >= 1) {
      const ann = new Date(ref); ann.setFullYear(new Date().getFullYear());
      if(isNaN(ann.getTime())) ann.setDate(28);
      const dUntil = Math.floor((ann.getTime() - now) / 86400000);
      if(dUntil >= -7 && dUntil <= 90) { tags.push('anniversary'); c._annDaysUntil = dUntil; }
    }
  }

  // Event type detection from description
  const desc = (c.event_description || c.additional_information || '').toLowerCase();
  if(/graduat|commencement/.test(desc)) tags.push('graduation');
  if(/holiday|christmas|xmas|thanksgiving|new year/.test(desc)) tags.push('holiday');
  if(/wedding|reception|bride|groom/.test(desc)) tags.push('wedding');
  if(/corporate|office|meeting|lunch|company|employee|staff|team/.test(desc)) tags.push('office-lunch');

  c._tags = tags;
  return c;
}

// ── COMPANY GROUPING ──────────────────────────────────────────────────────────
function buildCompanies(contactList) {
  const map = {};
  contactList.forEach(c => {
    const companyName = c.company || c._derived_company;
    const domain = c.company_domain;
    const key = companyName ? companyName.toLowerCase().trim() : (domain || null);
    if(!key || !c.email_address) return;
    if(!map[key]) map[key] = { name: companyName || domainToName(domain) || key, domain, contacts: [], totalEvents: 0, totalGuests: 0 };
    map[key].contacts.push(c);
    if(c.event_date) map[key].totalEvents++;
    if(c.guest_count) map[key].totalGuests += (c.guest_count || 0);
  });
  // Sort by contact count desc
  return Object.fromEntries(Object.entries(map).sort((a,b) => b[1].contacts.length - a[1].contacts.length));
}

// ── CAMPAIGN ENGINE ───────────────────────────────────────────────────────────
const CAMPAIGNS = [
  { id:'anniversary',  label:'🎉 Event Anniversary',    icon:'🎉', color:'var(--purple)', desc:'Their event anniversary falls within 90 days — perfect timing to reconnect.', filter: c=>c._tags.includes('anniversary'), priority:10 },
  { id:'msu',          label:'🟢 MSU Accounts',         icon:'🟢', color:'var(--teal)',   desc:'Michigan State University contacts — football season, graduation, department events.', filter: c=>c._tags.includes('msu'), priority:9 },
  { id:'gone-quiet',   label:'😶 Gone Quiet 6mo+',      icon:'😶', color:'var(--red)',    desc:'No activity in 6+ months. A single warm email can re-activate these.', filter: c=>c._tags.includes('gone-quiet-6mo'), priority:8 },
  { id:'high-value',   label:'⭐ High Value (75+ guests)',icon:'⭐', color:'var(--yellow)', desc:'Large events — these are high priority for personalized outreach.', filter: c=>c._tags.includes('high-value'), priority:7 },
  { id:'corporate',    label:'🏢 Corporate Accounts',   icon:'🏢', color:'var(--blue)',   desc:'Company and organization contacts — office lunches, team events, company meetings.', filter: c=>c._tags.includes('corporate') && !c._tags.includes('msu'), priority:6 },
  { id:'graduation',   label:'🎓 Graduation Season',    icon:'🎓', color:'var(--accent2)',desc:'Contacts with graduation events in their history — May/June opportunity.', filter: c=>c._tags.includes('graduation'), priority:5 },
  { id:'holiday',      label:'🎄 Holiday Events',       icon:'🎄', color:'var(--green)',  desc:'Past holiday party contacts — book early, fill up fast.', filter: c=>c._tags.includes('holiday'), priority:4 },
  { id:'no-booking',   label:'📋 Never Booked',         icon:'📋', color:'var(--muted)',  desc:'Inquired but never confirmed. One more warm touch.', filter: c=>c._tags.includes('no-booking') && c.email_address, priority:3 },
  { id:'wedding',      label:'💍 Wedding/Social',        icon:'💍', color:'var(--purple)', desc:'Wedding and social event contacts.', filter: c=>c._tags.includes('wedding'), priority:3 },
];

// Daily batch: pick top N contacts across campaigns, deduped, respecting 30-day rule
function buildDailyBatch(count = 50) {
  const now = Date.now();
  const inQueue = new Set(queue.map(q => String(q.id)));
  const contacted = JSON.parse(localStorage.getItem('srg-contacted') || '{}');

  const scored = [];
  contacts.forEach(c => {
    if(!c.email_address || !c.email_address.includes('@')) return; // no valid email
    if(inQueue.has(String(c.id))) return; // already queued
    // 30-day rule
    const lastContacted = contacted[String(c.id)];
    if(lastContacted && (now - lastContacted) < 30 * 86400000) return;

    // Score the contact
    let score = 0;
    let campaign = null;
    CAMPAIGNS.forEach(cam => {
      if(cam.filter(c)) { score += cam.priority; if(!campaign || cam.priority > CAMPAIGNS.find(x=>x.id===campaign)?.priority) campaign = cam.id; }
    });
    if(score > 0) scored.push({ contact: c, score, campaign });
  });

  // Sort by score desc, take top N
  scored.sort((a,b) => b.score - a.score);
  return scored.slice(0, count);
}

// ── LOAD / SYNC ───────────────────────────────────────────────────────────────
async function init() {
  // Load queue from localStorage
  try { queue = JSON.parse(localStorage.getItem('srg-queue') || '[]'); } catch(e) { queue = []; }
  // Load contacts from cache
  const cached = localStorage.getItem('srg-contacts');
  if(cached) {
    try {
      const raw = JSON.parse(cached);
      contacts = raw.map(tagContact);
      companies = buildCompanies(contacts);
      updateBadges();
      renderTab(activeTab);
      const ts = localStorage.getItem('srg-lastsync');
      if(ts) document.getElementById('last-updated').textContent = 'Synced '+new Date(ts).toLocaleDateString();
      const daysSince = ts ? Math.floor((Date.now()-new Date(ts))/86400000) : 999;
      if(daysSince >= 3) {
        // Auto-sync in background if stale
        syncFromTripleseat(true);
      }
      return;
    } catch(e) {}
  }
  // No cache — sync now
  syncFromTripleseat(false);
}

async function syncFromTripleseat(background = false) {
  const btn = document.getElementById('btn-sync');
  if(btn) { btn.disabled=true; btn.textContent='Syncing…'; }
  if(!background) {
    document.getElementById('progress-wrap').style.display='block';
    document.getElementById('progress-label').textContent='Connecting to Tripleseat…';
    document.getElementById('progress-fill').style.width='0%';
  }

  const all = []; let page=1; let totalPages=1;
  try {
    while(page <= Math.min(totalPages, 90)) {
      if(!background) {
        document.getElementById('progress-label').textContent=`Fetching page ${page} of ${Math.min(totalPages,90)} — ${all.length.toLocaleString()} contacts…`;
        document.getElementById('progress-fill').style.width=Math.round(page/Math.min(totalPages,90)*100)+'%';
      }
      const res = await fetch(`${API_TS}?endpoint=leads&page=${page}&limit=100`);
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const raw = await res.json();
      totalPages = raw.total_pages || 1;
      (raw.results || []).forEach(c => all.push(c));
      page++;
      if(page <= Math.min(totalPages,90)) await new Promise(r=>setTimeout(r,80));
    }
    localStorage.setItem('srg-contacts', JSON.stringify(all));
    localStorage.setItem('srg-lastsync', new Date().toISOString());
    contacts = all.map(tagContact);
    companies = buildCompanies(contacts);
    updateBadges();
    renderTab(activeTab);
    document.getElementById('last-updated').textContent='Synced '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if(!background) {
      document.getElementById('progress-label').textContent=`✓ ${contacts.length.toLocaleString()} contacts synced and saved`;
      document.getElementById('progress-fill').style.width='100%';
      setTimeout(()=>document.getElementById('progress-wrap').style.display='none', 3000);
    }
  } catch(err) {
    if(!background) { document.getElementById('progress-label').textContent='Error: '+err.message; }
    console.error('Sync error:', err);
  }
  if(btn) { btn.disabled=false; btn.textContent='↻ Sync Tripleseat'; }
}

// ── QUEUE ACTIONS ─────────────────────────────────────────────────────────────
function queueOne(contactId, campaign) {
  const c = contacts.find(x=>String(x.id)===String(contactId));
  if(!c || queue.find(q=>String(q.id)===String(contactId))) return;
  const name=[c.first_name,c.last_name].filter(Boolean).join(' ')||'Contact';
  queue.push({id:String(c.id),contact:c,name,email:c.email_address||'',subject:'',body:'',status:'pending',campaign:campaign||''});
  saveQueue(); updateBadges();
  if(activeTab==='today'||activeTab==='contacts') renderTab(activeTab);
}

function queueBatch() {
  const batch = buildDailyBatch(50);
  let added=0;
  batch.forEach(({contact:c, campaign}) => {
    if(!queue.find(q=>String(q.id)===String(c.id))){
      const name=[c.first_name,c.last_name].filter(Boolean).join(' ')||'Contact';
      queue.push({id:String(c.id),contact:c,name,email:c.email_address||'',subject:'',body:'',status:'pending',campaign});
      added++;
    }
  });
  saveQueue(); updateBadges();
  if(added>0) showTab('queue');
}

function queueCampaign(campaignId, limit) {
  const cam = CAMPAIGNS.find(c=>c.id===campaignId);
  if(!cam) return;
  const inQueue=new Set(queue.map(q=>String(q.id)));
  const contacted=JSON.parse(localStorage.getItem('srg-contacted')||'{}');
  const toAdd=contacts.filter(cam.filter).filter(c=>c.email_address&&!inQueue.has(String(c.id))&&!(contacted[c.id]&&Date.now()-contacted[c.id]<30*86400000)).slice(0,limit);
  toAdd.forEach(c=>{
    const name=[c.first_name,c.last_name].filter(Boolean).join(' ')||'Contact';
    queue.push({id:String(c.id),contact:c,name,email:c.email_address||'',subject:'',body:'',status:'pending',campaign:campaignId});
  });
  saveQueue(); updateBadges(); showTab('queue');
}

function queueCompany(safeKey) {
  const entry = Object.entries(companies).find(([k])=>k.replace(/[^a-z0-9]/g,'')==safeKey);
  if(!entry) return;
  const [, co] = entry;
  const inQueue=new Set(queue.map(q=>String(q.id)));
  co.contacts.filter(c=>c.email_address&&!inQueue.has(String(c.id))).slice(0,10).forEach(c=>{
    const name=[c.first_name,c.last_name].filter(Boolean).join(' ')||'Contact';
    queue.push({id:String(c.id),contact:c,name,email:c.email_address||'',subject:'',body:'',status:'pending',campaign:'corporate'});
  });
  saveQueue(); updateBadges(); showTab('queue');
}

function viewCampaignContacts(campaignId) {
  showTab('contacts');
  renderContacts('', campaignId);
}

function skipContact(contactId) {
  const contacted=JSON.parse(localStorage.getItem('srg-contacted')||'{}');
  contacted[String(contactId)]=Date.now();
  localStorage.setItem('srg-contacted',JSON.stringify(contacted));
  renderTab(activeTab);
}

function saveQueue() { try { localStorage.setItem('srg-queue',JSON.stringify(queue)); } catch(e){} }
function clearQueue() { if(!confirm('Clear all queued emails?')) return; queue=[]; saveQueue(); updateBadges(); renderQueue(); }
function approveAll() { queue.filter(q=>q.status==='ready').forEach(q=>q.status='approved'); saveQueue(); updateBadges(); renderQueue(); }
function approveItem(id) { const i=queue.find(q=>q.id===id); if(i){i.status='approved'; markContacted(i.id); saveQueue(); updateBadges(); renderQueue();} }
function skipItem(id) { const i=queue.find(q=>q.id===id); if(i){i.status='skipped'; saveQueue(); renderQueue();} }
function removeItem(id) { queue=queue.filter(q=>q.id!==id); saveQueue(); updateBadges(); renderQueue(); renderTab(activeTab); }
function markContacted(contactId) {
  const contacted=JSON.parse(localStorage.getItem('srg-contacted')||'{}');
  contacted[String(contactId)]=Date.now();
  localStorage.setItem('srg-contacted',JSON.stringify(contacted));
}

// ── EMAIL GENERATION ──────────────────────────────────────────────────────────
async function generateOne(itemId) {
  const item=queue.find(q=>q.id===itemId); if(!item) return;
  item.status='generating'; renderQueue();
  try {
    const res=await fetch(API_AI,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contact:item.contact,campaign:item.campaign})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||`HTTP ${res.status}`);
    item.subject=data.subject||'Following up from Saddleback Catering';
    item.body=data.body||'Unable to generate email body.';
    item.status='ready';
  } catch(err) {
    item.body=`Error: ${err.message}`;
    item.status='error';
  }
  saveQueue(); renderQueue(); updateBadges();
}

async function generateAll() {
  const pending=queue.filter(q=>q.status==='pending');
  if(!pending.length) return;
  const btn=document.querySelector('[onclick="generateAll()"]');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Generating…';}
  for(let i=0;i<pending.length;i++){
    await generateOne(pending[i].id);
    if(i<pending.length-1) await new Promise(r=>setTimeout(r,250));
  }
  if(btn){btn.disabled=false;btn.innerHTML=`✨ Generate emails`;}
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(itemId) {
  const item=queue.find(q=>q.id===itemId); if(!item) return;
  modalQueueId=itemId;
  document.getElementById('modal-title').textContent=`Email to ${item.name}`;
  document.getElementById('modal-subject').value=item.subject||'';
  document.getElementById('modal-email').value=item.body||'';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  if(modalQueueId){const i=queue.find(q=>q.id===modalQueueId);if(i){i.subject=document.getElementById('modal-subject').value;i.body=document.getElementById('modal-email').value;}}
  document.getElementById('modal-overlay').classList.remove('open'); modalQueueId=null; saveQueue(); renderQueue();
}
function approveFromModal() {
  if(modalQueueId){const i=queue.find(q=>q.id===modalQueueId);if(i){i.subject=document.getElementById('modal-subject').value;i.body=document.getElementById('modal-email').value;i.status='approved';markContacted(i.id);}}
  closeModal();
}
function copyModal() {
  const t=document.getElementById('modal-email').value;
  navigator.clipboard.writeText(`Subject: ${document.getElementById('modal-subject').value}\n\n${t}`).then(()=>{
    const btn=document.getElementById('btn-copy-modal'); btn.textContent='✓ Copied!'; setTimeout(()=>btn.textContent='Copy to clipboard',2000);
  });
}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function loadingOrEmpty(){return contacts.length?'':`<div class="empty"><div class="empty-icon">⟳</div><h3>Loading contacts…</h3><p>Syncing from Tripleseat. This may take a moment for all ${(8600).toLocaleString()}+ contacts.</p></div>`;}

// ── INIT ──────────────────────────────────────────────────────────────────────
init();
</script>
