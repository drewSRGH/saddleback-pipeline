<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saddleback — Outreach</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f0f0e;--s:#181817;--s2:#1f1f1d;--b:#2a2a27;--b2:#333330;--t:#f0ede8;--m:#8a8780;--m2:#5a5855;--a:#e8772a;--a2:#f5a623;--g:#4caf7d;--r:#e05252;--y:#f5a623;--bl:#5b8dee;--pu:#9b7edb;--te:#3dbdb0;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:14px;line-height:1.5}
    a{text-decoration:none;color:inherit}
    nav{display:flex;align-items:center;padding:0 24px;background:var(--s);border-bottom:1px solid var(--b);height:52px;position:sticky;top:0;z-index:50}
    .nb{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;color:var(--a2);margin-right:28px}
    .nt{display:flex}
    .ntb{padding:0 14px;height:52px;display:flex;align-items:center;font-size:.82rem;font-weight:500;color:var(--m);border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
    .ntb:hover{color:var(--t)}
    .ntb.active{color:var(--t);border-bottom-color:var(--a)}
    .nr{margin-left:auto;display:flex;align-items:center;gap:10px}
    .page{padding:18px 24px;max-width:1400px;margin:0 auto}
    /* TABS */
    .tabs{display:flex;gap:2px;border-bottom:1px solid var(--b);margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .tab{padding:10px 15px;font-size:.81rem;font-weight:500;color:var(--m);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:color .15s,border-color .15s}
    .tab:hover{color:var(--t)}
    .tab.active{color:var(--t);border-bottom-color:var(--a);font-weight:600}
    .bg{display:inline-block;background:rgba(232,119,42,.15);color:var(--a);border-radius:20px;padding:1px 6px;font-size:.65rem;font-family:'DM Mono',monospace;margin-left:4px}
    .bg.g{background:rgba(76,175,125,.15);color:var(--g)}
    .bg.r{background:rgba(224,82,82,.15);color:var(--r)}
    .bg.y{background:rgba(245,166,35,.15);color:var(--y)}
    /* STATS */
    .sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;margin-bottom:20px}
    .sc_{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:13px 15px}
    .sn{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;line-height:1}
    .sl_{font-size:.66rem;color:var(--m);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-top:4px}
    /* PROGRESS */
    .pw{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:13px 16px;margin-bottom:18px}
    .pl_{font-size:.76rem;color:var(--m);margin-bottom:7px;font-family:'DM Mono',monospace}
    .pb_{background:var(--s2);border-radius:4px;height:5px;overflow:hidden}
    .pf_{height:100%;background:var(--a);border-radius:4px;transition:width .3s}
    /* STATUS MSG */
    .sm_{font-size:.78rem;padding:9px 13px;border-radius:7px;margin-bottom:14px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:8px}
    .sm_.ld{background:rgba(91,141,238,.1);color:var(--bl);border:1px solid rgba(91,141,238,.2)}
    .sm_.ok{background:rgba(76,175,125,.1);color:var(--g);border:1px solid rgba(76,175,125,.2)}
    .sm_.er{background:rgba(224,82,82,.1);color:var(--r);border:1px solid rgba(224,82,82,.2)}
    .sm_.wa{background:rgba(245,166,35,.1);color:var(--y);border:1px solid rgba(245,166,35,.2)}
    /* BUTTONS */
    .btn{border:none;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
    .ba{background:var(--a);color:#fff;padding:7px 14px;font-size:.8rem}
    .ba:hover{background:#f08030}
    .ba:disabled{background:var(--b2);color:var(--m2);cursor:not-allowed}
    .bgh{background:transparent;color:var(--m);border:1px solid var(--b2);padding:6px 11px;font-size:.76rem}
    .bgh:hover{color:var(--t);border-color:var(--m)}
    .bge{background:var(--g);color:#fff;padding:6px 13px;font-size:.78rem}
    .bge:hover{background:#3d9d6a}
    .br{background:transparent;color:var(--r);border:1px solid rgba(224,82,82,.3);padding:5px 9px;font-size:.73rem}
    .bs{padding:5px 9px;font-size:.72rem}
    /* CARDS */
    .card{background:var(--s);border:1px solid var(--b);border-radius:11px;padding:15px;margin-bottom:9px;transition:border-color .15s}
    .card:hover{border-color:var(--b2)}
    .card.approved{border-color:rgba(76,175,125,.4)}
    .card.skipped{opacity:.4}
    .card.active-lead{border-left:3px solid var(--g)}
    .card.past{border-left:3px solid var(--a)}
    .card.lost{border-left:3px solid var(--r);opacity:.7}
    .card.never-booked{border-left:3px solid var(--m2)}
    .ch{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:9px}
    .cn{font-weight:600;font-size:.9rem;color:var(--t)}
    .cs{font-size:.72rem;color:var(--m);margin-top:2px}
    .cm{display:flex;gap:12px;flex-wrap:wrap;font-size:.7rem;color:var(--m2);font-family:'DM Mono',monospace;margin-bottom:7px}
    .cm span{color:var(--m)}
    .ct{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
    .tag{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
    .tc_{background:rgba(91,141,238,.12);color:var(--bl)}
    .tq{background:rgba(224,82,82,.12);color:var(--r)}
    .ta{background:rgba(155,126,219,.12);color:var(--pu)}
    .tn{background:rgba(90,88,85,.2);color:var(--m)}
    .th{background:rgba(245,166,35,.12);color:var(--y)}
    .tm{background:rgba(61,189,176,.12);color:var(--te)}
    .tp{background:rgba(232,119,42,.12);color:var(--a)}
    .tg{background:rgba(76,175,125,.12);color:var(--g)}
    .cb_{background:var(--s2);border-radius:7px;padding:11px 13px;font-size:.78rem;line-height:1.7;color:var(--m);white-space:pre-wrap;max-height:150px;overflow-y:auto;border-left:3px solid var(--b2);margin-bottom:11px}
    .cf{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding-top:9px;border-top:1px solid var(--b)}
    .sp_{font-size:.66rem;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap}
    /* RISK FLAG */
    .rf{background:rgba(224,82,82,.08);border:1px solid rgba(224,82,82,.25);border-radius:6px;padding:6px 10px;font-size:.72rem;color:var(--r);margin-bottom:5px}
    /* COMPANY */
    .cc{background:var(--s);border:1px solid var(--b);border-radius:11px;padding:15px;margin-bottom:9px;cursor:pointer;transition:border-color .15s}
    .cc:hover{border-color:var(--b2)}
    .cc.exp{border-color:var(--a)}
    .ccc{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--b)}
    .cc.exp .ccc{display:block}
    .cm2{background:var(--s2);border-radius:7px;padding:9px 11px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    /* WORKFLOW STATUS LEGEND */
    .wf-legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .wf-item{font-size:.68rem;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:20px}
    /* EMPTY */
    .emp{text-align:center;padding:50px 20px;color:var(--m2)}
    .emp-i{font-size:1.8rem;margin-bottom:10px;opacity:.4}
    .emp h3{font-size:.92rem;color:var(--m);margin-bottom:5px}
    .sp2{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    input[type=text]{background:var(--s);border:1px solid var(--b);color:var(--t);padding:7px 11px;border-radius:7px;font-size:.79rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
    input[type=text]:focus{border-color:var(--a)}
    input::placeholder{color:var(--m2)}
    select{background:var(--s);border:1px solid var(--b);color:var(--t);padding:7px 11px;border-radius:7px;font-size:.79rem;font-family:'DM Sans',sans-serif;outline:none}
    /* MODAL */
    #mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;justify-content:center;align-items:center;padding:20px}
    #mo.open{display:flex}
    #md{background:var(--s);border:1px solid var(--b2);border-radius:15px;width:100%;max-width:660px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.5)}
    .mh{padding:16px 22px 13px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center}
    .mh h2{font-family:'Fraunces',serif;font-size:.98rem;font-weight:600;color:var(--t)}
    .mc_{background:none;border:none;color:var(--m);cursor:pointer;font-size:1.1rem;line-height:1}
    .ms{padding:9px 22px;border-bottom:1px solid var(--b)}
    .ms-l{font-size:.63rem;text-transform:uppercase;letter-spacing:.08em;color:var(--m2);margin-bottom:3px;font-weight:700}
    #msub{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:6px;color:var(--t);padding:7px 11px;font-size:.83rem;font-family:'DM Sans',sans-serif;outline:none}
    #msub:focus{border-color:var(--a)}
    .mb{padding:13px 22px;flex:1;overflow-y:auto}
    #memail{width:100%;min-height:240px;background:var(--s2);border:1px solid var(--b);border-radius:7px;color:var(--t);padding:13px;font-size:.81rem;line-height:1.65;resize:vertical;font-family:'DM Sans',sans-serif;outline:none}
    #memail:focus{border-color:var(--a)}
    .mf{padding:11px 22px;border-top:1px solid var(--b);display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap}
    .mf button{padding:7px 16px;border-radius:7px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
    #bam{background:var(--g);color:#fff}
    #bcm{background:var(--a);color:#fff}
    #bcm:hover{background:#f08030}
    #bclm{background:var(--s2);color:var(--m);border:1px solid var(--b2)}
    /* DEBUG */
    .dbg{background:var(--s);border:1px solid var(--b2);border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:.73rem;color:var(--m);white-space:pre-wrap;line-height:1.6}
    /* SETUP BANNER */
    .setup-banner{background:rgba(91,141,238,.08);border:1px solid rgba(91,141,238,.25);border-radius:10px;padding:18px 22px;margin-bottom:20px}
    .setup-banner h3{font-size:.95rem;font-weight:600;color:var(--bl);margin-bottom:10px}
    .setup-banner ol{padding-left:18px;font-size:.82rem;color:var(--m);line-height:2}
    .setup-banner code{background:var(--s2);padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--t)}
  </style>
</head>
<body>
<nav>
  <a class="nb" href="/">🔥 Saddleback SRG</a>
  <div class="nt">
    <a href="/"            class="ntb">Pipeline</a>
    <a href="/analytics.html" class="ntb">Analytics</a>
    <a href="/outreach.html"  class="ntb active">Outreach</a>
  </div>
  <div class="nr">
    <span style="font-size:.7rem;color:var(--m2);font-family:'DM Mono',monospace" id="last-sync-label"></span>
    <button class="btn bgh bs" onclick="doFullSync()" id="btn-sync">↻ Full Sync</button>
  </div>
</nav>

<div class="page">
  <div id="status-msg" style="display:none"></div>
  <div id="progress-wrap" style="display:none" class="pw">
    <div class="pl_" id="pl">Loading…</div>
    <div class="pb_"><div class="pf_" id="pf" style="width:0%"></div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('today')"      id="tab-today">Today</button>
    <button class="tab"        onclick="showTab('open')"       id="tab-open">Open Pipeline <span class="bg g" id="bg-open">—</span></button>
    <button class="tab"        onclick="showTab('past')"       id="tab-past">Past / Reactivation <span class="bg"  id="bg-past">—</span></button>
    <button class="tab"        onclick="showTab('never')"      id="tab-never">Never Booked <span class="bg"  id="bg-never">—</span></button>
    <button class="tab"        onclick="showTab('companies')"  id="tab-companies">Companies <span class="bg"  id="bg-companies">—</span></button>
    <button class="tab"        onclick="showTab('campaigns')"  id="tab-campaigns">Campaigns</button>
    <button class="tab"        onclick="showTab('queue')"      id="tab-queue">Email Queue <span class="bg g" id="bg-queue">0</span></button>
    <button class="tab"        onclick="showTab('suppressed')" id="tab-suppressed">Do Not Contact</button>
    <button class="tab"        onclick="showTab('debug')"      id="tab-debug">Debug / Sync</button>
  </div>

  <div id="pane-today"></div>
  <div id="pane-open"       style="display:none"></div>
  <div id="pane-past"       style="display:none"></div>
  <div id="pane-never"      style="display:none"></div>
  <div id="pane-companies"  style="display:none"></div>
  <div id="pane-campaigns"  style="display:none"></div>
  <div id="pane-queue"      style="display:none"></div>
  <div id="pane-suppressed" style="display:none"></div>
  <div id="pane-debug"      style="display:none"></div>
</div>

<!-- MODAL -->
<div id="mo">
  <div id="md">
    <div class="mh"><h2 id="mt">Review Email</h2><button class="mc_" onclick="closeModal()">✕</button></div>
    <div class="ms"><div class="ms-l">Subject line</div><input type="text" id="msub" placeholder="Subject…"></div>
    <div class="mb">
      <div id="risk-display" style="margin-bottom:10px"></div>
      <textarea id="memail"></textarea>
    </div>
    <div class="mf">
      <button id="bclm" onclick="closeModal()">Close</button>
      <button id="bcm"  onclick="copyModal()">Copy</button>
      <button id="bam"  onclick="approveFromModal()">✓ Approve</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API_TS = '/.netlify/functions/tripleseat';
const API_AI = '/.netlify/functions/ai';
const API_ST = '/.netlify/functions/store';

// ── PERSONAL DOMAINS ──────────────────────────────────────────────────────────
const PD = new Set(['gmail.com','yahoo.com','hotmail.com','outlook.com','icloud.com','aol.com','live.com','msn.com','me.com','mac.com','comcast.net','att.net','verizon.net','sbcglobal.net','charter.net','cox.net','earthlink.net','protonmail.com','tutanota.com','ymail.com','googlemail.com','rocketmail.com','bellsouth.net','optonline.net']);

const DOMAIN_MAP = {
  'msu.edu':'Michigan State University','michigan.gov':'State of Michigan',
  'lsd.k12.mi.us':'Lansing School District','okemos.k12.mi.us':'Okemos Public Schools',
  'ingham.org':'Ingham County','lansingmi.gov':'City of Lansing',
  'deltadental.com':'Delta Dental','bcbsm.com':'Blue Cross Blue Shield',
  'sparrow.org':'Sparrow Health System','mclaren.org':'McLaren Health',
  'cooleylaw.edu':'Cooley Law School','lcc.edu':'Lansing Community College',
  'michiganworks.org':'Michigan Works',
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let contacts = [];     // deduped outreach_contacts from Supabase
let companies = {};    // grouped by company/domain key
let queue = [];        // email_queue from Supabase
let suppressed = new Set();
let activeTab = 'today';
let modalQueueId = null;
let dbConfigured = false;

// ── CLEANUP old localStorage ──────────────────────────────────────────────────
(function(){try{['srg-contacts','srg-lastsync','srg-queue','srg-contacted'].forEach(k=>{try{localStorage.removeItem(k);}catch(e){}});}catch(e){}})();

// ── HELPERS ───────────────────────────────────────────────────────────────────
function setStatus(msg,type='ld'){
  const el=document.getElementById('status-msg');
  if(!msg){el.style.display='none';return;}
  el.className='sm_ '+type; el.innerHTML=msg; el.style.display='flex';
}
function setProgress(pct,label){
  document.getElementById('progress-wrap').style.display='block';
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pl').textContent=label;
}
function hideProgress(){setTimeout(()=>document.getElementById('progress-wrap').style.display='none',2500);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getDomain(email){if(!email)return null;const m=email.toLowerCase().match(/@([^@]+)$/);return(m&&!PD.has(m[1]))?m[1]:null;}
function domainName(d){if(!d)return null;if(DOMAIN_MAP[d])return DOMAIN_MAP[d];const b=d.replace(/\.(com|org|edu|gov|net|mil|k12\.mi\.us|mi\.us)$/,'').split('.').pop();return b?b.charAt(0).toUpperCase()+b.slice(1):null;}

// ── ACCOUNT STATUS from Tripleseat booking status ─────────────────────────────
// DEFINITE/CLOSED = confirmed/completed → past customer if date is past
// TENTATIVE/PROSPECT = open opportunity → active pipeline
// LOST = lost
// lead with no booking = inquired never booked (if old enough)
function deriveAccountStatus(c) {
  const now = Date.now();
  const bs = (c.last_booking_status || '').toUpperCase();
  const eventTs = c.last_event_date ? new Date(c.last_event_date).getTime() : null;
  const createdTs = c.created_at ? new Date(c.created_at).getTime() : null;
  const daysSinceCreated = createdTs ? Math.floor((now - createdTs) / 86400000) : null;

  // Future event with active status = currently being worked
  if(eventTs && eventTs > now && ['DEFINITE','TENTATIVE','PROSPECT'].includes(bs)) return 'active-upcoming';
  // Very recent inquiry (within 14 days) = active
  if(daysSinceCreated !== null && daysSinceCreated <= 14) return 'active-inquiry';
  // Past event that was DEFINITE or CLOSED = completed past customer
  if(eventTs && eventTs < now && ['DEFINITE','CLOSED'].includes(bs)) return 'past-customer';
  // TENTATIVE/PROSPECT with past date = stale opportunity, worth reactivating
  if(eventTs && eventTs < now && ['TENTATIVE','PROSPECT'].includes(bs)) return 'past-customer';
  // Explicitly lost
  if(bs === 'LOST' || c.turned_down_at) return 'lost';
  // Booking exists but no definite status = still counts as past customer
  if(c.booking_count > 0) return 'past-customer';
  // Old inquiry, no bookings = never booked
  if(daysSinceCreated !== null && daysSinceCreated > 14 && c.booking_count === 0) return 'never-booked';
  return 'past-customer';
}

const STATUS_LABELS = {'active-upcoming':'Upcoming Event','active-inquiry':'Active Inquiry','past-customer':'Past Customer','never-booked':'Never Booked','lost':'Lost/Turned Down'};
const STATUS_COLORS = {'active-upcoming':'var(--g)','active-inquiry':'var(--bl)','past-customer':'var(--a)','never-booked':'var(--m)','lost':'var(--r)'};

// ── TAG CONTACTS ──────────────────────────────────────────────────────────────
function enrichContact(c) {
  // Use status from Supabase if already set, otherwise derive
  if(!c.account_status) c.account_status = deriveAccountStatus(c);
  const tags = c.tags || [];
  const now = Date.now();

  // Derive domain/company
  const domain = getDomain(c.email);
  c._domain = domain;
  if(!c.company && domain) c._co = domainName(domain);

  // Anniversary: use last_event_date (actual confirmed event)
  const annDate = c.last_event_date ? new Date(c.last_event_date).getTime() : null;
  if(annDate) {
    const ref = new Date(annDate), yearsAgo = new Date().getFullYear() - ref.getFullYear();
    if(yearsAgo >= 1) {
      const ann = new Date(ref); ann.setFullYear(new Date().getFullYear());
      const dUntil = Math.floor((ann.getTime() - now) / 86400000);
      if(dUntil >= -7 && dUntil <= 90) {
        c._annDays = dUntil;
        c._annWindow = dUntil <= 30 ? '30d' : dUntil <= 60 ? '60d' : '90d';
        if(!tags.includes('anniversary')) tags.push('anniversary');
      }
    }
  }

  // Ensure MSU tag for msu.edu
  if(domain === 'msu.edu' && !tags.includes('msu')) tags.push('msu');
  // Ensure corporate tag for business domains
  if(domain && !tags.includes('corporate')) tags.push('corporate');

  c.tags = tags;
  return c;
}

// ── BUILD COMPANIES ───────────────────────────────────────────────────────────
function buildCompanies(list) {
  const map = {};
  list.forEach(c => {
    const name = c.company || c._co;
    const domain = c._domain;
    if(!name && !domain) return;
    if(!c.email) return;
    const key = (name || '').toLowerCase().trim() || (domain || '');
    if(!key) return;
    if(!map[key]) map[key] = { name: name || domainName(domain) || key, domain, contacts: [], events: 0, guests: 0 };
    map[key].contacts.push(c);
    if(c.last_event_date) map[key].events++;
    if(c.total_guests) map[key].guests += (parseInt(c.total_guests) || 0);
  });
  return Object.fromEntries(Object.entries(map).sort((a,b) => b[1].contacts.length - a[1].contacts.length));
}

// ── CAMPAIGNS ─────────────────────────────────────────────────────────────────
const CAMPAIGNS = [
  {id:'anniversary', label:'🎉 Anniversary (90d)',   color:'var(--pu)', desc:'Event anniversary within 90 days — use actual event date only.',
    filter:c=>c.tags?.includes('anniversary') && ['past-customer'].includes(c.account_status), priority:10},
  {id:'msu',         label:'🟢 MSU',                 color:'var(--te)', desc:'Michigan State University contacts.',
    filter:c=>c.tags?.includes('msu') && !['active-upcoming','active-inquiry'].includes(c.account_status), priority:9},
  {id:'gone-quiet',  label:'😶 Gone Quiet 6mo+',    color:'var(--r)',  desc:'Past customers with no activity in 6+ months.',
    filter:c=>c.tags?.includes('gone-quiet-6mo') && c.account_status === 'past-customer', priority:8},
  {id:'high-value',  label:'⭐ High Value',           color:'var(--y)',  desc:'75+ guest past events.',
    filter:c=>c.tags?.includes('high-value') && c.account_status === 'past-customer', priority:7},
  {id:'corporate',   label:'🏢 Corporate',            color:'var(--bl)', desc:'Business/org past customers.',
    filter:c=>c.tags?.includes('corporate') && !c.tags?.includes('msu') && c.account_status === 'past-customer', priority:6},
  {id:'graduation',  label:'🎓 Graduation',           color:'var(--a2)', desc:'Past graduation event customers.',
    filter:c=>c.tags?.includes('graduation') && c.account_status === 'past-customer', priority:5},
  {id:'holiday',     label:'🎄 Holiday',              color:'var(--g)',  desc:'Past holiday event customers.',
    filter:c=>c.tags?.includes('holiday') && c.account_status === 'past-customer', priority:4},
  {id:'no-booking',  label:'📋 Never Booked',         color:'var(--m)',  desc:'Inquired but never confirmed.',
    filter:c=>c.account_status === 'never-booked' && c.email, priority:3},
];

function getActiveCampaigns() {
  const mo = new Date().getMonth();
  const active = [];
  if(mo>=3&&mo<=5) active.push('graduation');
  if(mo>=6&&mo<=10) active.push('msu');
  if(mo>=8&&mo<=11) active.push('holiday');
  return active;
}

function buildBatch(n=50) {
  const now = Date.now();
  const inQ = new Set(queue.map(q=>String(q.contact_email||q.id)));
  const scored = [];
  contacts.forEach(c => {
    if(!c.email || !c.email.includes('@')) return;
    if(inQ.has(c.email)) return;
    if(suppressed.has(c.email.toLowerCase())) return;
    if(['active-upcoming','active-inquiry'].includes(c.account_status)) return;
    if(c.last_contacted_at && (now - new Date(c.last_contacted_at).getTime()) < 30*86400000) return;
    let score=0, campaign=null;
    CAMPAIGNS.forEach(cam => {
      if(cam.filter(c)) { score += cam.priority; if(!campaign || cam.priority > (CAMPAIGNS.find(x=>x.id===campaign)?.priority||0)) campaign = cam.id; }
    });
    if(score > 0) scored.push({contact:c, score, campaign});
  });
  scored.sort((a,b) => b.score - a.score);
  return scored.slice(0, n);
}

// ── LOAD FROM SUPABASE ────────────────────────────────────────────────────────
async function loadFromDB() {
  setStatus('Loading contacts from database…', 'ld');
  let debugInfo = { step: 'start', metaResponse: null, contactsResponse: null };

  try {
    // Step 1: Check metadata — are there saved contacts?
    debugInfo.step = 'get-metadata';
    const metaRes = await fetch(`${API_ST}?action=get-metadata`);
    const meta = await metaRes.json().catch(e => ({ configured: false, parseError: e.message }));
    debugInfo.metaResponse = meta;

    // Not configured — show setup instructions
    if(meta.configured === false || meta.ok === false) {
      dbConfigured = false;
      renderSetupBanner(meta.error || 'Supabase not configured');
      setStatus('','');
      return;
    }
    dbConfigured = true;

    // Check if data actually exists
    const totalOutreach = parseInt(meta.total_outreach || '0');
    const lastSync = meta.last_full_sync;
    debugInfo.totalOutreach = totalOutreach;
    debugInfo.lastSync = lastSync;

    if(!lastSync || totalOutreach === 0) {
      setStatus('No saved contacts found. Click "↻ Full Sync" to import from Tripleseat for the first time.', 'wa');
      renderTab(activeTab);
      return;
    }

    // Step 2: Load contacts from outreach_contacts table
    debugInfo.step = 'get-contacts';
    setProgress(20, `Loading ${totalOutreach.toLocaleString()} contacts from Supabase…`);
    const cRes = await fetch(`${API_ST}?action=get-contacts&limit=10000`);
    const cData = await cRes.json().catch(e => ({ contacts: [], loadError: e.message }));
    debugInfo.contactsResponse = { count: cData.contacts?.length, loadedFrom: cData.loadedFrom, error: cData.loadError };

    if(!cData.contacts?.length) {
      // Data was supposed to be there (metadata said so) but isn't — this means
      // save-outreach-contacts failed previously. Prompt re-sync with clear explanation.
      setStatus(`⚠ Metadata says ${totalOutreach.toLocaleString()} contacts exist but outreach_contacts table returned 0 rows. The previous sync may have failed. Click "↻ Full Sync" to rebuild.`, 'er');
      renderTab(activeTab);
      return;
    }

    setProgress(80, 'Processing contacts…');
    contacts = cData.contacts.map(enrichContact);
    companies = buildCompanies(contacts);

    // Step 3: Load queue and suppressed list in parallel
    debugInfo.step = 'get-queue-and-suppressed';
    const [qData, sData] = await Promise.all([
      fetch(`${API_ST}?action=get-queue`).then(r=>r.json()).catch(()=>({queue:[]})),
      fetch(`${API_ST}?action=get-suppressed`).then(r=>r.json()).catch(()=>({list:[]})),
    ]);
    queue = qData.queue || [];
    suppressed = new Set((sData.list||[]).map(e=>e.toLowerCase()));

    setProgress(100, `✓ ${contacts.length.toLocaleString()} contacts loaded`);
    hideProgress();

    const syncDate = lastSync ? new Date(lastSync) : null;
    document.getElementById('last-sync-label').textContent = syncDate ? 'Synced ' + syncDate.toLocaleDateString() : '';
    setStatus(`✓ ${contacts.length.toLocaleString()} contacts loaded from Supabase · last synced ${syncDate ? syncDate.toLocaleDateString() : 'never'}`, 'ok');
    setTimeout(()=>setStatus('',''), 5000);

    updateBadges(); renderTab(activeTab);

    // Stale data warning (only warn, don't block)
    if(syncDate && (Date.now()-syncDate.getTime()) > 3*86400000) {
      setTimeout(()=>setStatus(`Contact data is ${Math.floor((Date.now()-syncDate.getTime())/86400000)} days old. Consider clicking "↻ Full Sync" for latest Tripleseat data.`, 'wa'), 5500);
    }

  } catch(err) {
    console.error('[loadFromDB] Error at step', debugInfo.step, ':', err);
    setStatus(`Error loading from Supabase (step: ${debugInfo.step}): ${err.message}`, 'er');
    renderTab(activeTab);
  }
  // Store debug info globally for the debug tab
  window._lastLoadDebug = debugInfo;
}

// ── FULL SYNC FROM TRIPLESEAT ─────────────────────────────────────────────────
async function doFullSync() {
  const btn = document.getElementById('btn-sync');
  if(btn){btn.disabled=true; btn.innerHTML='<span class="sp2"></span> Syncing…';}
  setProgress(0, 'Starting full sync from Tripleseat…');

  try {
    // Step 1: Fetch all leads
    setProgress(5, 'Fetching leads from Tripleseat…');
    const allLeads = await fetchAllPages('leads');
    setProgress(20, `${allLeads.length.toLocaleString()} leads — saving to database…`);
    await sbPost('save-leads', {leads: allLeads});

    // Step 2: Fetch all bookings (has DEFINITE/TENTATIVE/CLOSED/LOST status)
    setProgress(25, 'Fetching bookings (status data)…');
    const allBookings = await fetchAllPages('bookings');
    setProgress(45, `${allBookings.length.toLocaleString()} bookings — saving…`);
    await sbPost('save-bookings', {bookings: allBookings});

    // Step 3: Fetch accounts
    setProgress(50, 'Fetching accounts…');
    const allAccounts = await fetchAllPages('accounts');
    setProgress(62, `${allAccounts.length.toLocaleString()} accounts — saving…`);
    await sbPost('save-accounts', {accounts: allAccounts});

    // Step 4: Fetch contacts
    setProgress(65, 'Fetching contacts…');
    const allContacts = await fetchAllPages('contacts');
    setProgress(78, `${allContacts.length.toLocaleString()} contacts — saving…`);
    await sbPost('save-contacts', {contacts: allContacts});

    // Step 5: Build outreach_contacts (deduped, enriched)
    setProgress(82, 'Building deduplicated outreach profiles…');
    const outreach = buildOutreachContacts(allLeads, allBookings, allAccounts, allContacts);
    setProgress(88, `${outreach.length.toLocaleString()} unique contacts — saving to Supabase…`);

    // Save outreach contacts — this is the critical step that enables page-load persistence
    // Save in batches to avoid payload limits and get clear error feedback
    let savedCount = 0;
    const batchSize = 300;
    for(let i=0; i < outreach.length; i += batchSize) {
      const batch = outreach.slice(i, i+batchSize);
      const pct = 88 + Math.round((i/outreach.length)*10);
      setProgress(pct, `Saving contacts ${i+1}–${Math.min(i+batchSize, outreach.length)} of ${outreach.length.toLocaleString()}…`);
      const result = await sbPost('save-outreach-contacts', {contacts: batch});
      if(result && result.ok === false) {
        throw new Error(`save-outreach-contacts failed on batch ${i/batchSize + 1}: ${result.error}`);
      }
      savedCount += batch.length;
    }

    // Verify the save by reading metadata back
    setProgress(98, 'Verifying save…');
    const verifyMeta = await fetch(`${API_ST}?action=get-metadata`).then(r=>r.json()).catch(()=>({}));
    const savedTotal = parseInt(verifyMeta.total_outreach||'0');
    if(savedTotal === 0) {
      throw new Error(`Save verification failed: metadata shows 0 contacts after saving ${savedCount}. Check Supabase logs.`);
    }

    // Step 6: Load into memory from the saved data
    contacts = outreach.map(enrichContact);
    companies = buildCompanies(contacts);
    updateBadges(); renderTab(activeTab);
    dbConfigured = true;

    setProgress(100, `✓ Sync complete — ${contacts.length.toLocaleString()} unique contacts saved to Supabase`);
    hideProgress();
    document.getElementById('last-sync-label').textContent = 'Synced ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setStatus(`✓ Full sync complete and saved to Supabase: ${allLeads.length.toLocaleString()} leads, ${allBookings.length.toLocaleString()} bookings, ${contacts.length.toLocaleString()} unique contacts. Page will now load from database.`, 'ok');
    setTimeout(()=>setStatus('',''), 8000);

  } catch(err) {
    console.error('[doFullSync] Error:', err);
    setProgress(100, 'Sync error: ' + err.message);
    setStatus(`Sync error: ${err.message}`, 'er');
  }
  if(btn){btn.disabled=false; btn.textContent='↻ Full Sync';}
}

async function fetchAllPages(endpoint) {
  const all = []; let page=1, totalPages=1;
  while(page <= Math.min(totalPages, 100)) {
    const res = await fetch(`${API_TS}?endpoint=${endpoint}&page=${page}&limit=100`);
    if(!res.ok) throw new Error(`Tripleseat ${endpoint} HTTP ${res.status}`);
    const data = await res.json();
    totalPages = data.total_pages || 1;
    (data.results || []).forEach(r => all.push(r));
    page++;
    if(page <= Math.min(totalPages, 100)) await new Promise(r=>setTimeout(r,80));
  }
  return all;
}

async function sbPost(action, body) {
  const res = await fetch(`${API_ST}?action=${action}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok || data.ok === false) console.warn(`${action} issue:`, data.error || res.status);
  return data;
}

// ── DEDUP + ENRICH for outreach_contacts table ────────────────────────────────
function buildOutreachContacts(leads, bookings, accounts, contacts) {
  const now = Date.now();
  const map = {}; // email → record

  // Index bookings by account_id and contact_id for quick lookup
  const bookingsByContact = {};
  const bookingsByAccount = {};
  bookings.forEach(b => {
    const bs = (b.status||'').toUpperCase();
    if(b.contact_id) { bookingsByContact[b.contact_id] = bookingsByContact[b.contact_id]||[]; bookingsByContact[b.contact_id].push(b); }
    if(b.account_id) { bookingsByAccount[b.account_id] = bookingsByAccount[b.account_id]||[]; bookingsByAccount[b.account_id].push(b); }
  });

  // Index accounts
  const accountMap = {};
  accounts.forEach(a => { accountMap[a.id] = a; });

  // Process TS contacts (real CRM contacts — best source)
  contacts.forEach(c => {
    const email = (c.email_address || c.email || '').toLowerCase().trim();
    if(!email) return;
    const cBookings = bookingsByContact[c.id] || (c.account_id ? bookingsByAccount[c.account_id] : []) || [];
    const account = c.account_id ? accountMap[c.account_id] : null;
    const company = account?.name || c.company || '';
    const domain = getDomain(email);

    // Find best booking info
    const confirmedBookings = cBookings.filter(b => ['DEFINITE','CLOSED'].includes((b.status||'').toUpperCase()));
    const latestBooking = cBookings.sort((a,b)=>new Date(b.updated_at||0)-new Date(a.updated_at||0))[0];
    const latestConfirmed = confirmedBookings.sort((a,b)=>new Date(b.start_date||0)-new Date(a.start_date||0))[0];
    const lastEventDate = latestConfirmed?.start_date || latestBooking?.start_date || null;
    const totalGuests = cBookings.reduce((s,b)=>s+(b.guest_count||0), 0);
    const days = lastEventDate ? Math.floor((now-new Date(lastEventDate).getTime())/86400000) : null;

    const tags = buildTags(c, email, company, domain, cBookings, lastEventDate, days);
    const status = deriveStatusFromBookings(cBookings, lastEventDate, c.created_at);

    const record = {
      id: email,
      ts_contact_id: c.id, ts_account_id: c.account_id || null,
      first_name: c.first_name, last_name: c.last_name,
      email, company, domain,
      account_status: status,
      booking_statuses: [...new Set(cBookings.map(b=>(b.status||'').toUpperCase()))],
      booking_count: cBookings.length,
      last_event_date: lastEventDate,
      last_booking_status: (latestBooking?.status||'').toUpperCase() || null,
      total_guests: totalGuests,
      tags, days_since_event: days,
      updated_at: new Date().toISOString(),
    };

    if(!map[email] || cBookings.length > (map[email]?.booking_count||0)) map[email] = record;
  });

  // Process leads — fill gaps for anyone not in TS contacts
  leads.forEach(l => {
    const email = (l.email_address || l.email || '').toLowerCase().trim();
    if(!email || map[email]) return; // already have a better record
    const domain = getDomain(email);
    const company = l.company || '';
    const days = l.event_date ? Math.floor((now-new Date(l.event_date).getTime())/86400000) : (l.created_at ? Math.floor((now-new Date(l.created_at).getTime())/86400000) : null);
    const tags = buildTags(l, email, company, domain, [], l.event_date, days);
    const status = l.turned_down_at ? 'lost' : (days!==null&&days<=14?'active-inquiry':days!==null&&days<0?'active-upcoming':'never-booked');

    map[email] = {
      id: email, ts_contact_id: null, ts_account_id: null,
      first_name: l.first_name, last_name: l.last_name,
      email, company, domain, account_status: status,
      booking_statuses: [], booking_count: 0,
      last_event_date: l.event_date||null, last_booking_status: null,
      total_guests: l.guest_count||0, tags, days_since_event: days,
      updated_at: new Date().toISOString(),
    };
  });

  return Object.values(map);
}

function deriveStatusFromBookings(bookings, lastEventDate, createdAt) {
  const now = Date.now();
  if(!bookings.length) {
    const days = createdAt ? Math.floor((now-new Date(createdAt).getTime())/86400000) : null;
    return days!==null&&days<=14 ? 'active-inquiry' : 'never-booked';
  }
  const hasActive = bookings.some(b=>['TENTATIVE','PROSPECT','DEFINITE'].includes((b.status||'').toUpperCase()) && (!b.start_date||new Date(b.start_date).getTime()>now));
  if(hasActive) return new Date(lastEventDate||0).getTime() > now ? 'active-upcoming' : 'active-inquiry';
  if(bookings.some(b=>(b.status||'').toUpperCase()==='LOST')) return 'lost';
  return 'past-customer';
}

function buildTags(record, email, company, domain, bookings, lastEventDate, days) {
  const tags=[], desc=(record.event_description||record.additional_information||record.description||'').toLowerCase();
  const now = Date.now();
  if(days!==null&&days>=180) tags.push('gone-quiet-6mo');
  if(days!==null&&days>=365) tags.push('gone-quiet-12mo');
  if((company&&company.trim())||domain) tags.push('corporate');
  if(domain==='msu.edu'||(company||'').toLowerCase().includes('michigan state')||(company||'').toLowerCase().match(/\bmsu\b/)) tags.push('msu');
  if(bookings.some(b=>(b.guest_count||0)>=75)||(record.guest_count||0)>=75) tags.push('high-value');
  if(/graduat|commencement|class of/.test(desc)) tags.push('graduation');
  if(/holiday|christmas|xmas|thanksgiving|new year|year.end/.test(desc)) tags.push('holiday');
  if(/wedding|reception|bride|groom/.test(desc)) tags.push('wedding');
  if(/football|spartan|game day|tailgate|watch party/.test(desc)) tags.push('msu-football');
  // Anniversary uses lastEventDate
  if(lastEventDate) {
    const ref=new Date(lastEventDate), yr=new Date().getFullYear()-ref.getFullYear();
    if(yr>=1){
      const ann=new Date(ref); ann.setFullYear(new Date().getFullYear());
      const dU=Math.floor((ann.getTime()-now)/86400000);
      if(dU>=-7&&dU<=90) tags.push('anniversary');
    }
  }
  return tags;
}

// ── RENDER TABS ───────────────────────────────────────────────────────────────
function showTab(t) {
  activeTab=t;
  ['today','open','past','never','companies','campaigns','queue','suppressed','debug'].forEach(x=>{
    document.getElementById('pane-'+x).style.display=x===t?'block':'none';
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  renderTab(t);
}
function renderTab(t) {
  if(t==='today')     renderToday();
  else if(t==='open')      renderOpen();
  else if(t==='past')      renderPast();
  else if(t==='never')     renderNever();
  else if(t==='companies') renderCompanies();
  else if(t==='campaigns') renderCampaigns();
  else if(t==='queue')     renderQueue();
  else if(t==='suppressed')renderSuppressed();
  else if(t==='debug')     renderDebug();
}
function updateBadges() {
  const open = contacts.filter(c=>['active-upcoming','active-inquiry'].includes(c.account_status)).length;
  const past = contacts.filter(c=>c.account_status==='past-customer').length;
  const never = contacts.filter(c=>c.account_status==='never-booked').length;
  document.getElementById('bg-open').textContent     = open.toLocaleString();
  document.getElementById('bg-past').textContent     = past.toLocaleString();
  document.getElementById('bg-never').textContent    = never.toLocaleString();
  document.getElementById('bg-companies').textContent = Object.keys(companies).length.toLocaleString();
  document.getElementById('bg-queue').textContent    = queue.filter(q=>['needs_review','approved','ready_to_send'].includes(q.status)).length;
}

// ── QUEUE ─────────────────────────────────────────────────────────────────────
// Status workflow: draft_needed → draft_generated → needs_review → approved → ready_to_send → sent/skipped/failed
const WF_COLORS = {draft_needed:'var(--m2)',draft_generated:'var(--bl)',needs_review:'var(--y)',approved:'var(--a)',ready_to_send:'var(--g)',sent:'var(--g)',skipped:'var(--m2)',failed:'var(--r)'};
const WF_LABELS = {draft_needed:'Draft needed',draft_generated:'Draft generated',needs_review:'Needs review',approved:'Approved',ready_to_send:'Ready to send',sent:'Sent',skipped:'Skipped',failed:'Failed'};

function renderQueue() {
  const p=document.getElementById('pane-queue');
  const byStatus={};
  queue.forEach(q=>{byStatus[q.status]=(byStatus[q.status]||0)+1;});
  const needDraft=queue.filter(q=>q.status==='draft_needed').length;
  const needReview=queue.filter(q=>q.status==='needs_review'||q.status==='draft_generated').length;
  const approved=queue.filter(q=>q.status==='approved'||q.status==='ready_to_send').length;

  if(!queue.length){
    p.innerHTML=`<div class="emp"><div class="emp-i">✉</div><h3>Queue is empty</h3><p>Go to Today or Campaigns and queue some contacts.</p></div>`;
    updateBadges(); return;
  }

  p.innerHTML=`
    <div class="wf-legend">
      ${Object.entries(WF_LABELS).map(([k,v])=>`<span class="wf-item" style="color:${WF_COLORS[k]};background:${WF_COLORS[k]}1a">${v} (${byStatus[k]||0})</span>`).join('')}
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:9px">
      <div><span style="font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600">${queue.length}</span> <span style="font-size:.76rem;color:var(--m)">in queue</span></div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        ${needDraft>0?`<button class="btn ba" onclick="generateAll()">✨ Generate ${needDraft} draft${needDraft>1?'s':''}</button>`:''}
        ${needReview>0?`<button class="btn bge" onclick="approveAllReady()">✓ Approve all reviewed</button>`:''}
        <button class="btn bgh" onclick="clearQueue()">Clear queue</button>
      </div>
    </div>
    <div style="background:rgba(91,141,238,.08);border:1px solid rgba(91,141,238,.2);border-radius:8px;padding:9px 13px;margin-bottom:14px;font-size:.75rem;color:var(--bl)">
      📨 Email provider: <strong>Not configured yet.</strong> Approved emails show as "Ready to send" but cannot be sent automatically until an email provider (Resend, SendGrid, or Gmail API) is connected. Each email must be copied and sent manually for now.
    </div>
    ${queue.map(item=>{
      const sc_=WF_COLORS[item.status]||'var(--m)',sl=WF_LABELS[item.status]||item.status;
      const hasRisks=item.risk_flags?.length>0&&item.risk_flags[0]!=='none'&&item.risk_flags[0];
      return `<div class="card ${item.status==='approved'||item.status==='ready_to_send'?'approved':item.status==='skipped'?'skipped':''}" id="qc-${item.id}">
        <div class="ch">
          <div>
            <div class="cn">${esc(item.contact_name||'Unknown')}${item.company?` <span style="font-size:.71rem;color:var(--m);font-weight:400">${esc(item.company)}</span>`:''}</div>
            <div class="cs">${esc(item.contact_email)}${item.subject?' · '+esc(item.subject):''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            ${hasRisks?`<span style="font-size:.65rem;color:var(--y);background:rgba(245,166,35,.1);padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace">⚠ review</span>`:''}
            <span class="sp_" style="color:${sc_};background:${sc_}1a">${sl}</span>
          </div>
        </div>
        ${item.body?`<div class="cb_">${esc(item.body)}</div>`:''}
        <div class="cf">
          ${item.status==='draft_needed'?`<button class="btn ba bs" onclick="generateOne('${item.id}')">✨ Generate</button>`:''}
          ${['draft_generated','needs_review'].includes(item.status)?`
            <button class="btn bgh bs" onclick="openModal('${item.id}')">👁 Review${hasRisks?' ⚠':''}</button>
            <button class="btn bge bs"  onclick="approveItem('${item.id}')">✓ Approve</button>`:''}
          ${item.status==='approved'?`
            <button class="btn bge bs" onclick="markReadyToSend('${item.id}')">→ Mark ready to send</button>
            <button class="btn bgh bs" onclick="openModal('${item.id}')">👁 View</button>`:''}
          ${item.status==='ready_to_send'?`
            <button class="btn bgh bs" onclick="openModal('${item.id}')">👁 Copy & send manually</button>
            <button class="btn bge bs" onclick="markSent('${item.id}')">✓ Mark as sent</button>`:''}
          ${!['sent','skipped'].includes(item.status)?`<button class="btn bgh bs" onclick="skipItem('${item.id}')">Skip</button>`:''}
          <button class="btn br bs" onclick="removeItem('${item.id}')">Remove</button>
        </div>
      </div>`;
    }).join('')}`;
  updateBadges();
}

function renderDebug() {
  const p=document.getElementById('pane-debug');
  p.innerHTML=`<div style="font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;margin-bottom:14px">Debug / Storage Status</div>
  <div class="dbg" id="dbg-content">Loading…</div>
  <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn ba" onclick="loadDebug()">Refresh debug</button>
    <button class="btn bgh" onclick="doFullSync()">↻ Full Sync</button>
    <button class="btn br" onclick="confirmClear()">⚠ Clear all data</button>
  </div>`;
  loadDebug();

async function loadDebug() {
  const el=document.getElementById('dbg-content');if(!el)return;
  el.textContent='Loading debug info from Supabase…';
  try{
    const [debugRes] = await Promise.all([
      fetch(`${API_ST}?action=debug`).then(r=>r.json()).catch(e=>({error:e.message})),
    ]);
    el.textContent=JSON.stringify({
      supabase: debugRes,
      frontend: {
        contactsInMemory: contacts.length,
        companiesBuilt: Object.keys(companies).length,
        queueLength: queue.length,
        suppressedCount: suppressed.size,
        dbConfigured,
        activeTab,
        lastPageLoadDebug: window._lastLoadDebug || 'no load debug info yet',
      },
      persistence: {
        storageProvider: dbConfigured ? 'Supabase' : 'none (not configured)',
        totalOutreach: debugRes?.syncMetadata?.total_outreach || '0',
        lastFullSync: debugRes?.syncMetadata?.last_full_sync || 'never',
        readyToLoad: debugRes?.readyToLoad,
        note: contacts.length > 0
          ? `Loaded ${contacts.length} contacts from ${dbConfigured ? 'Supabase' : 'session memory only'}`
          : 'No contacts in memory — page load found no data',
      }
    },null,2);
  }catch(err){el.textContent='Debug error: '+err.message;}
}
function confirmClear(){
  if(!confirm('Clear ALL stored data in Supabase? Cannot be undone.'))return;
  fetch(`${API_ST}?action=save-outreach-contacts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contacts:[]})});
  contacts=[];companies={};queue=[];suppressed=new Set();
  updateBadges();renderTab(activeTab);
  setStatus('All data cleared — sync from Tripleseat to reload','wa');
}

// ── CONTACT CARD ──────────────────────────────────────────────────────────────
function cCard(c,showActions) {
  const name=[c.first_name,c.last_name].filter(Boolean).join(' ')||'Unknown';
  const co=c.company||c._co||'';
  const inQ=queue.some(q=>q.contact_email===c.email);
  const sc_=STATUS_COLORS[c.account_status]||'var(--m)';
  const isActive=['active-upcoming','active-inquiry'].includes(c.account_status);
  return `<div class="card ${isActive?'active-lead':c.account_status==='past-customer'?'past':c.account_status==='lost'?'lost':'never-booked'}">
    <div class="ch">
      <div><div class="cn">${esc(name)}</div>${co?`<div class="cs">${esc(co)}</div>`:''}</div>
      <span class="sp_" style="color:${sc_};background:${sc_}1a">${STATUS_LABELS[c.account_status]||'?'}</span>
    </div>
    <div class="cm">
      ${c.email?`<div><span>Email</span> ${esc(c.email)}</div>`:''}
      ${c.last_event_date?`<div><span>Last event</span> ${new Date(c.last_event_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>`:''}
      ${c.last_booking_status?`<div><span>Status</span> ${c.last_booking_status}</div>`:''}
      ${c.total_guests?`<div><span>Guests</span> ${c.total_guests}</div>`:''}
      ${c.booking_count?`<div><span>Bookings</span> ${c.booking_count}</div>`:''}
    </div>
    <div class="ct">${(c.tags||[]).map(t=>`<span class="tag ${tCls(t)}">${t.replace(/-/g,' ')}</span>`).join('')}</div>
    ${showActions&&!isActive?`<div style="display:flex;gap:6px">
      ${inQ?`<span style="font-size:.7rem;color:var(--g);font-family:'DM Mono',monospace">✓ Queued</span>`:`<button class="btn ba bs" onclick="queueOne('${esc(c.email)}','')">+ Queue</button>`}
      <button class="btn bgh bs" onclick="addSuppressed('${esc(c.email)}')">Suppress</button>
    </div>`:''}
  </div>`;
}
function tCls(t){if(t.includes('quiet'))return'tq';if(t==='corporate')return'tc_';if(t==='anniversary')return'ta';if(t==='no-booking'||t==='never-booked')return'tn';if(t==='high-value')return'th';if(t==='msu')return'tm';return'tn';}
function noData(){return `<div class="emp"><div class="emp-i">⟳</div><h3>No contacts loaded</h3><p>Click "↻ Full Sync" to import from Tripleseat.</p><br><button class="btn ba" onclick="doFullSync()">Full Sync now</button></div>`;}

// ── QUEUE ACTIONS ─────────────────────────────────────────────────────────────
function queueOne(email,campaign) {
  const c=contacts.find(x=>x.email===email);
  if(!c||queue.find(q=>q.contact_email===email)) return;
  if(['active-upcoming','active-inquiry'].includes(c.account_status)){alert('Active account — Ryan handles this directly.');return;}
  if(suppressed.has(email.toLowerCase())){alert('This contact is on the Do Not Contact list.');return;}
  const item={
    id:'q_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
    contact_email:email, contact_name:[c.first_name,c.last_name].filter(Boolean).join(' ')||'Contact',
    company:c.company||c._co||'', campaign_id:campaign||'',
    subject:'', body:'', risk_flags:[], status:'draft_needed',
    created_at:new Date().toISOString(), updated_at:new Date().toISOString(),
    _contact:c, // temp in-memory ref
  };
  queue.push(item);
  saveQueueItem(item);
  updateBadges(); renderTab(activeTab);
}
function queueBatch(){
  const batch=buildBatch(50);let added=0;
  batch.forEach(({contact:c,campaign})=>{
    if(!queue.find(q=>q.contact_email===c.email)){
      queueOne(c.email,campaign); added++;
    }
  });
  if(added>0) showTab('queue');
}
function queueCampaign(camId,limit){
  const cam=CAMPAIGNS.find(c=>c.id===camId);if(!cam)return;
  const now=Date.now();
  contacts.filter(cam.filter).filter(c=>c.email&&!queue.find(q=>q.contact_email===c.email)&&!suppressed.has((c.email||'').toLowerCase())&&!(c.last_contacted_at&&now-new Date(c.last_contacted_at).getTime()<30*86400000)).slice(0,limit).forEach(c=>queueOne(c.email,camId));
  showTab('queue');
}
function queueCompany(sk){
  const entry=Object.entries(companies).find(([k])=>k.replace(/[^a-z0-9]/g,'').slice(0,30)===sk);if(!entry)return;
  const [,co]=entry;
  co.contacts.filter(c=>c.email&&!queue.find(q=>q.contact_email===c.email)&&!['active-upcoming','active-inquiry'].includes(c.account_status)).slice(0,10).forEach(c=>queueOne(c.email,'corporate'));
  showTab('queue');
}
function skipContact(email){
  const c=contacts.find(x=>x.email===email);if(!c)return;
  const now=new Date().toISOString();
  fetch(`${API_ST}?action=update-queue-item`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:email,status:'skipped'})}).catch(()=>{});
  // Mark last contacted so 30-day rule kicks in
  c.last_contacted_at=now;
  renderTab(activeTab);
}
function clearQueue(){if(!confirm('Clear all queued emails?'))return;queue=[];fetch(`${API_ST}?action=bulk-save-queue`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({queue:[]})}).catch(()=>{});updateBadges();renderQueue();}
function approveAllReady(){queue.filter(q=>q.status==='needs_review'||q.status==='draft_generated').forEach(q=>{q.status='approved';q.updated_at=new Date().toISOString();updateQueueItem(q);});updateBadges();renderQueue();}
function approveItem(id){const i=queue.find(q=>q.id===id);if(i){i.status='approved';i.updated_at=new Date().toISOString();updateQueueItem(i);updateBadges();renderQueue();}}
function skipItem(id){const i=queue.find(q=>q.id===id);if(i){i.status='skipped';i.updated_at=new Date().toISOString();updateQueueItem(i);renderQueue();}}
function removeItem(id){queue=queue.filter(q=>q.id!==id);fetch(`${API_ST}?action=bulk-save-queue`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({queue})}).catch(()=>{});updateBadges();renderQueue();}
function markReadyToSend(id){const i=queue.find(q=>q.id===id);if(i){i.status='ready_to_send';i.updated_at=new Date().toISOString();updateQueueItem(i);renderQueue();}}
function markSent(id){
  const i=queue.find(q=>q.id===id);if(!i)return;
  i.status='sent';i.sent_at=new Date().toISOString();i.updated_at=new Date().toISOString();
  updateQueueItem(i);
  fetch(`${API_ST}?action=record-sent`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:i.contact_email,name:i.contact_name,campaign:i.campaign_id,subject:i.subject,body:i.body})}).catch(()=>{});
  renderQueue();
}
async function saveQueueItem(item){await fetch(`${API_ST}?action=save-queue-item`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)}).catch(()=>{});}
async function updateQueueItem(item){await fetch(`${API_ST}?action=update-queue-item`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)}).catch(()=>{});}

// ── SUPPRESSION ───────────────────────────────────────────────────────────────
function addSuppressed(email){if(!email)return;suppressed.add(email.toLowerCase());fetch(`${API_ST}?action=suppress`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})}).catch(()=>{});queue=queue.filter(q=>q.contact_email.toLowerCase()!==email.toLowerCase());updateBadges();}
function addSuppressedManual(){const v=document.getElementById('supp-inp')?.value?.trim()?.toLowerCase();if(!v)return;addSuppressed(v);document.getElementById('supp-inp').value='';renderSuppressed();}
function removeSuppressed(email){suppressed.delete(email.toLowerCase());fetch(`${API_ST}?action=unsuppress`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})}).catch(()=>{});renderSuppressed();}

// ── EMAIL GENERATION ──────────────────────────────────────────────────────────
async function generateOne(itemId) {
  const item=queue.find(q=>q.id===itemId);if(!item)return;
  item.status='draft_generated'; renderQueue();
  const c=item._contact||contacts.find(x=>x.email===item.contact_email)||{email:item.contact_email,first_name:item.contact_name?.split(' ')[0]};
  try{
    const res=await fetch(API_AI,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contact:c,campaign:item.campaign_id})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||`HTTP ${res.status}`);
    item.subject=data.subject||'Following up from Saddleback Catering';
    item.body=data.body||'Unable to generate.';
    item.risk_flags=data.riskFlags||[];
    item.status='needs_review';
  }catch(err){item.body=`Error: ${err.message}`;item.risk_flags=[];item.status='needs_review';}
  item.updated_at=new Date().toISOString();
  updateQueueItem(item); renderQueue(); updateBadges();
}
async function generateAll(){
  const pending=queue.filter(q=>q.status==='draft_needed');if(!pending.length)return;
  const btn=document.querySelector('[onclick="generateAll()"]');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="sp2"></span> Generating…';}
  for(let i=0;i<pending.length;i++){await generateOne(pending[i].id);if(i<pending.length-1)await new Promise(r=>setTimeout(r,300));}
  if(btn){btn.disabled=false;btn.innerHTML='✨ Generate drafts';}
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(itemId){
  const item=queue.find(q=>q.id===itemId);if(!item)return;
  modalQueueId=itemId;
  document.getElementById('mt').textContent=`Review: ${item.contact_name||item.contact_email}`;
  document.getElementById('msub').value=item.subject||'';
  document.getElementById('memail').value=item.body||'';
  const flags=(item.risk_flags||[]).filter(f=>f&&f!=='none');
  document.getElementById('risk-display').innerHTML=flags.map(f=>`<div class="rf">⚠ ${esc(f)}</div>`).join('');
  document.getElementById('mo').classList.add('open');
}
function closeModal(){
  if(modalQueueId){const i=queue.find(q=>q.id===modalQueueId);if(i){i.subject=document.getElementById('msub').value;i.body=document.getElementById('memail').value;i.updated_at=new Date().toISOString();updateQueueItem(i);}}
  document.getElementById('mo').classList.remove('open');modalQueueId=null;renderQueue();
}
function approveFromModal(){
  if(modalQueueId){const i=queue.find(q=>q.id===modalQueueId);if(i){i.subject=document.getElementById('msub').value;i.body=document.getElementById('memail').value;i.status='approved';i.approved_at=new Date().toISOString();i.updated_at=new Date().toISOString();updateQueueItem(i);}}
  closeModal();
}
function copyModal(){
  const t=document.getElementById('memail').value;
  navigator.clipboard.writeText(`Subject: ${document.getElementById('msub').value}\n\n${t}`).then(()=>{
    const btn=document.getElementById('bcm');btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent='Copy',2000);
  });
}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadFromDB();
</script>
