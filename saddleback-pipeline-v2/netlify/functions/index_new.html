<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saddleback Catering Pipeline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Trebuchet MS',sans-serif;background:#0A0908;color:#F0EDE8;min-height:100vh}
.card{background:#161614;border:1px solid #2A2A28;border-radius:10px;padding:16px 18px;margin-bottom:10px;transition:border-color .2s;cursor:pointer}
.card:hover{border-color:#3A3A38}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;text-transform:uppercase;letter-spacing:.07em}
.btn{border:none;border-radius:6px;cursor:pointer;font-family:'Trebuchet MS',sans-serif;font-weight:600;transition:all .15s}
.btn:hover{opacity:.85}
.inp{background:#1A1918;border:1px solid #2A2A28;border-radius:6px;padding:9px 12px;color:#F0EDE8;font-size:13px;font-family:'Trebuchet MS',sans-serif;outline:none;width:100%}
.inp:focus{border-color:#C8451F}
.lbl{font-size:10px;font-weight:700;color:#5A5A56;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;display:block}
.stat{background:#161614;border:1px solid #2A2A28;border-radius:8px;padding:12px 14px}
.cu{background:#C8451F;border-radius:10px 10px 3px 10px;padding:9px 13px;font-size:13px;color:#fff;max-width:85%;margin-left:auto;line-height:1.6}
.ca{background:#1E1E1C;border:1px solid #2A2A28;border-radius:10px 10px 10px 3px;padding:9px 13px;font-size:13px;color:#C8C5C0;max-width:85%;line-height:1.65;white-space:pre-wrap}
textarea{background:#1A1918;border:1px solid #2A2A28;border-radius:6px;padding:10px 12px;color:#F0EDE8;font-size:13px;font-family:'Trebuchet MS',sans-serif;outline:none;width:100%;resize:vertical}
textarea:focus{border-color:#C8451F}
select{background:#1A1918;border:1px solid #2A2A28;border-radius:6px;padding:9px 12px;color:#F0EDE8;font-size:13px;font-family:'Trebuchet MS',sans-serif;outline:none;width:100%}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0A0908}
::-webkit-scrollbar-thumb{background:#2C2C28;border-radius:3px}
.topbar{background:#111110;border-bottom:1px solid #1E1E1C;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:99}
.content{max-width:960px;margin:0 auto;padding:20px 20px 80px}
#debug-box{position:fixed;top:0;left:0;right:0;background:#000;color:#0f0;padding:12px;font-size:11px;font-family:monospace;z-index:9999;max-height:220px;overflow:auto;display:none;white-space:pre-wrap;border-bottom:2px solid #0f0}
</style>
</head>
<body>
<div id="debug-box"></div>
<div id="app"></div>
<script>
const API = '/api/tripleseat';
const GR='#3D9E6A',RD='#C84040',AM='#C87820',BL='#3A78C8',EM='#C8451F',GL='#C89A2A',PR='#7858C8';

function dbg(label, data) {
  const box = document.getElementById('debug-box');
  box.style.display = 'block';
  box.textContent += '\n['+label+']: ' + (typeof data === 'string' ? data : JSON.stringify(data)).substring(0, 800);
}

const SC = {
  new_lead:   {label:'New Lead',  color:'#3A78C8',bg:'rgba(58,120,200,.12)'},
  prospect:   {label:'Prospect', color:'#7858C8',bg:'rgba(120,88,200,.12)'},
  tentative:  {label:'Tentative',color:'#C87820',bg:'rgba(200,120,32,.12)'},
  definite:   {label:'Confirmed',color:'#C89A2A',bg:'rgba(200,154,42,.12)'},
  deposited:  {label:'Deposited',color:'#3D9E6A',bg:'rgba(61,158,106,.12)'},
  closed:     {label:'Closed',   color:'#3D9E6A',bg:'rgba(61,158,106,.12)'},
  cancelled:  {label:'Cancelled',color:'#C84040',bg:'rgba(200,64,64,.12)'},
  lost:       {label:'Lost',     color:'#C84040',bg:'rgba(200,64,64,.12)'},
  other:      {label:'Active',   color:'#C87820',bg:'rgba(200,120,32,.12)'},
};

const $=id=>document.getElementById(id);
const f$=v=>v==null?'—':'$'+Math.round(v).toLocaleString();
const fD=d=>{if(!d)return'—';try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return d;}};
const dAgo=d=>{if(!d)return 999;return Math.floor((Date.now()-new Date(d))/86400000);};
function getSC(l){const s=(l?.status||'').toLowerCase().replace(/[\s-]+/g,'_');return SC[s]||SC.other;}
function urgency(l){const s=(l.status||'').toLowerCase();if(['closed','cancelled','lost','definite','deposited'].some(x=>s.includes(x)))return'none';const d=dAgo(l.lastContact);if(d>=7)return'high';if(d>=4)return'medium';return'low';}

let ST={view:'pipeline',leads:[],manual:[],loading:true,error:null,selId:null,filter:'all',sort:'lastContact',chat:[],chatBusy:false,draft:'',draftSubj:'',draftTo:'',sending:false,sent:false};
function allLeads(){return[...ST.leads,...ST.manual];}

const SEED=[
  {id:1,name:'Grace (Baby Shower)',contact:'Grace',email:'',phone:'',eventType:'Baby Shower',eventDate:'2026-05-24',guestCount:40,location:'Okemos',value:1004,status:'prospect',lastContact:'2026-03-24',notes:'Wants 10% gratuity removed. Will pay deposit once removed.',history:['2026-03-24: Requested gratuity removal.'],source:'seed'},
  {id:2,name:'Brooke Amor (Wedding)',contact:'Brooke Amor',email:'',phone:'',eventType:'Wedding Reception',eventDate:'2026-11-14',guestCount:120,location:'Okemos',value:2401,status:'deposited',lastContact:'2026-01-29',notes:'Deposit paid. Lakeview venue. Nut/fruit allergies.',history:['2025-12-26: Deposit paid.'],source:'seed'},
  {id:3,name:'Tom Nihra — MSU Football Camp',contact:'Tom Nihra',email:'tn@jtdent.com',phone:'248-396-6903',eventType:'Corporate Event',eventDate:'2026-06-03',guestCount:75,location:'Okemos',value:3200,status:'definite',lastContact:'2026-03-03',notes:'Dinner for MSU Football Fantasy Camp.',history:['2026-03-03: Call scheduled.'],source:'seed'},
  {id:4,name:'Tom Nihra — MSU Golf Camp',contact:'Tom Nihra',email:'tn@jtdent.com',phone:'248-396-6903',eventType:'Corporate Event',eventDate:'2026-08-28',guestCount:75,location:'Okemos',value:2800,status:'tentative',lastContact:'2026-03-03',notes:'Lunch for MSU Golf Fantasy Camp.',history:['2026-03-03: Discussed on call.'],source:'seed'},
];

function normalizeLead(l){
  return{id:l.id,name:l.name||l.event_name||'Unnamed Lead',contact:[l.first_name,l.last_name].filter(Boolean).join(' ')||l.contact_name||'',email:l.email||l.contact_email||'',phone:l.phone||l.contact_phone||'',eventType:l.event_type_name||l.event_type||l.type||'',eventDate:l.start_date||l.event_date||'',guestCount:l.guest_count||l.guests||0,location:l.location_name||l.site_name||'',value:parseFloat(l.total_amount||l.estimated_value||l.amount||0),status:(l.status||'new_lead').toLowerCase().replace(/[\s-]+/g,'_'),lastContact:l.last_updated_at||l.updated_at||l.created_at||'',notes:l.description||l.notes||'',tsId:l.id,source:'tripleseat',history:['TS lead: '+fD(l.created_at)]};
}
function normalizeEvent(e){
  return{id:e.id,name:e.name||'Unnamed Event',contact:e.contact_name||'',email:e.contact_email||'',phone:e.contact_phone||'',eventType:e.type_name||e.event_type||'',eventDate:e.start_date||'',guestCount:e.guest_count||0,location:e.location_name||e.site_name||'',value:parseFloat(e.total_amount||e.final_payment||0),status:(e.status||'tentative').toLowerCase().replace(/[\s-]+/g,'_'),lastContact:e.updated_at||e.created_at||'',notes:e.description||'',tsId:e.id,source:'tripleseat',history:['TS event: '+fD(e.created_at)]};
}

async function fetchLeads(){
  ST.loading=true;ST.error=null;render();
  const combined=[];
  try{
    // LEADS
    const r1=await fetch(API+'?endpoint=leads&limit=100');
    const d1=await r1.json();
    dbg('LEADS RAW KEYS',Object.keys(d1));
    dbg('LEADS SAMPLE',JSON.stringify(d1).substring(0,600));
    const arr1=d1.leads||d1.data||d1.results||(Array.isArray(d1)?d1:[]);
    dbg('LEADS ARR LENGTH',arr1.length);
    arr1.forEach(item=>{
      const l=item.lead||item;
      if(l&&l.id){combined.push(normalizeLead(l));}
    });
  }catch(e){dbg('LEADS ERR',e.message);}

  try{
    // EVENTS
    const r2=await fetch(API+'?endpoint=events&limit=100');
    const d2=await r2.json();
    dbg('EVENTS RAW KEYS',Object.keys(d2));
    dbg('EVENTS SAMPLE',JSON.stringify(d2).substring(0,600));
    const arr2=d2.events||d2.data||d2.results||(Array.isArray(d2)?d2:[]);
    dbg('EVENTS ARR LENGTH',arr2.length);
    arr2.forEach(item=>{
      const e=item.event||item;
      if(e&&e.id&&!combined.find(x=>String(x.id)===String(e.id))){combined.push(normalizeEvent(e));}
    });
  }catch(e){dbg('EVENTS ERR',e.message);}

  dbg('COMBINED TOTAL',combined.length);
  ST.leads=combined.length>0?combined:SEED;
  if(combined.length===0)ST.error='API connected — check green debug bar for raw data structure';
  ST.loading=false;
  render();
}

function pipeHTML(){
  const all=allLeads();
  const fil=ST.filter==='all'?all:all.filter(l=>l.status===ST.filter);
  const srt=[...fil].sort((a,b)=>{if(ST.sort==='lastContact')return new Date(a.lastContact||0)-new Date(b.lastContact||0);if(ST.sort==='value')return b.value-a.value;if(ST.sort==='eventDate')return new Date(a.eventDate||0)-new Date(b.eventDate||0);return 0;});
  const pipe=all.filter(l=>!['lost','cancelled'].includes(l.status)).reduce((s,l)=>s+(l.value||0),0);
  const conf=all.filter(l=>['definite','deposited','closed'].includes(l.status)).reduce((s,l)=>s+(l.value||0),0);
  const nfu=all.filter(l=>urgency(l)==='high').length;
  const open=all.filter(l=>!['lost','cancelled','closed','definite','deposited'].includes(l.status)).length;
  const groups={};all.forEach(l=>{groups[l.status]=(groups[l.status]||0)+1;});
  const tsCount=ST.leads.filter(l=>l.source==='tripleseat').length;
  const statusTag=ST.loading?`<span style="font-size:11px;color:#4A4A48">Loading...</span>`:tsCount>0?`<span style="font-size:11px;color:${GR}">Live · Tripleseat (${tsCount})</span>`:ST.error?`<span style="font-size:11px;color:${AM}">${ST.error}</span>`:`<span style="font-size:11px;color:#4A4A48">Manual mode</span>`;
  return`<div class="topbar"><div style="display:flex;align-items:center;gap:12px"><span style="font-size:15px;font-weight:800;color:#F0EDE8;font-family:Georgia,serif">Saddleback</span><span style="width:1px;height:18px;background:#2A2A28;display:inline-block"></span><span style="font-size:12px;color:#4A4A48">Catering Pipeline</span>${statusTag}</div><div style="display:flex;gap:8px"><button class="btn" onclick="fetchLeads()" style="background:transparent;border:1px solid #2A2A28;color:#5A5A56;padding:6px 12px;font-size:11px">↻ Refresh</button><button class="btn" onclick="ST.view='add';render()" style="background:${EM};color:#fff;padding:7px 16px;font-size:12px">+ Add Lead</button></div></div>
  <div class="content">
  <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px">
    <div class="stat"><div class="lbl">Total pipeline</div><div style="font-size:20px;font-weight:700;color:#F0EDE8;margin-top:4px">${f$(pipe)}</div></div>
    <div class="stat"><div class="lbl">Confirmed & deposited</div><div style="font-size:20px;font-weight:700;color:${GR};margin-top:4px">${f$(conf)}</div></div>
    <div class="stat"><div class="lbl">Open leads</div><div style="font-size:20px;font-weight:700;color:${BL};margin-top:4px">${open}</div></div>
    <div class="stat" style="${nfu>0?'border-color:'+RD+'55':''}"><div class="lbl">Needs follow-up</div><div style="font-size:20px;font-weight:700;color:${nfu>0?RD:GR};margin-top:4px">${nfu} lead${nfu!==1?'s':''}</div></div>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn" onclick="ST.filter='all';render()" style="background:${ST.filter==='all'?EM:'transparent'};color:${ST.filter==='all'?'#fff':'#6A6A66'};border:1px solid ${ST.filter==='all'?EM:'#2A2A28'};padding:5px 11px;font-size:11px">All (${all.length})</button>
      ${Object.entries(groups).map(([k,c])=>{const s=SC[k]||SC.other;return`<button class="btn" onclick="ST.filter='${k}';render()" style="background:${ST.filter===k?s.color:'transparent'};color:${ST.filter===k?'#fff':s.color};border:1px solid ${ST.filter===k?s.color:s.color+'44'};padding:5px 11px;font-size:11px">${s.label} (${c})</button>`;}).join('')}
    </div>
    <select onchange="ST.sort=this.value;render()" style="width:auto;font-size:11px;padding:5px 9px">
      <option value="lastContact" ${ST.sort==='lastContact'?'selected':''}>Sort: Last updated</option>
      <option value="eventDate" ${ST.sort==='eventDate'?'selected':''}>Sort: Event date</option>
      <option value="value" ${ST.sort==='value'?'selected':''}>Sort: Value</option>
    </select>
  </div>
  ${ST.loading?`<div style="text-align:center;padding:60px;color:#3A3A38;font-size:14px">Loading from Tripleseat...</div>`:''}
  ${!ST.loading&&srt.length===0?`<div style="text-align:center;color:#3A3A38;padding:40px;font-size:14px">No leads. Add one manually or refresh.</div>`:''}
  ${srt.map(l=>{const s=getSC(l),u=urgency(l),d=dAgo(l.lastContact);return`<div class="card" onclick="ST.selId=${JSON.stringify(l.id)};ST.view='detail';ST.chat=[];render()" style="${u==='high'?'border-color:'+RD+'55;':u==='medium'?'border-color:'+AM+'44;':''}"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap"><span style="font-size:14px;font-weight:600;color:#F0EDE8">${l.name}</span><span class="badge" style="color:${s.color};background:${s.bg}">${s.label}</span>${u==='high'?`<span class="badge" style="color:${RD};background:rgba(200,64,64,.12)">${d}d no response</span>`:''}</div><div style="display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:#5A5A56">${l.location?`<span>${l.location}</span>`:''}${l.eventType?`<span>${l.eventType}</span>`:''}${l.eventDate?`<span>${fD(l.eventDate)}</span>`:''}${l.guestCount?`<span>${l.guestCount} guests</span>`:''}</div>${l.notes?`<div style="font-size:12px;color:#3A3A38;margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:500px">${l.notes}</div>`:''}</div><div style="text-align:right;flex-shrink:0"><div style="font-size:18px;font-weight:700;color:#F0EDE8">${f$(l.value)}</div><div style="font-size:11px;color:#3A3A38;margin-top:3px">Updated ${fD(l.lastContact)}</div>${u==='high'?`<button class="btn" onclick="event.stopPropagation();doCompose(${JSON.stringify(l.id)})" style="background:${EM};color:#fff;padding:5px 12px;font-size:11px;margin-top:8px">Write Follow-up</button>`:''}</div></div></div>`;}).join('')}
  </div>`;
}

function detHTML(){
  const l=allLeads().find(x=>String(x.id)===String(ST.selId));
  if(!l)return`<div style="padding:40px;color:#5A5A56"><button onclick="ST.view='pipeline';render()" style="color:${EM};background:none;border:none;cursor:pointer;font-size:14px">← Back</button></div>`;
  const s=getSC(l),u=urgency(l),d=dAgo(l.lastContact);
  return`<div class="topbar"><div style="display:flex;align-items:center;gap:10px"><button class="btn" onclick="ST.view='pipeline';render()" style="background:transparent;border:1px solid #2A2A28;color:#6A6A66;padding:6px 12px;font-size:12px">← Pipeline</button><span style="font-size:14px;font-weight:600;color:#F0EDE8">${l.name}</span><span class="badge" style="color:${s.color};background:${s.bg}">${s.label}</span></div><button class="btn" onclick="doCompose(${JSON.stringify(l.id)})" style="background:${EM};color:#fff;padding:7px 16px;font-size:12px">Write Follow-up</button></div>
  <div class="content">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
    <div style="background:#161614;border:1px solid #2A2A28;border-radius:10px;padding:18px">
      <div class="lbl" style="margin-bottom:12px">Event details</div>
      ${[['Contact',l.contact],['Email',l.email||'—'],['Phone',l.phone||'—'],['Type',l.eventType||'—'],['Date',fD(l.eventDate)],['Guests',l.guestCount?l.guestCount+' guests':'—'],['Location',l.location||'—'],['Value',f$(l.value)],['Last updated',fD(l.lastContact)+(u==='high'?` <span style="color:${RD};font-size:11px">(${d}d ago)</span>`:'')],['Source',l.source==='tripleseat'?'Tripleseat (live)':l.source==='seed'?'Example data':'Manually added']].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1A1A18"><span style="font-size:12px;color:#5A5A56">${k}</span><span style="font-size:12px;color:#C8C5C0;text-align:right;max-width:200px">${v||'—'}</span></div>`).join('')}
      ${l.source==='tripleseat'?`<div style="margin-top:12px"><a href="https://saddlebackbbq.tripleseat.com/events/${l.tsId}" target="_blank" style="font-size:12px;color:${BL};text-decoration:none">Open in Tripleseat →</a></div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="background:#161614;border:1px solid #2A2A28;border-radius:10px;padding:18px;flex:1">
        <div class="lbl" style="margin-bottom:8px">Notes</div>
        <div style="font-size:13px;color:#8A8880;line-height:1.7;margin-bottom:12px">${(l.notes||'No notes yet.').replace(/\n/g,'<br>')}</div>
        <textarea id="note-inp" rows="3" placeholder="Add a note..."></textarea>
        <button class="btn" onclick="addNote(${JSON.stringify(l.id)})" style="background:${EM};color:#fff;padding:6px 14px;font-size:12px;margin-top:8px">Save Note</button>
      </div>
      <div style="background:#161614;border:1px solid #2A2A28;border-radius:10px;padding:18px">
        <div class="lbl" style="margin-bottom:8px">Activity</div>
        ${(l.history||[]).slice().reverse().map(h=>`<div style="font-size:12px;color:#5A5A56;padding:5px 0;border-bottom:1px solid #1A1A18;line-height:1.5">${h}</div>`).join('')||'<div style="font-size:12px;color:#3A3A38">No history.</div>'}
      </div>
    </div>
  </div>
  ${u==='high'?`<div style="background:rgba(200,64,64,.08);border:1px solid ${RD}44;border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px"><div><div style="font-size:13px;font-weight:600;color:${RD};margin-bottom:3px">No contact in ${d} days</div><div style="font-size:12px;color:#8A8880">AI will draft a specific follow-up</div></div><button class="btn" onclick="doCompose(${JSON.stringify(l.id)})" style="background:${RD};color:#fff;padding:9px 18px;font-size:13px;white-space:nowrap">Write Follow-up Now</button></div>`:''}
  <div style="background:#0D0D0C;border:1px solid #2A2A28;border-radius:12px;overflow:hidden">
    <div style="padding:11px 16px;border-bottom:1px solid #1E1E1C;background:#111110;display:flex;align-items:center;gap:8px">
      <div style="width:7px;height:7px;border-radius:50%;background:${GR}"></div>
      <span style="font-size:13px;font-weight:600;color:#F0EDE8">AI sales assistant — ${l.contact||l.name}</span>
    </div>
    <div id="chat-box" style="min-height:100px;max-height:280px;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px">
      ${ST.chat.length===0?`<div style="font-size:12px;color:#4A4A48;margin-bottom:4px">Quick actions:</div>${['Draft a follow-up email','What are the next steps to close this?','How should I handle the deposit?','Write a reminder about the upcoming event'].map(q=>`<button onclick="fillQ(${JSON.stringify(q)});return false" style="background:transparent;border:1px solid #2A2A28;border-radius:6px;padding:7px 11px;color:#5A5A56;font-size:12px;text-align:left;cursor:pointer;font-family:inherit">${q}</button>`).join('')}`:''}
      ${ST.chat.map(m=>`<div style="display:flex;justify-content:${m.r==='user'?'flex-end':'flex-start'}"><div class="${m.r==='user'?'cu':'ca'}">${m.r==='user'?m.t:m.t.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div></div>`).join('')}
      ${ST.chatBusy?`<div style="display:flex"><div class="ca" style="color:#4A4A48">Thinking...</div></div>`:''}
    </div>
    <div style="padding:10px 12px;border-top:1px solid #1E1E1C;background:#111110;display:flex;gap:8px">
      <input type="text" id="chat-inp" class="inp" placeholder="Ask about this lead, draft a message..." onkeydown="if(event.key==='Enter'){sendQ(${JSON.stringify(l.id)});return false}">
      <button class="btn" onclick="sendQ(${JSON.stringify(l.id)})" style="background:${EM};color:#fff;padding:9px 16px;font-size:13px;white-space:nowrap">Send</button>
    </div>
  </div>
  </div>`;
}

function compHTML(){
  const l=allLeads().find(x=>String(x.id)===String(ST.selId));
  return`<div class="topbar"><div style="display:flex;align-items:center;gap:10px"><button class="btn" onclick="ST.view='detail';render()" style="background:transparent;border:1px solid #2A2A28;color:#6A6A66;padding:6px 12px;font-size:12px">← Back</button><span style="font-size:14px;font-weight:600;color:#F0EDE8">Follow-up — ${l?.contact||l?.name||''}</span></div></div>
  <div style="max-width:760px;margin:0 auto;padding:24px 20px 80px">
    <div style="background:#161614;border:1px solid #2A2A28;border-radius:10px;padding:20px;margin-bottom:16px">
      <label class="lbl">To</label>
      <input type="text" class="inp" id="comp-to" value="${ST.draftTo}" style="margin-bottom:14px" placeholder="customer@email.com">
      <label class="lbl">Subject</label>
      <input type="text" class="inp" id="comp-subj" value="${ST.draftSubj}" style="margin-bottom:14px">
      <label class="lbl">Message</label>
      <textarea id="comp-body" rows="14">${ST.draft}</textarea>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <button class="btn" onclick="saveDraft()" style="background:${GR};color:#fff;padding:10px 24px;font-size:13px;opacity:${ST.sending?.5:1}">${ST.sending?'Saving...':ST.sent?'✓ Saved to Gmail Drafts':'Save to Gmail Drafts'}</button>
      <button class="btn" onclick="doCompose(${JSON.stringify(ST.selId)})" style="background:transparent;border:1px solid #2A2A28;color:#6A6A66;padding:10px 16px;font-size:13px">Regenerate</button>
      <span style="font-size:12px;color:#4A4A48">Ryan reviews and sends from Gmail</span>
    </div>
    ${ST.sent?`<div style="margin-top:14px;background:rgba(61,158,106,.1);border:1px solid ${GR}44;border-radius:8px;padding:12px 16px;font-size:13px;color:${GR}">Draft saved to Ryan's Gmail.</div>`:''}
  </div>`;
}

function addHTML(){
  return`<div class="topbar"><div style="display:flex;align-items:center;gap:10px"><button class="btn" onclick="ST.view='pipeline';render()" style="background:transparent;border:1px solid #2A2A28;color:#6A6A66;padding:6px 12px;font-size:12px">← Cancel</button><span style="font-size:14px;font-weight:600;color:#F0EDE8">Add new lead</span></div></div>
  <div style="max-width:700px;margin:0 auto;padding:24px 20px 80px">
    <div style="background:#161614;border:1px solid #2A2A28;border-radius:10px;padding:20px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div><label class="lbl">Lead / Event name</label><input type="text" id="f-name" class="inp" placeholder="e.g. Smith Wedding"></div>
        <div><label class="lbl">Contact name</label><input type="text" id="f-contact" class="inp"></div>
        <div><label class="lbl">Email</label><input type="email" id="f-email" class="inp"></div>
        <div><label class="lbl">Phone</label><input type="text" id="f-phone" class="inp"></div>
        <div><label class="lbl">Event type</label><select id="f-type"><option value="">Select...</option>${['Wedding Reception','Baby Shower','Corporate Event','Birthday Party','Graduation','Holiday Party','Drop-off Catering','On-site Full Service','Private Dining','Other'].map(t=>`<option>${t}</option>`).join('')}</select></div>
        <div><label class="lbl">Location</label><select id="f-loc">${['Okemos','Slice (Penn)','REO Town',"Coach's"].map(l=>`<option>${l}</option>`).join('')}</select></div>
        <div><label class="lbl">Event date</label><input type="date" id="f-date" class="inp"></div>
        <div><label class="lbl">Guest count</label><input type="number" id="f-guests" class="inp"></div>
        <div><label class="lbl">Est. value ($)</label><input type="number" id="f-value" class="inp"></div>
        <div><label class="lbl">Status</label><select id="f-status">${Object.entries(SC).filter(([k])=>k!=='other').map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('')}</select></div>
      </div>
      <div style="margin-top:14px"><label class="lbl">Notes</label><textarea id="f-notes" rows="3" placeholder="Event details, special requests..."></textarea></div>
      <div style="margin-top:18px;display:flex;gap:10px">
        <button class="btn" onclick="saveLead()" style="background:${EM};color:#fff;padding:10px 28px;font-size:13px">Add Lead</button>
        <button class="btn" onclick="ST.view='pipeline';render()" style="background:transparent;border:1px solid #2A2A28;color:#6A6A66;padding:10px 16px;font-size:13px">Cancel</button>
      </div>
    </div>
  </div>`;
}

window.addNote=id=>{const inp=$('note-inp');if(!inp||!inp.value.trim())return;const l=allLeads().find(x=>String(x.id)===String(id));if(!l)return;const n=inp.value.trim();l.notes=(l.notes?l.notes+'\n':'')+n;l.lastContact=new Date().toISOString().split('T')[0];l.history=l.history||[];l.history.push(new Date().toISOString().split('T')[0]+': Note: '+n.slice(0,60));render();};
window.saveLead=()=>{const gv=id=>$(id)?.value||'';const name=gv('f-name');if(!name){alert('Please enter a lead name.');return;}const lead={id:'m_'+Date.now(),name,contact:gv('f-contact'),email:gv('f-email'),phone:gv('f-phone'),eventType:gv('f-type'),eventDate:gv('f-date'),guestCount:parseInt(gv('f-guests'))||0,location:gv('f-loc')||'Okemos',value:parseFloat(gv('f-value'))||0,status:gv('f-status')||'new_lead',notes:gv('f-notes'),lastContact:new Date().toISOString().split('T')[0],source:'manual',history:['Lead created '+new Date().toISOString().split('T')[0]]};ST.manual.push(lead);ST.selId=lead.id;ST.view='detail';ST.chat=[];render();};
window.doCompose=async id=>{const l=allLeads().find(x=>String(x.id)===String(id));if(!l)return;ST.selId=id;ST.view='compose';ST.draft='Generating AI draft...';ST.draftSubj=`Follow-up: ${l.eventType||'Event'} — ${l.contact||l.name}`;ST.draftTo=l.email||'';ST.sent=false;render();try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:`Write a follow-up email from Ryan Piotrowski, Catering Director, Saddleback Restaurant Group, Lansing MI, (517) 214-9024.\n\nLead: ${l.contact||l.name} | ${l.eventType} on ${fD(l.eventDate)} | ${l.guestCount||'TBD'} guests | ${l.location} | ${f$(l.value)} | Last updated: ${dAgo(l.lastContact)} days ago | Status: ${getSC(l).label}\nNotes: ${l.notes||'none'}\nHistory: ${(l.history||[]).join(' | ')}\n\nWarm, specific follow-up. Reference actual details. Address open issues. Clear next step. Under 150 words. Email body only.`}]})});const data=await res.json();ST.draft=data.content?.find(b=>b.type==='text')?.text||'Unable to generate.';}catch(e){ST.draft='Error connecting to AI.';}const b=$('comp-body');if(b)b.value=ST.draft;else render();};
window.saveDraft=async()=>{if(ST.sending||ST.sent)return;const to=$('comp-to')?.value,subj=$('comp-subj')?.value,body=$('comp-body')?.value;ST.sending=true;render();try{await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:100,messages:[{role:'user',content:`Save Gmail draft. To: ${to}. Subject: ${subj}. Body: ${body}`}],mcp_servers:[{type:'url',url:'https://gmail.mcp.claude.com/mcp',name:'gmail'}]})});}catch(e){}const l=allLeads().find(x=>String(x.id)===String(ST.selId));if(l){l.lastContact=new Date().toISOString().split('T')[0];l.history=l.history||[];l.history.push(new Date().toISOString().split('T')[0]+': Follow-up drafted: "'+subj+'"');}ST.sent=true;ST.sending=false;render();};
window.fillQ=q=>{const i=$('chat-inp');if(i)i.value=q;};
window.sendQ=async id=>{if(ST.chatBusy)return;const inp=$('chat-inp');if(!inp)return;const t=inp.value.trim();if(!t)return;const l=allLeads().find(x=>String(x.id)===String(id));inp.value='';ST.chat.push({r:'user',t});ST.chatBusy=true;scrollChat();try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:`You are a catering sales advisor for Saddleback Restaurant Group, Lansing MI. Help Ryan Piotrowski close leads.\n\nLead: ${l?.name} | ${l?.contact} | ${l?.eventType} on ${fD(l?.eventDate)} | ${l?.guestCount} guests | ${l?.location} | ${f$(l?.value)} | ${getSC(l).label} | ${dAgo(l?.lastContact)}d ago\nNotes: ${l?.notes||'none'}\nHistory: ${(l?.history||[]).join(' | ')}\n\nIf drafting email, write full body. Sign as Ryan Piotrowski, Saddleback Catering, (517) 214-9024.`,messages:ST.chat.map(m=>({role:m.r,content:m.t}))})});const data=await res.json();ST.chat.push({r:'assistant',t:data.content?.find(b=>b.type==='text')?.text||'Unable to respond.'});}catch(e){ST.chat.push({r:'assistant',t:'Connection error.'});}ST.chatBusy=false;render();setTimeout(scrollChat,80);};
function scrollChat(){const b=$('chat-box');if(b)b.scrollTop=b.scrollHeight;}
function render(){const root=$('app');switch(ST.view){case'pipeline':root.innerHTML=pipeHTML();break;case'detail':root.innerHTML=detHTML();setTimeout(scrollChat,80);break;case'compose':root.innerHTML=compHTML();break;case'add':root.innerHTML=addHTML();break;}}
render();
fetchLeads();
</script>
</body>
</html>
